*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#070708;color:#fff;font-family:'Courier New',monospace;

body::before{content:'';position:fixed;inset:0;pointer-events:none;

.gate{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;

input{width:100%;padding:14px 16px;background:rgba(255,255,255,.04);

  color:#daa520;font-family:inherit;font-size:13px;letter-spacing:4px;
  text-align:center;text-transform:uppercase;outline:none;margin-bottom:12px;}
input:focus{border-color:rgba(218,165,32,.6);}
button{width:100%;padding:14px;border-radius:10px;
  border:1px solid rgba(218,165,32,.4);background:rgba(218,165,32,.06);
  color:#daa520;font-family:inherit;font-size:9px;letter-spacing:3px;
  text-transform:uppercase;cursor:pointer;transition:all .2s;}
button:hover{border-color:#daa520;background:rgba(218,165,32,.12);}
.err{font-size:9px;letter-spacing:2px;color:rgba(255,80,80,.8);margin-top:12px;
  text-transform:uppercase;display:none;}
.gate-footer{font-size:7px;letter-spacing:3px;color:rgba(255,255,255,.08);
  text-transform:uppercase;margin-top:24px;}
</style>

function satoshiDecrypt(ct,key){
  key=key.toUpperCase();
  var out=[],ki=0;
  for(var i=0;i<ct.length;i++){
    var o=ct.charCodeAt(i);
    if(o>=32&&o<=126){
      var k=key.charCodeAt(ki%key.length)-32;
      out.push(String.fromCharCode(((o-32-k+95)%95)+32));
      ki++;
    }else{out.push(ct[i]);}
  }
  return out.join('');
}
function unlock(){
  var key=document.getElementById('key-input').value.trim();
  if(!key){document.getElementById('err').style.display='block';return;}
  var plain=satoshiDecrypt(CT,key);
  if(plain.toLowerCase().indexOf('<!doctype')===0){
    document.open();document.write(plain);document.close();
  }else{
    document.getElementById('err').style.display='block';
    document.getElementById('key-input').value='';
    document.getElementById('key-input').focus();
  }
}
