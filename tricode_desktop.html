<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TRICODE DESKTOP</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#050505; overflow:hidden; font-family:'Courier New',monospace; cursor:crosshair; }
#cv { position:fixed; inset:0; width:100%; height:100%; }
#status {
  position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
  font-size:7px; letter-spacing:4px; color:rgba(255,199,44,.4);
  pointer-events:none; white-space:nowrap;
}
#phone-label {
  position:fixed; bottom:432px; right:16px;
  font-size:6px; letter-spacing:3px; color:rgba(255,199,44,.35);
  width:200px; text-align:center;
}
#phone-frame {
  position:fixed; bottom:68px; right:16px;
  width:200px; height:360px;
  border:1px solid rgba(255,199,44,.25);
  border-radius:3px; overflow:hidden; background:#000;
  box-shadow:0 0 20px rgba(255,199,44,.08);
}
#phone-glass {
  position:fixed; bottom:68px; right:16px;
  width:200px; height:360px;
  z-index:10; cursor:crosshair;
  background:transparent;
}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="status">HOLD MOUSE TO CHARGE NODE</div>
<div id="phone-label">◬ PHONE</div>
<iframe id="phone-frame" src="/tricode_phone.html" scrolling="no" frameborder="0" allow="camera;microphone"></iframe>
<div id="phone-glass"></div>

<script data-cfasync="false">
'use strict';
const SYNC_ID = 'tricode_link';
const cv      = document.getElementById('cv');
const ctx     = cv.getContext('2d');
const statusEl= document.getElementById('status');

let cursor    = null;   // live mouse position — streams to phone
let nodeA     = null;   // left-click — gold
let nodeB     = null;
let nodeC     = null;   // right-click — purple
let pairs     = [];
let lineAlpha = 0;
let homography= null;   // affine 3x3 once 3 pairs locked
let game      = {state:'idle', round:0, score:0, deadline:0, results:[], flash:0};

// ── Affine solve: phone coords → desktop coords ───────────────────────
function solveAffine(pts){
  // pts = [{u,v,x,y}] — phone(u,v) → desktop(x,y), normalised
  const A = pts.map(function(p){ return [p.u, p.v, 1]; });
  const bx = pts.map(function(p){ return p.x; });
  const by = pts.map(function(p){ return p.y; });
  const ax = solve3(A, bx);
  const ay = solve3(A, by);
  if(!ax||!ay) return null;
  // H = [[ax[0],ax[1],ax[2]],[ay[0],ay[1],ay[2]],[0,0,1]]
  return [ax, ay, [0,0,1]];
}
function solve3(A, b){
  const M = A.map(function(row,i){ return [row[0],row[1],row[2],b[i]]; });
  for(let col=0;col<3;col++){
    let max=col;
    for(let r=col+1;r<3;r++) if(Math.abs(M[r][col])>Math.abs(M[max][col])) max=r;
    const tmp=M[col]; M[col]=M[max]; M[max]=tmp;
    if(Math.abs(M[col][col])<1e-10) return null;
    for(let r=0;r<3;r++){
      if(r===col) continue;
      const f=M[r][col]/M[col][col];
      for(let k=col;k<=3;k++) M[r][k]-=f*M[col][k];
    }
  }
  return M.map(function(row,i){ return row[3]/row[i]; });
}
function applyH(H, u, v){
  return { x: H[0][0]*u+H[0][1]*v+H[0][2], y: H[1][0]*u+H[1][1]*v+H[1][2] };
}

// ── Mouse — stream cursor live, click to lock ─────────────────────────
function trackMouse(cx, cy){
  cursor = {x:+(cx/window.innerWidth).toFixed(4), y:+(cy/window.innerHeight).toFixed(4)};
}
function lockNode(cx, cy){
  nodeA = {x:+(cx/window.innerWidth).toFixed(4), y:+(cy/window.innerHeight).toFixed(4)};
  push();
  statusEl.textContent = 'NODE A LOCKED — WAITING FOR PHONE NODE B';
}

document.addEventListener('mousemove', function(e){
  if(e.target.id==='phone-glass') return; // glass handles its own
  trackMouse(e.clientX, e.clientY);
});
document.addEventListener('click', function(e){
  if(e.target.id==='phone-glass') return;
  lockNode(e.clientX, e.clientY);
});

// Glass overlay — mouse passes through to cursor stream even over phone iframe
const glass = document.getElementById('phone-glass');
glass.addEventListener('mousemove',    function(e){ trackMouse(e.clientX, e.clientY); });
glass.addEventListener('click',        function(e){ lockNode(e.clientX, e.clientY); });
glass.addEventListener('contextmenu',  function(e){ e.preventDefault(); lockNodeC(e.clientX, e.clientY); });

// ── Game engine ────────────────────────────────────────────────────────
document.addEventListener('keydown', function(e){
  if(e.code==='Space'){ e.preventDefault(); if(game.state==='idle'||game.state==='done') startGame(); }
});
function startGame(){
  pairs=[]; game.round=0; game.score=0; game.results=[]; game.state='active';
  startRound();
}
function startRound(){
  // Spread targets across screen avoiding edges and phone iframe area
  const targets=[
    {x:0.18,y:0.25},{x:0.62,y:0.18},{x:0.25,y:0.68},
    {x:0.50,y:0.50},{x:0.72,y:0.60},{x:0.35,y:0.42}
  ];
  const t = targets[game.round % targets.length];
  nodeA = {x:+(t.x+(Math.random()*0.08-0.04)).toFixed(4), y:+(t.y+(Math.random()*0.08-0.04)).toFixed(4)};
  nodeB = null;
  game.deadline = Date.now()+8000;
  push();
  statusEl.textContent = 'ROUND '+(game.round+1)+'/3 — PLANT B ON TARGET';
}
function resolveRound(success, ms){
  if(success){
    const timeLeft = Math.max(0, game.deadline-Date.now());
    const pts = Math.round(ms*1000 + timeLeft/8);
    game.score += pts;
    game.results.push({match:ms, time:8000-(game.deadline-Date.now()), pts});
    game.flash = Date.now();
    pairs.push({a:{x:nodeA.x,y:nodeA.y}, b:{x:nodeB.x,y:nodeB.y}, orient:{...((nodeB&&nodeB.orient)||{beta:0,gamma:0,alpha:0})}});
  }
  game.round++;
  if(game.round>=3){ game.state='done'; push(); statusEl.textContent='CALIBRATION COMPLETE'; }
  else { setTimeout(startRound, success?1200:800); }
}

// Watch for green lock from phone
let lastCheck=0;
setInterval(function(){
  if(game.state!=='active'||!nodeB) return;
  const normDist=Math.hypot(nodeA.x-(nodeB.x||0), nodeA.y-(nodeB.y||0));
  const ms=Math.max(0,1-normDist/0.15);
  if(ms>0.85) resolveRound(true, ms);
  else if(Date.now()>game.deadline) resolveRound(false, ms);
},100);

// Right-click anywhere = Node C (purple)
document.addEventListener('contextmenu', function(e){
  e.preventDefault();
  if(e.target.id==='phone-glass') return;
  lockNodeC(e.clientX, e.clientY);
});
function lockNodeC(cx, cy){
  nodeC = {x:+(cx/window.innerWidth).toFixed(4), y:+(cy/window.innerHeight).toFixed(4)};
  push();
  statusEl.textContent = 'NODE C PLANTED — TRIANGLE ACTIVE';
}

// Stream cursor every 80ms
setInterval(function(){
  if(!cursor) return;
  fetch('/soul/tricode_sync.php?id='+SYNC_ID, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({side:'laptop', nodeA: nodeA, nodeC: nodeC, cursor: cursor, game: game})
  }).catch(function(){});
}, 80);

function push(){
  fetch('/soul/tricode_sync.php?id='+SYNC_ID, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({side:'laptop', nodeA: nodeA, nodeC: nodeC, cursor: cursor, game: game})
  }).catch(function(){});
}

// ── Poll phone node ───────────────────────────────────────────────────
function poll(){
  fetch('/soul/tricode_sync.php?id='+SYNC_ID+'&t='+Date.now())
  .then(function(r){ return r.json(); })
  .then(function(s){
    if(s.phone){
      if(s.phone.nodeB){ nodeB = s.phone.nodeB; if(s.phone.orient) nodeB.orient = s.phone.orient; }
      if(s.phone.nodeC) nodeC = s.phone.nodeC;
      if(s.phone.pairs) pairs = s.phone.pairs;
      const n = pairs.length;
      if(nodeB) statusEl.textContent = n>=3 ? 'PERSPECTIVE SOLVED — '+n+' PAIRS LOCKED' : 'LINK ACTIVE · '+n+'/3 PAIRS';
    } else if(!nodeA){
      statusEl.textContent = 'MOVE MOUSE · CLICK=A · RIGHT-CLICK=C';
    }
  }).catch(function(){});
}
setInterval(poll, 350);

// ── Draw ──────────────────────────────────────────────────────────────
function draw(){
  cv.width  = window.innerWidth;
  cv.height = window.innerHeight;
  ctx.fillStyle = '#050505';
  ctx.fillRect(0,0,cv.width,cv.height);
  const now = Date.now();

  // Subtle grid
  ctx.strokeStyle='rgba(255,199,44,0.025)'; ctx.lineWidth=1;
  for(let x=0;x<cv.width;x+=60){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,cv.height);ctx.stroke();}
  for(let y=0;y<cv.height;y+=60){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(cv.width,y);ctx.stroke();}

  const W = cv.width, H = cv.height;

  // ── Live cursor — small crosshair ──
  if(cursor){
    const cx=cursor.x*W, cy=cursor.y*H;
    ctx.strokeStyle='rgba(255,199,44,0.35)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(cx-12,cy); ctx.lineTo(cx+12,cy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx,cy-12); ctx.lineTo(cx,cy+12); ctx.stroke();
  }

  // ── Locked Node A ──
  if(nodeA){
    const ax = nodeA.x * W, ay = nodeA.y * H;
    const p  = 0.5 + 0.5*Math.sin(now/500);
    ctx.beginPath(); ctx.arc(ax, ay, 26+8*p, 0, Math.PI*2);
    ctx.strokeStyle='rgba(255,199,44,'+(0.18*p).toFixed(2)+')'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.beginPath(); ctx.arc(ax, ay, 14, 0, Math.PI*2);
    ctx.fillStyle='rgba(255,199,44,1)'; ctx.shadowColor='#FFC72C'; ctx.shadowBlur=22; ctx.fill(); ctx.shadowBlur=0;
    ctx.fillStyle='#000'; ctx.font='bold 10px Courier New';
    ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('A', ax, ay);
  }

  // ── Node B + Line ──
  if(nodeA && nodeB){
    const ax = nodeA.x * W, ay = nodeA.y * H;
    // Gyro-shifted B position
    const bx = nodeB.x * W + ((nodeB.orient ? nodeB.orient.gamma : 0) * W * 0.006);
    const by = nodeB.y * H + ((nodeB.orient ? nodeB.orient.beta  : 0) * H * 0.006);

    // Animated line — data flowing along it
    lineAlpha = Math.min(1, lineAlpha + 0.04); // lineAlpha declared above
    const dist = Math.hypot(bx-ax, by-ay);
    const angle= Math.atan2(by-ay, bx-ax);

    // Glow line
    const lp = 0.4+0.3*Math.sin(now/400);
    ctx.beginPath(); ctx.moveTo(ax,ay); ctx.lineTo(bx,by);
    ctx.strokeStyle='rgba(255,199,44,'+lp.toFixed(2)+')';
    ctx.lineWidth=2; ctx.setLineDash([8,12]); ctx.stroke(); ctx.setLineDash([]);

    // Flowing dots
    for(let i=0;i<4;i++){
      const t = ((now/700 + i*0.25) % 1);
      const fx = ax + Math.cos(angle)*dist*t;
      const fy = ay + Math.sin(angle)*dist*t;
      const fa = Math.sin(t*Math.PI)*0.8;
      ctx.beginPath(); ctx.arc(fx,fy,3,0,Math.PI*2);
      ctx.fillStyle='rgba(255,199,44,'+fa.toFixed(2)+')'; ctx.fill();
    }

    // Node B dot
    const bp = 0.4+0.4*Math.sin(now/480);
    ctx.beginPath(); ctx.arc(bx, by, 22+8*bp, 0, Math.PI*2);
    ctx.strokeStyle='rgba(80,160,255,'+(0.2*bp).toFixed(2)+')'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.beginPath(); ctx.arc(bx, by, 14, 0, Math.PI*2);
    ctx.fillStyle='rgba(80,160,255,1)'; ctx.shadowColor='rgba(80,160,255,1)'; ctx.shadowBlur=22; ctx.fill(); ctx.shadowBlur=0;
    ctx.fillStyle='#fff'; ctx.font='bold 10px Courier New';
    ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('B', bx, by);

    // Match score colour
    const normDist = nodeB ? Math.hypot(nodeA.x-(nodeB.x||0), nodeA.y-(nodeB.y||0)) : 1;
    const ms = Math.max(0, 1-normDist/0.15);
    const lr = Math.round(80+175*(1-ms)), lg = Math.round(160+95*ms), lb = Math.round(255*(1-ms));
    ctx.strokeStyle='rgba('+lr+','+lg+','+lb+','+(0.4+0.3*Math.sin(now/400)).toFixed(2)+')';
    ctx.lineWidth=2; ctx.setLineDash([8,12]); ctx.stroke(); ctx.setLineDash([]);

    if(ms>0.85){
      ctx.beginPath(); ctx.arc(bx,by,24+4*Math.sin(now/200),0,Math.PI*2);
      ctx.strokeStyle='rgba(44,255,100,0.7)'; ctx.lineWidth=2; ctx.stroke();
    }

    // Locked pairs as green dots
    pairs.forEach(function(p,i){
      const px=p.a.x*W, py=p.a.y*H;
      ctx.beginPath(); ctx.arc(px,py,10,0,Math.PI*2);
      ctx.fillStyle='rgba(44,255,100,0.8)'; ctx.shadowColor='rgba(44,255,100,1)'; ctx.shadowBlur=14; ctx.fill(); ctx.shadowBlur=0;
      ctx.fillStyle='#000'; ctx.font='bold 8px Courier New';
      ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(i+1,px,py);
    });

    const screenDist = Math.round(dist);
    ctx.font='7px Courier New'; ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.textAlign='center';
    ctx.fillText(Math.round(ms*100)+'% · '+screenDist+'px', (ax+bx)/2, (ay+by)/2-12);
  }

  // ── Node C — purple (right-click desktop OR second hold phone) ────────
  if(nodeC){
    const cx2=nodeC.x*W, cy2=nodeC.y*H;
    const p=0.5+0.5*Math.sin(now/530);
    ctx.beginPath(); ctx.arc(cx2,cy2,26+8*p,0,Math.PI*2);
    ctx.strokeStyle='rgba(180,80,255,'+(0.2*p).toFixed(2)+')'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.beginPath(); ctx.arc(cx2,cy2,14,0,Math.PI*2);
    ctx.fillStyle='rgba(180,80,255,1)'; ctx.shadowColor='rgba(180,80,255,1)'; ctx.shadowBlur=22; ctx.fill(); ctx.shadowBlur=0;
    ctx.fillStyle='#fff'; ctx.font='bold 10px Courier New';
    ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('C',cx2,cy2);
  }

  // ── Triangle A-B-C ────────────────────────────────────────────────────
  if(nodeA && nodeB && nodeC){
    const ax=nodeA.x*W, ay=nodeA.y*H;
    const bx=nodeB.x*W+((nodeB.orient?nodeB.orient.gamma:0)*W*0.006);
    const by=nodeB.y*H+((nodeB.orient?nodeB.orient.beta:0)*H*0.006);
    const cx2=nodeC.x*W, cy2=nodeC.y*H;

    // Filled triangle (faint)
    ctx.beginPath(); ctx.moveTo(ax,ay); ctx.lineTo(bx,by); ctx.lineTo(cx2,cy2); ctx.closePath();
    ctx.fillStyle='rgba(180,80,255,0.06)'; ctx.fill();

    // Triangle edges — A-C and B-C in purple
    const tp=0.4+0.3*Math.sin(now/450);
    [[ax,ay,cx2,cy2],[bx,by,cx2,cy2]].forEach(function(seg){
      ctx.beginPath(); ctx.moveTo(seg[0],seg[1]); ctx.lineTo(seg[2],seg[3]);
      ctx.strokeStyle='rgba(180,80,255,'+tp.toFixed(2)+')';
      ctx.lineWidth=1.5; ctx.setLineDash([6,10]); ctx.stroke(); ctx.setLineDash([]);
    });

    // Triangle metrics — centroid label
    const gx=(ax+bx+cx2)/3, gy=(ay+by+cy2)/3;
    const sideAB=Math.hypot(bx-ax,by-ay);
    const sideBC=Math.hypot(cx2-bx,cy2-by);
    const sideCA=Math.hypot(ax-cx2,ay-cy2);
    const area=Math.abs((bx-ax)*(cy2-ay)-(cx2-ax)*(by-ay))/2;
    ctx.font='7px Courier New'; ctx.fillStyle='rgba(180,80,255,0.7)'; ctx.textAlign='center';
    ctx.fillText('▲ '+Math.round(area)+'px²', gx, gy-8);
    ctx.fillStyle='rgba(180,80,255,0.4)';
    ctx.fillText('AB:'+Math.round(sideAB)+' BC:'+Math.round(sideBC)+' CA:'+Math.round(sideCA), gx, gy+8);
  }

  // ── PERSPECTIVE SOLVE — 3+ pairs locked ──────────────────────────────
  if(pairs.length>=3){
    // Recompute homography from current pairs
    const pts = pairs.slice(0,3).map(function(p){
      return { u:p.b.x, v:p.b.y, x:p.a.x, y:p.a.y };
    });
    homography = solveAffine(pts);

    if(homography){
      const Hm = homography;

      // Draw warped phone outline — project phone corners (0,0),(1,0),(1,1),(0,1)
      const corners = [{u:0,v:0},{u:1,v:0},{u:1,v:1},{u:0,v:1}];
      const proj = corners.map(function(c){ const p=applyH(Hm,c.u,c.v); return {x:p.x*W,y:p.y*H}; });
      ctx.beginPath();
      ctx.moveTo(proj[0].x, proj[0].y);
      for(let i=1;i<4;i++) ctx.lineTo(proj[i].x, proj[i].y);
      ctx.closePath();
      ctx.strokeStyle='rgba(44,255,100,0.35)'; ctx.lineWidth=1.5;
      ctx.setLineDash([4,8]); ctx.stroke(); ctx.setLineDash([]);

      // Draw warped grid (4×4) inside projected phone rect
      ctx.strokeStyle='rgba(44,255,100,0.12)'; ctx.lineWidth=1;
      for(let s=1;s<4;s++){
        const t=s/4;
        const l1=applyH(Hm,t,0), l2=applyH(Hm,t,1);
        ctx.beginPath(); ctx.moveTo(l1.x*W,l1.y*H); ctx.lineTo(l2.x*W,l2.y*H); ctx.stroke();
        const l3=applyH(Hm,0,t), l4=applyH(Hm,1,t);
        ctx.beginPath(); ctx.moveTo(l3.x*W,l3.y*H); ctx.lineTo(l4.x*W,l4.y*H); ctx.stroke();
      }

      // Matrix overlay — top-left corner
      const mx=28, my=28, lh=16;
      ctx.font='bold 10px Courier New'; ctx.fillStyle='rgba(44,255,100,0.9)';
      ctx.textAlign='left';
      ctx.fillText('PERSPECTIVE SOLVED', mx, my);
      ctx.font='8px Courier New'; ctx.fillStyle='rgba(44,255,100,0.55)';
      ctx.fillText('AFFINE Hm  [phone → desktop]', mx, my+lh);
      const rows = [Hm[0],Hm[1],Hm[2]];
      rows.forEach(function(row,i){
        const txt='[ '+row.map(function(v){ return v.toFixed(4); }).join('  ')+' ]';
        ctx.fillText(txt, mx, my+lh*2+i*lh);
      });

      // Residuals — reprojection error per pair
      ctx.fillStyle='rgba(44,255,100,0.35)';
      pairs.forEach(function(p,i){
        const pred=applyH(Hm,p.b.x,p.b.y);
        const err=Math.hypot(pred.x-p.a.x,pred.y-p.a.y)*Math.max(W,H);
        ctx.fillText('PAIR '+(i+1)+' ERR: '+err.toFixed(1)+'px', mx, my+lh*5+i*lh);
      });
    }
  }

  // ── GAME OVERLAY ─────────────────────────────────────────────────────
  if(game.state==='idle'){
    ctx.font='bold 13px Courier New'; ctx.fillStyle='rgba(255,199,44,0.5)';
    ctx.textAlign='center';
    ctx.fillText('PRESS SPACE TO START CALIBRATION GAME', W/2, H-60);
    ctx.font='8px Courier New'; ctx.fillStyle='rgba(255,255,255,0.2)';
    ctx.fillText('3 ROUNDS · PLANT B ON A BEFORE TIMER · SCORE = ACCURACY × SPEED', W/2, H-44);
  }

  if((game.state==='active'||game.state==='done') && nodeA){
    const ax=nodeA.x*W, ay=nodeA.y*H;
    const timeLeft = Math.max(0, game.deadline-now);
    const frac = timeLeft/8000;

    if(game.state==='active'){
      // Timer arc around Node A
      const urgent = frac<0.35;
      const arcCol = urgent ? 'rgba(255,80,80,0.9)' : 'rgba(44,255,100,0.9)';
      ctx.beginPath(); ctx.arc(ax,ay,32,-Math.PI/2,-Math.PI/2+frac*Math.PI*2);
      ctx.strokeStyle=arcCol; ctx.lineWidth=3; ctx.stroke();
      // Time text
      ctx.font='bold 9px Courier New'; ctx.fillStyle=arcCol; ctx.textAlign='center';
      ctx.fillText((timeLeft/1000).toFixed(1)+'s', ax, ay+46);
      // Urgency pulse on node
      if(urgent){
        const up=0.5+0.5*Math.sin(now/80);
        ctx.beginPath(); ctx.arc(ax,ay,18+up*6,0,Math.PI*2);
        ctx.strokeStyle='rgba(255,80,80,'+(0.4*up).toFixed(2)+')'; ctx.lineWidth=2; ctx.stroke();
      }
    }

    // Round indicator top-centre
    ctx.font='8px Courier New'; ctx.fillStyle='rgba(255,199,44,0.6)'; ctx.textAlign='center';
    ctx.fillText('ROUND '+(Math.min(game.round+1,3))+' / 3', W/2, 24);

    // Score top-right
    ctx.font='bold 11px Courier New'; ctx.fillStyle='rgba(255,199,44,0.8)'; ctx.textAlign='right';
    ctx.fillText(game.score+' PTS', W-230, 24);
  }

  // Green flash on pair locked
  if(game.flash && now-game.flash<600){
    const fa=(1-(now-game.flash)/600)*0.25;
    ctx.fillStyle='rgba(44,255,100,'+fa.toFixed(3)+')';
    ctx.fillRect(0,0,W,H);
    if(game.results.length){
      const last=game.results[game.results.length-1];
      ctx.font='bold 22px Courier New'; ctx.fillStyle='rgba(44,255,100,0.9)'; ctx.textAlign='center';
      ctx.fillText('+'+last.pts+' PTS', W/2, H/2-20);
      ctx.font='10px Courier New'; ctx.fillStyle='rgba(255,255,255,0.7)';
      ctx.fillText(Math.round(last.match*100)+'% MATCH', W/2, H/2+10);
    }
  }

  // Final results — understanding gained
  if(game.state==='done' && game.results.length>=3){
    // Triangle coverage = area of 3 locked pair positions relative to screen
    const ap=pairs[0]||{a:{x:0,y:0}}, bp2=pairs[1]||{a:{x:1,y:0}}, cp2=pairs[2]||{a:{x:0.5,y:1}};
    const triArea=Math.abs((bp2.a.x-ap.a.x)*(cp2.a.y-ap.a.y)-(cp2.a.x-ap.a.x)*(bp2.a.y-ap.a.y))/2;
    const coverage=Math.min(100,Math.round(triArea*800)); // 0.125 = full quadrant = 100%
    const avgMatch=Math.round(game.results.reduce(function(s,r){return s+r.match;},0)/game.results.length*100);

    const rx=W/2, ry=H/2-60;
    ctx.fillStyle='rgba(5,5,5,0.85)'; ctx.fillRect(rx-200,ry-30,400,220);
    ctx.strokeStyle='rgba(44,255,100,0.4)'; ctx.lineWidth=1; ctx.strokeRect(rx-200,ry-30,400,220);
    ctx.font='bold 12px Courier New'; ctx.fillStyle='rgba(44,255,100,1)'; ctx.textAlign='center';
    ctx.fillText('CALIBRATION COMPLETE', rx, ry);
    ctx.font='9px Courier New'; ctx.fillStyle='rgba(255,255,255,0.5)';
    ctx.fillText('TOTAL: '+game.score+' PTS  ·  AVG ACCURACY: '+avgMatch+'%', rx, ry+22);

    // Understanding bar
    ctx.fillStyle='rgba(255,255,255,0.15)'; ctx.fillRect(rx-160,ry+42,320,14);
    ctx.fillStyle='rgba(44,255,100,0.8)';   ctx.fillRect(rx-160,ry+42,320*(coverage/100),14);
    ctx.font='8px Courier New'; ctx.fillStyle='rgba(44,255,100,0.9)'; ctx.textAlign='center';
    ctx.fillText('SPATIAL UNDERSTANDING GAINED: '+coverage+'%', rx, ry+70);

    // Per-round breakdown
    game.results.forEach(function(r,i){
      ctx.fillStyle='rgba(255,199,44,0.6)'; ctx.textAlign='left';
      ctx.fillText('R'+(i+1)+': '+Math.round(r.match*100)+'% match · '+(r.time/1000).toFixed(1)+'s · +'+r.pts+' pts', rx-160, ry+94+i*20);
    });

    ctx.font='9px Courier New'; ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.textAlign='center';
    ctx.fillText('SPACE TO PLAY AGAIN', rx, ry+160);
  }

  requestAnimationFrame(draw);
}
draw();
</script>

</html>
