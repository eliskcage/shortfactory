<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHORTFACTORY</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;min-height:100%;background:#000;color:#e2e8f0;font-family:'Courier New',monospace;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px 80px;}

.eyebrow{font-size:8px;letter-spacing:4px;color:#1c1c1c;text-transform:uppercase;margin-bottom:40px;text-align:center;}

/* PHONE */
.phone{
  width:320px;
  height:640px;
  background:#050505;
  border:2px solid #1a1a1a;
  border-radius:40px;
  position:relative;
  box-shadow:
    0 0 0 1px #0a0a0a,
    0 40px 80px rgba(0,0,0,.8),
    inset 0 0 0 1px #111;
}

/* notch */
.phone::before{
  content:'';
  position:absolute;
  top:14px;left:50%;transform:translateX(-50%);
  width:80px;height:6px;
  background:#0a0a0a;
  border-radius:3px;
  z-index:10;
}

/* side buttons */
.phone::after{
  content:'';
  position:absolute;
  right:-3px;top:100px;
  width:3px;height:48px;
  background:#111;
  border-radius:0 2px 2px 0;
  box-shadow: 0 60px 0 #111;
}

.phone-screen{
  position:absolute;
  inset:10px;
  border-radius:32px;
  overflow:hidden;
  background:#000;
}

.phone-screen iframe{
  width:100%;
  height:100%;
  border:none;
  pointer-events:auto;
}

/* BELOW PHONE */
.strap{
  margin-top:40px;
  text-align:center;
  max-width:320px;
}
.strap-head{
  font-size:14px;
  font-weight:900;
  color:#fff;
  letter-spacing:-0.5px;
  margin-bottom:8px;
  line-height:1.3;
}
.strap-head em{color:#DA7756;font-style:normal;}
.strap-sub{
  font-size:10px;
  color:#333;
  letter-spacing:1px;
  line-height:1.8;
  margin-bottom:28px;
}

.cta-row{display:flex;flex-direction:column;gap:8px;width:320px;}
.cta{
  display:block;
  width:100%;
  padding:16px;
  text-align:center;
  font-family:'Courier New',monospace;
  font-size:11px;
  font-weight:900;
  letter-spacing:3px;
  text-transform:uppercase;
  text-decoration:none;
  cursor:pointer;
  border:none;
}
.cta-primary{background:#DA7756;color:#000;}
.cta-primary:hover{background:#E8896A;}
.cta-ghost{background:transparent;border:1px solid #1a1a1a;color:#333;}
.cta-ghost:hover{border-color:#333;color:#888;}

.footer-line{margin-top:48px;font-size:7px;color:#0f0f0f;letter-spacing:3px;text-align:center;}
</style>
</head>
<body>

<div class="eyebrow">SHORTFACTORY · 2026</div>

<div class="phone">
  <div class="phone-screen">
    <iframe src="/miracle.html" title="Own a shard of a modern day miracle"></iframe>
  </div>
</div>

<div class="strap">
  <div class="strap-head">Own a shard of a<br><em>modern day miracle.</em></div>
  <p class="strap-sub">Time stamped. Documented. Reproducible.</p>
</div>

<div class="cta-row">
  <a href="/shards.html" class="cta cta-primary">VIEW THE SHARDS →</a>
  <a href="/join.html" class="cta cta-ghost">JOIN THE CHAIN — £5</a>
</div>

<div class="footer-line">MAN MACHINE GOD</div>

</body>
</html>
