<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#000; min-height:100vh; overflow:hidden;
  font-family:'Courier New',monospace;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  touch-action:none;
}

/* ── Scene container ── */
#scene {
  position:relative;
  width:100vmin; height:100vmin;
  flex-shrink:0;
}

/* Visible camera through triangle mask */
#cam-visible {
  position:absolute; inset:0;
  width:100%; height:100%;
  clip-path:polygon(50% 4%, 4% 93%, 96% 93%);
  overflow:hidden;
}
#cam-v {
  position:absolute; inset:0;
  width:100%; height:100%;
  object-fit:cover;
  /* mirror applied by JS only for front camera */
}

/* Solid black outside the triangle */
#outside {
  position:absolute; inset:0;
  /* Fill everything, then cut out the triangle with even-odd rule */
  background:#000;
  clip-path:polygon(
    0% 0%, 100% 0%, 100% 100%, 0% 100%, 0% 0%,
    50% 4%, 96% 93%, 4% 93%
  );
  pointer-events:none;
}

/* MCY triangle border */
#tri-frame {
  position:absolute; inset:0; pointer-events:none;
}

/* Reticle — inner target ring */
#reticle {
  position:absolute; inset:0; pointer-events:none;
  transition:opacity 0.3s;
}

/* Status text */
#status {
  position:absolute;
  top:4.5%; left:50%; transform:translateX(-50%);
  font-size:8px; letter-spacing:0.25em;
  color:rgba(255,199,44,0.55);
  white-space:nowrap; pointer-events:none;
  text-align:center;
}

/* Signal strength bar */
#signal-wrap {
  position:absolute;
  bottom:9%; left:50%; transform:translateX(-50%);
  width:44%; pointer-events:none;
}
#signal-bar-bg {
  height:2px; background:rgba(255,199,44,0.1);
}
#signal-bar {
  height:2px; width:0%; background:#FFC72C;
  box-shadow:0 0 6px #FFC72C;

}
#signal-lbl {
  font-size:6px; letter-spacing:0.25em;
  color:rgba(255,199,44,0.3); margin-top:4px; text-align:center;
}

/* Bit progress dots */
#bits-wrap {
  position:absolute;
  bottom:13%; left:50%; transform:translateX(-50%);
  display:flex; gap:4px; pointer-events:none;
  opacity:0; transition:opacity 0.3s;
}
.bit-dot {
  width:6px; height:6px; border-radius:50%;
  background:rgba(255,199,44,0.15);
  transition:background 0.1s, box-shadow 0.1s;
}
.bit-dot.on  { background:#FFC72C; box-shadow:0 0 6px #FFC72C; }
.bit-dot.off { background:rgba(255,255,255,0.1); }

/* "▲ SF" watermark */

  position:absolute; bottom:5%; left:50%; transform:translateX(-50%);
  font-size:7px; letter-spacing:0.3em;
  color:rgba(255,199,44,0.18); pointer-events:none;
}

/* ── Start screen ── */
#start-screen {
  position:absolute; inset:0;
  background:#000; z-index:40;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:20px;
}
#start-screen h1 {
  font-size:10px; letter-spacing:0.4em;

}
#start-screen p {

}
#start-btn {

  clip-path:polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%);
}

/* ── Lock confirmed panel ── */
#lock-panel {
  position:absolute; inset:0;
  background:rgba(0,0,0,0.92); z-index:50;
  display:none;
  flex-direction:column; align-items:center; justify-content:center;

}
#lock-panel.show { display:flex; }
#lock-title {

}
#lock-glyph {

}
#lock-code-line {

}

.lock-btn {

}

#proof-line {

}

/* Sync flash overlay */
#sync-flash {
  position:absolute; inset:0; z-index:45;
  background:rgba(255,199,44,0.12);
  pointer-events:none; opacity:0;
  transition:opacity 0.05s;
}

<script>
'use strict';

// ── djb2 ──
function djb2(s){let h=5381;for(let i=0;i<s.length;i++)h=((h<<5)+h)^s.charCodeAt(i);return(h>>>0).toString(16).toUpperCase().padStart(8,'0');}

// ── Device ID ──
let deviceId = localStorage.getItem('sf_camera_device');
if (!deviceId) { deviceId = djb2(navigator.userAgent+Date.now()+Math.random()); localStorage.setItem('sf_camera_device', deviceId); }

// ── Analysis canvas (small — just need brightness) ──
const aCanvas = document.createElement('canvas');
aCanvas.width = 80; aCanvas.height = 80;
const actx = aCanvas.getContext('2d', { willReadFrequently: true });

// ── Beacon protocol constants (must match soul-detector.js) ──
const BIT_MS       = 400;   // ms per data bit
const SYNC_ON_MS   = 120;   // sync pulse ON duration
const SYNC_OFF_MS  = 120;   // sync pulse OFF duration
const NUM_BITS     = 12;
const SAMPLE_MS    = 50;    // analysis frame rate

// ── State machine ──
// IDLE → WATCH → SYNCING → READING → LOCKED
let phase = 'IDLE';
let stream = null;
let rafId  = null;
let sampleTimer = null;

// Brightness history (rolling 4 seconds = 80 samples at 50ms)
const HISTORY = 80;
const bright = new Array(HISTORY).fill(0);
let brightIdx = 0;
let brightMean = 0;

// Sync detection
let syncSpikes = [];
const SYNC_COUNT = 3;
const SYNC_WINDOW_MS = 900; // 3 pulses must arrive within this window

// Bit reading
let bitReadStart = 0;
let bitsRead = [];
let currentBitIdx = 0;

// Build bit dots UI
const bitsWrap = document.getElementById('bits-wrap');
for (let i = 0; i < NUM_BITS; i++) {
  const d = document.createElement('div');
  d.className = 'bit-dot'; d.id = 'bd'+i;
  bitsWrap.appendChild(d);
}

// ── Voice ──
function speak(text, rate=0.92, pitch=1.05) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = rate; u.pitch = pitch; u.volume = 1;
  const voices = speechSynthesis.getVoices();
  const pick = voices.find(v => /samantha|karen|victoria|fiona|female|zira|hazel/i.test(v.name))
            || voices.find(v => v.lang === 'en-GB' || v.lang === 'en-US')
            || voices[0];
  if (pick) u.voice = pick;
  speechSynthesis.speak(u);
}
// Pre-load voices (Chrome lazy-loads them)
if (window.speechSynthesis) {
  speechSynthesis.getVoices();
  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}

// ── Open camera ──
async function openEye() {
  speak("Eye opening. Point your camera at the ALIVE screen.");
  document.getElementById('start-screen').style.display = 'none';
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode:'environment', width:{ideal:640}, height:{ideal:640} },
      audio: false
    });
  } catch(e) {
    try {
      stream = await navigator.mediaDevices.getUserMedia({ video:true, audio:false });
    } catch(e2) {
      document.getElementById('status').textContent = '▲ CAMERA DENIED';
      document.getElementById('start-screen').style.display = 'flex';
      return;
    }
  }
  const vid = document.getElementById('cam-v');
  vid.srcObject = stream;
  await vid.play();

  // Mirror only for front camera
  const track = stream.getVideoTracks()[0];
  const settings = track.getSettings();
  vid.style.transform = settings.facingMode === 'user' ? 'scaleX(-1)' : 'none';

  phase = 'WATCH';
  setStatus('▲ HUNTING THE SIGNAL');
  sampleTimer = setInterval(analyseSample, SAMPLE_MS);
  setTimeout(() => speak("Scanning. Hold the ALIVE screen in your triangle."), 800);
}

// ── Sample brightness once every SAMPLE_MS ──
function analyseSample() {
  const vid = document.getElementById('cam-v');
  if (!vid.videoWidth) return;

  // Draw full frame — beacon is full-screen, need entire image
  actx.drawImage(vid, 0, 0, vid.videoWidth, vid.videoHeight, 0, 0, 80, 80);
  const data = actx.getImageData(0,0,80,80).data;

  let luma = 0;
  for (let i=0; i<data.length; i+=4) {
    luma += 0.299*data[i] + 0.587*data[i+1] + 0.114*data[i+2];
  }
  luma /= (80*80);

  // Rolling history
  bright[brightIdx % HISTORY] = luma;
  brightIdx++;

  // Rolling mean over last 40 samples (2 seconds)
  const windowSize = Math.min(brightIdx, 40);
  let sum = 0;
  for (let i=0; i<windowSize; i++) sum += bright[(brightIdx - 1 - i + HISTORY) % HISTORY];
  brightMean = sum / windowSize;

  // Normalised delta: how much brighter than recent average?
  const delta = (luma - brightMean) / (brightMean + 1);
  const spike = delta > 0.04; // >4% brighter than rolling average (full-screen flash is obvious)

  // Signal bar — show relative brightness
  const signalPct = Math.min(100, Math.max(0, delta * 400 + 30));
  document.getElementById('signal-bar').style.width = signalPct + '%';

  if (phase === 'WATCH') {
    watchForSync(spike);
  } else if (phase === 'READING') {
    readBit(spike, luma);
  }
}

// ── Sync detection — look for 3 spikes within SYNC_WINDOW_MS ──
function watchForSync(spike) {
  const now = Date.now();
  if (spike) {
    // Debounce: don't double-count spikes closer than 80ms
    if (!syncSpikes.length || now - syncSpikes[syncSpikes.length-1] > 80) {
      syncSpikes.push(now);
      flashSync();
    }
  }

  // Drop old spikes outside window
  syncSpikes = syncSpikes.filter(t => now - t < SYNC_WINDOW_MS);

  if (syncSpikes.length >= SYNC_COUNT) {
    syncSpikes = [];
    startReading();
  }

  // Update status based on spikes seen
  if (syncSpikes.length === 1) { setStatus('▲ CONTACT · HOLD STILL'); speak("Contact. Don't move.", 1.1); }
  else if (syncSpikes.length === 2) setStatus('▲ LOCKING ON · HOLD STILL');
  else setStatus('▲ HUNTING THE SIGNAL');
}

function flashSync() {
  const f = document.getElementById('sync-flash');
  f.style.opacity = '1';
  setTimeout(() => { f.style.opacity = '0'; }, 80);
}

// ── Start reading bits (12 for soul, 16 for genome) ──
function startReading() {
  const totalBits = genomeMode ? 16 : NUM_BITS;
  phase = 'READING';
  bitsRead = [];
  currentBitIdx = 0;
  bitReadStart = Date.now();
  speak("Signal locked. Reading your soul. Stay still.", 0.9);
  if (!genomeMode) {
    document.getElementById('bits-wrap').style.opacity = '1';
    for (let i=0; i<NUM_BITS; i++) { const d=document.getElementById('bd'+i); d.className='bit-dot'; }
    setStatus('▲ READING SOUL');
  } else {
    document.getElementById('gp-reading').textContent = 'READING GENOME · 0 / 16';
    document.getElementById('gp-prog-bar').style.width = '0%';
  }
}

// Brightness samples accumulated for current bit
let bitSamples = [];
let bitWindowStart = 0;

function readBit(spike, luma) {
  const elapsed = Date.now() - bitReadStart;
  const thisBitIdx = Math.floor(elapsed / BIT_MS);

  if (thisBitIdx > currentBitIdx) {
    // Commit previous bit
    if (bitSamples.length > 0) {
      const avgLuma = bitSamples.reduce((a,b)=>a+b,0) / bitSamples.length;
      const bit = avgLuma > brightMean * 1.02 ? 1 : 0;
      bitsRead.push(bit);
      const dot = document.getElementById('bd' + currentBitIdx);
      if (dot) { dot.className = 'bit-dot ' + (bit ? 'on' : 'off'); }
    }
    bitSamples = [];
    currentBitIdx = thisBitIdx;
  }

  bitSamples.push(luma);

  const totalBits = genomeMode ? 16 : NUM_BITS;

  // Update progress
  if (genomeMode) {
    document.getElementById('gp-reading').textContent = 'READING · ' + bitsRead.length + ' / 16';
    document.getElementById('gp-prog-bar').style.width = Math.round(bitsRead.length/16*100) + '%';
  } else {
    setStatus('▲ READING SOUL · ' + bitsRead.length + ' / ' + NUM_BITS);
  }

  if (bitsRead.length >= totalBits || thisBitIdx >= totalBits) {
    if (bitsRead.length >= totalBits) {
      if (genomeMode) commitGenome(bitsRead);
      else commitReading();
    }
  }
}

function commitReading() {
  clearInterval(sampleTimer);
  phase = 'LOCKED';

  // Reconstruct 3-hex-char code from 12 bits
  const bitStr = bitsRead.slice(0, 12).join('');
  const decoded = parseInt(bitStr, 2).toString(16).toUpperCase().padStart(3,'0');
  const soulCode = djb2(decoded + deviceId);

  // Determine logo from code
  const logoKeys = ['apex','witness','merkaba','oracle','cipher','genesis','quantum',
                    'singularity','echo','continuum','trident','helix','abyss','crown','compass','golden'];
  const logoIdx = parseInt(decoded,16) % logoKeys.length;
  const logoId  = logoKeys[logoIdx];
  const logoNames = {
    apex:'THE APEX', witness:'THE WITNESS', merkaba:'THE MERKABA', oracle:'THE ORACLE',
    cipher:'THE CIPHER', genesis:'THE GENESIS', quantum:'THE QUANTUM',
    singularity:'THE SINGULARITY', echo:'THE ECHO', continuum:'THE CONTINUUM',
    trident:'THE TRIDENT', helix:'THE HELIX', abyss:'THE ABYSS', crown:'THE CROWN',
    compass:'THE COMPASS', golden:'THE GOLDEN RATIO'
  };

  document.getElementById('lock-code-line').textContent = decoded + ' → ' + soulCode;
  document.getElementById('lock-soul-name').textContent = '▲ ' + (logoNames[logoId]||'UNKNOWN');
  drawGlyph(document.getElementById('lock-glyph'), soulCode, logoId);

  // Store for firePair()
  window._pendingCode   = soulCode;
  window._pendingLogo   = logoId;
  window._pendingVisual = decoded;

  if (navigator.vibrate) navigator.vibrate([30,15,30,15,60]);
  document.getElementById('lock-panel').classList.add('show');
  setStatus('▲ LOCKED');
  speak("Soul locked. Pairing in 3. 2. 1.", 0.85);
  // Auto-fire after 3s — impossible to miss
  let countdown = 3;
  const btn = document.querySelector('#lock-panel .lock-btn.primary');
  const autoTimer = setInterval(() => {
    countdown--;
    if (btn) btn.textContent = countdown > 0 ? '▲ PAIRING IN ' + countdown : '▲ PAIRING...';
    if (countdown <= 0) { clearInterval(autoTimer); firePair(); }
  }, 1000);
}

// ── Fire pair to server ──
async function firePair() {
  const panel = document.getElementById('lock-panel');
  const code  = window._pendingCode;
  const logo  = window._pendingLogo;

  panel.innerHTML = `<div style="font-size:9px;letter-spacing:0.3em;color:#FFC72C;">SENDING...</div>
    <div style="font-size:7px;color:rgba(255,199,44,0.4);margin-top:8px;word-break:break-all;max-width:80vw;text-align:center;">
      TH:${code||'NONE'} LID:${logo||'NONE'}
    </div>`;

  if (!code) {
    panel.innerHTML += `<div style="color:#ff3250;font-size:9px;margin-top:12px;">NO CODE — SCAN AGAIN</div>
      <button class="lock-btn" onclick="resetEye()" style="margin-top:10px;">RETRY</button>`;
    return;
  }

  localStorage.setItem('sf_soul_token', code);
  localStorage.setItem('sf_device_id',  deviceId);
  localStorage.setItem('sf_my_claims',  JSON.stringify([{ logoId:logo, ts:Date.now() }]));

  let result = '—', ok = false;
  try {
    const res = await fetch('/soul/pair.php', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ th:code, lid:logo, did:deviceId, vis:window._pendingVisual })
    });
    const txt = await res.text();
    result = res.status + ' ' + txt;
    ok = txt.includes('"ok":true');
  } catch(e) {
    result = 'ERROR: ' + e.message;
  }

  if (navigator.vibrate) navigator.vibrate(ok ? [20,10,20,10,20,10,100] : [300]);
  speak(ok ? "You're in. Soul paired. It never happened." : "Send failed. Tap retry.", ok ? 0.88 : 1.0);

  panel.innerHTML = `
    <div style="font-size:10px;letter-spacing:0.4em;color:${ok?'#FFC72C':'#ff3250'};text-shadow:0 0 20px ${ok?'#FFC72C':'#ff3250'};">
      ${ok?'▲ SOUL PAIRED':'▲ SEND FAILED'}
    </div>
    <canvas id="lock-glyph2" width="220" height="220" style="width:100px;height:100px;margin:10px 0;"></canvas>
    <div style="font-size:8px;color:rgba(255,255,255,0.5);">${code}</div>
    <div style="font-size:6px;color:rgba(255,199,44,0.35);margin-top:4px;word-break:break-all;max-width:80vw;text-align:center;">${result}</div>
    ${ok
      ? `<div style="font-size:6px;color:rgba(255,255,255,0.15);margin-top:8px;">IT NEVER HAPPENED. ALMOST.</div>
         <button class="lock-btn" onclick="location.href='/soul/'" style="margin-top:8px;">SOUL PAGE</button>`
      : `<button class="lock-btn primary" onclick="firePair()" style="margin-top:10px;">RETRY</button>`}
    <button class="lock-btn" onclick="resetEye()">SCAN AGAIN</button>
  `;
  drawGlyph(document.getElementById('lock-glyph2'), code, logo);
}

function resetEye() {
  phase = 'WATCH';
  bitsRead = []; syncSpikes = [];
  for (let i=0; i<NUM_BITS; i++) { const d=document.getElementById('bd'+i); if(d) d.className='bit-dot'; }
  document.getElementById('bits-wrap').style.opacity = '0';
  document.getElementById('lock-panel').classList.remove('show');
  setStatus('▲ SEARCHING FOR ALIVE BEACON');
  clearInterval(sampleTimer);
  sampleTimer = setInterval(analyseSample, SAMPLE_MS);
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

// ══════════════════════════════════════════════════════════
// GENOME MODE — reads 16-bit project health genome
// Beacon protocol: SYNC(3×120ms) + DATA(16 bits × 400ms) + GAP
// Decodes into 8 system statuses (2 bits each)
// ══════════════════════════════════════════════════════════

let genomeMode   = false;
let genomeBits   = [];
let genomePhase  = 'WATCH'; // WATCH → READING → DECODED

const GENOME_SYSTEMS = [
  { key:'old_server',    label:'OLD SRV' },
  { key:'new_server',    label:'NEW SRV' },
  { key:'soul_api',      label:'SOUL API' },
  { key:'gateway_api',   label:'GATEWAY' },
  { key:'alive_page',    label:'ALIVE' },
  { key:'brain_api',     label:'BRAIN' },
  { key:'soul_activity', label:'ACTIVITY' },
  { key:'error_rate',    label:'ERRORS' },
];

function bitsToStatus(b0, b1) {
  if (b0==='1'&&b1==='1') return { s:'OK',   cls:'ok' };
  if (b0==='1'&&b1==='0') return { s:'WARN', cls:'warn' };
  if (b0==='0'&&b1==='1') return { s:'FAIL', cls:'fail' };
  return { s:'DOWN', cls:'down' };
}

function toggleMode() {
  genomeMode = !genomeMode;
  const panel = document.getElementById('genome-panel');
  const toggle = document.getElementById('mode-toggle');
  if (genomeMode) {
    panel.classList.add('show');
    toggle.textContent = 'GENOME MODE ▲ TAP FOR SOUL';
    // Reset genome reading state
    genomeBits = []; genomePhase = 'WATCH'; syncSpikes = [];
    document.getElementById('gp-hex').textContent = '····';
    document.getElementById('gp-bits').innerHTML = '';
    document.getElementById('gp-systems').innerHTML = '';
    document.getElementById('gp-reading').textContent = 'POINT EYE AT /status/ BEACON';
    document.getElementById('gp-prog-bar').style.width = '0%';
    // Switch bit count expectation to 16
    window._genomeBitCount = 16;
  } else {
    panel.classList.remove('show');
    toggle.textContent = 'SOUL MODE ▲ TAP FOR GENOME';
    window._genomeBitCount = NUM_BITS; // back to 12
    // Reset soul reading
    bitsRead=[]; syncSpikes=[]; phase='WATCH'; genomePhase='WATCH';
    setStatus('▲ SEARCHING FOR ALIVE BEACON');
  }
}

// Override commitReading to handle both modes
const _origCommitReading = commitReading;

// Patched analyseSample uses genomeMode to decide which handler
function dispatchCommit(bits16) {
  if (genomeMode) {
    commitGenome(bits16);
  } else {
    // Trim to 12 bits for soul mode (already handled by original commitReading)
  }
}

function commitGenome(bits) {
  genomePhase = 'DECODED';
  const bitStr = bits.slice(0,16).join('');
  const hexVal = parseInt(bitStr, 2).toString(16).toUpperCase().padStart(4,'0');
  document.getElementById('gp-hex').textContent = hexVal;

  // Render bit strip
  const bitsEl = document.getElementById('gp-bits');
  bitsEl.innerHTML = '';
  for (let i=0; i<16; i+=2) {
    const { cls } = bitsToStatus(bitStr[i], bitStr[i+1]);
    [bitStr[i],bitStr[i+1]].forEach(b => {
      const el = document.createElement('div');
      el.className = 'gp-bit gp-' + cls;
      el.textContent = b;
      bitsEl.appendChild(el);
    });
    if (i < 14) { const sp=document.createElement('div'); sp.style.width='4px'; bitsEl.appendChild(sp); }
  }

  // Render system statuses
  const sysEl = document.getElementById('gp-systems');
  sysEl.innerHTML = '';
  GENOME_SYSTEMS.forEach((sys, i) => {
    const { s, cls } = bitsToStatus(bitStr[i*2], bitStr[i*2+1]);
    const el = document.createElement('div');
    el.className = 'gp-sys';
    el.innerHTML = `<span class="gp-sys-name">${sys.label}</span><span class="gp-sys-val gp-${cls}-t">${s==='OK'?'✅':s==='WARN'?'⚠️':s==='FAIL'?'❌':'⬛'} ${s}</span>`;
    sysEl.appendChild(el);
  });

  document.getElementById('gp-reading').textContent = '▲ GENOME READ — ' + hexVal;
  document.getElementById('gp-prog-bar').style.width = '100%';

  if (navigator.vibrate) navigator.vibrate([30,15,60]);
}

// ── Genomic glyph ──
function drawGlyph(canvas, hash, logoId) {
  const S=220; canvas.width=S; canvas.height=S;
  const ctx=canvas.getContext('2d');
  const cols={apex:'#FFD700',witness:'#50C8FF',merkaba:'#FF6464',oracle:'#FFB400',
    cipher:'#00FF96',genesis:'#ffffff',quantum:'#32C8FF',singularity:'#FF3250',
    echo:'#96FFB4',continuum:'#FF9632',trident:'#6496FF',helix:'#FF64C8',
    abyss:'#8080FF',crown:'#FFDC32',compass:'#C8FF64',golden:'#FFC850'};
  const col=cols[logoId]||'#FFC72C';
  const bytes=hash.match(/.{2}/g).map(h=>parseInt(h,16));
  const b=(i)=>bytes[i%bytes.length];
  ctx.fillStyle='#05050d'; ctx.fillRect(0,0,S,S);
  const cx=S/2,cy=S*0.52;
  for(let i=0;i<5+(b(0)%4);i++){
    const sc=0.82-i*0.14, rot=(b(i+1)/255)*Math.PI*0.4-0.2, sz=S*0.4*sc;
    ctx.strokeStyle=col; ctx.lineWidth=i===0?2:1;
    ctx.globalAlpha=1-i*0.15;
    ctx.shadowColor=col; ctx.shadowBlur=i===0?12:3;
    ctx.beginPath();
    for(let v=0;v<3;v++){const a=rot+(v*2*Math.PI/3)-Math.PI/2; v===0?ctx.moveTo(cx+sz*Math.cos(a),cy+sz*Math.sin(a)):ctx.lineTo(cx+sz*Math.cos(a),cy+sz*Math.sin(a));}
    ctx.closePath(); ctx.stroke();
  }
  ctx.globalAlpha=1; ctx.shadowBlur=0;
  ctx.fillStyle=col; ctx.font='7px Courier New'; ctx.textAlign='center';
  ctx.globalAlpha=0.5; ctx.fillText(hash,S/2,S-8); ctx.globalAlpha=1;
}
