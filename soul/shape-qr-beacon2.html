<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>▲ TRICODE BEACON [STAGING]</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:'Courier New',monospace;
  display:flex; align-items:center; justify-content:center; min-height:100vh; }
#beacon-canvas { display:block; }
#status { position:fixed; top:12px; left:50%; transform:translateX(-50%);
  font-size:8px; letter-spacing:.3em; color:rgba(255,199,44,.5); white-space:nowrap; }
#type-lbl { position:fixed; top:28px; left:50%; transform:translateX(-50%);
  font-size:7px; letter-spacing:.25em; color:rgba(255,255,255,.2); white-space:nowrap; }
#code-lbl { position:fixed; bottom:14px; left:50%; transform:translateX(-50%);
  font-size:9px; letter-spacing:.4em; color:rgba(255,199,44,.25); }
#v1-link { position:fixed; bottom:10px; right:10px;
  font-size:7px; letter-spacing:.2em; color:rgba(255,255,255,.12); text-decoration:none; }
#v1-link:hover { color:rgba(255,255,255,.4); }
#legend { position:fixed; top:12px; right:12px; display:flex; flex-direction:column; gap:3px; }
.leg { font-size:6px; letter-spacing:.15em; display:flex; align-items:center; gap:4px; }
.leg-dot { width:6px; height:6px; border-radius:50%; }
#commit-btn {
  position:fixed; top:10px; left:10px;
  background:none; border:1px solid rgba(255,199,44,.3); color:rgba(255,199,44,.6);
  font-family:'Courier New',monospace; font-size:7px; letter-spacing:.2em;
  padding:5px 10px; cursor:pointer; transition:all .2s;
}
#commit-btn:hover { border-color:#FFC72C; color:#FFC72C; box-shadow:0 0 12px rgba(255,199,44,.4); }
#commit-btn.done { border-color:#33FF66; color:#33FF66; }
#commit-btn.fail { border-color:#FF3333; color:#FF3333; }
</style>
</head>
<body>
<canvas id="beacon-canvas"></canvas>
<div id="status">▲ TRICODE BEACON · STAGING</div>
<div id="type-lbl">—</div>
<div id="code-lbl">—</div>
<button id="commit-btn" onclick="commitToLive()">▲ COMMIT TO LIVE</button>
<a id="v1-link" href="shape-beacon.html">← v1</a>
<div id="legend">
  <div class="leg"><div class="leg-dot" style="background:#FF3333"></div><span style="color:rgba(255,255,255,.2)">1 LINE</span></div>
  <div class="leg"><div class="leg-dot" style="background:#33FF66"></div><span style="color:rgba(255,255,255,.2)">2 LINES</span></div>
  <div class="leg"><div class="leg-dot" style="background:#3399FF"></div><span style="color:rgba(255,255,255,.2)">3 LINES</span></div>
</div>

<script data-cfasync="false">
'use strict';

// ══════════════════════════════════════════════════════════
// TRICODE ENGINE (Dan Chipchase)
// Shape-native 2D barcode — cells follow the geometry
// ══════════════════════════════════════════════════════════

function textToBits(text) {
  const bits = [];
  for (const ch of text) {
    const b = ch.charCodeAt(0);
    for (let i = 7; i >= 0; i--) bits.push((b >> i) & 1);
  }
  return bits;
}

function isAnchorDark(r, c) {
  if (r===0||r===4||c===0||c===4) return true;
  if (r===2&&c===2) return true;
  return false;
}

// ── TRIANGLE: native triangular cell grid ──
class TriangleCode {
  constructor(text, canvasEl) {
    this.text = text; this.canvas = canvasEl; this.N = 18;
    this.build();
  }
  build() {
    const N = this.N;
    const W = 480, H = Math.round(W * Math.sqrt(3) / 2);
    this.W = W; this.H = H;
    this.cells = [];
    for (let r = 0; r < N; r++) {
      const numCells = 2*r+1;
      const rowCells = [];
      const y0 = r*(H/N), y1 = (r+1)*(H/N);
      const spanAtBottom = ((r+1)/N)*W;
      const xLeft = (W-spanAtBottom)/2;
      const cellW = spanAtBottom/numCells;
      for (let c = 0; c < numCells; c++) {
        const isUp = (c%2===0);
        const x0 = xLeft+c*cellW, x1 = x0+cellW;
        rowCells.push({r,c,cx:(x0+x1)/2,cy:(y0+y1)/2,x0,x1,y0,y1,cellW,isUp,type:'data',dark:0});
      }
      this.cells.push(rowCells);
    }
    this._assignTypes(); this._encodeData();
  }
  _assignTypes() {
    const N = this.N;
    for (let dr=0;dr<5;dr++) {
      const r=dr; if(r>=N) continue;
      const rowLen=this.cells[r].length;
      for (let dc=0;dc<Math.min(5,rowLen);dc++) {
        this.cells[r][dc].type='anchor';
        this.cells[r][dc].dark=isAnchorDark(dr,dc)?1:0;
      }
    }
    for (let dr=0;dr<5;dr++) {
      const r=N-5+dr; if(r<0||r>=N) continue;
      for (let dc=0;dc<5;dc++) {
        this.cells[r][dc].type='anchor';
        this.cells[r][dc].dark=isAnchorDark(dr,dc)?1:0;
      }
    }
    for (let dr=0;dr<5;dr++) {
      const r=N-5+dr; if(r<0||r>=N) continue;
      const rowLen=this.cells[r].length;
      for (let dc=0;dc<5;dc++) {
        const c=rowLen-5+dc; if(c<0) continue;
        this.cells[r][c].type='anchor';
        this.cells[r][c].dark=isAnchorDark(dr,dc)?1:0;
      }
    }
    for (let r=5;r<N-5;r++) {
      const rowLen=this.cells[r].length;
      this.cells[r][0].type='timing'; this.cells[r][0].dark=r%2;
      this.cells[r][rowLen-1].type='timing'; this.cells[r][rowLen-1].dark=r%2;
    }
    const fmtRow=5;
    for (let c=1;c<this.cells[fmtRow].length-1;c++) this.cells[fmtRow][c].type='format';
  }
  _encodeData() {
    const bits=textToBits(this.text);
    const dataCells=[];
    for (let r=0;r<this.N;r++)
      for (let c=0;c<this.cells[r].length;c++)
        if(this.cells[r][c].type==='data') dataCells.push(this.cells[r][c]);
    for (let i=0;i<dataCells.length;i++) dataCells[i].dark=bits[i%bits.length];
    const fmtRow=5;
    const fmtCells=this.cells[fmtRow].filter(c=>c.type==='format');
    const lenBits=this.text.length.toString(2).padStart(fmtCells.length,'0');
    fmtCells.forEach((cell,i)=>{cell.dark=parseInt(lenBits[i]||'0');});
  }
  render() {
    const {W,H,canvas}=this;
    canvas.width=W; canvas.height=H;
    const ctx=canvas.getContext('2d');
    ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H);
    for (let r=0;r<this.N;r++)
      for (let c=0;c<this.cells[r].length;c++)
        this._drawCell(ctx,this.cells[r][c]);
    ctx.save();
    ctx.globalCompositeOperation='destination-in';
    ctx.beginPath();
    ctx.moveTo(W/2,2); ctx.lineTo(W-2,H-2); ctx.lineTo(2,H-2);
    ctx.closePath(); ctx.fill();
    ctx.restore();
    ctx.strokeStyle='#000'; ctx.lineWidth=3; ctx.lineJoin='round';
    ctx.beginPath();
    ctx.moveTo(W/2,2); ctx.lineTo(W-2,H-2); ctx.lineTo(2,H-2);
    ctx.closePath(); ctx.stroke();
  }
  _drawCell(ctx,cell) {
    const {x0,x1,y0,y1,isUp,dark,type}=cell;
    const colors={anchor:dark?'#000':'#fff',timing:dark?'#000':'#fff',format:dark?'#1a1a1a':'#f0f0f0',data:dark?'#000':'#fff'};
    ctx.fillStyle=colors[type];
    ctx.beginPath();
    if (isUp) { ctx.moveTo((x0+x1)/2,y0); ctx.lineTo(x1,y1); ctx.lineTo(x0,y1); }
    else       { ctx.moveTo(x0,y0); ctx.lineTo(x1,y0); ctx.lineTo((x0+x1)/2,y1); }
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle='rgba(128,128,128,0.15)'; ctx.lineWidth=0.3; ctx.stroke();
  }
}

// ── CIRCLE: concentric arc sectors ──
class CircleCode {
  constructor(text, canvasEl) {
    this.text=text; this.canvas=canvasEl; this.RINGS=10; this.build();
  }
  build() {
    const S=480; this.W=S; this.H=S;
    const cx=S/2,cy=S/2,maxR=S/2-10,RINGS=this.RINGS;
    this.cells=[];
    this.cells.push({ring:0,sector:0,cx,cy,r0:0,r1:maxR/RINGS,a0:0,a1:Math.PI*2,type:'anchor',dark:1});
    for (let ring=1;ring<RINGS;ring++) {
      const r0=ring*maxR/RINGS,r1=(ring+1)*maxR/RINGS,midR=(r0+r1)/2;
      const sectors=Math.round(2*Math.PI*midR/(maxR/RINGS));
      const dA=(Math.PI*2)/sectors;
      for (let s=0;s<sectors;s++) {
        const a0=s*dA,a1=(s+1)*dA,midA=(a0+a1)/2;
        this.cells.push({ring,sector:s,sectors,cx:cx+midR*Math.cos(midA),cy:cy+midR*Math.sin(midA),
          r0,r1,a0,a1,midR,midA,shapeCx:cx,shapeCy:cy,type:'data',dark:0});
      }
    }
    this._assignTypes(); this._encodeData();
  }
  _assignTypes() {
    for (const cell of this.cells) {
      if (cell.ring===this.RINGS-1){cell.type='timing';cell.dark=cell.sector%2;}
      else if (cell.ring===this.RINGS-2) cell.type='format';
    }
  }
  _encodeData() {
    const bits=textToBits(this.text);
    const dataCells=this.cells.filter(c=>c.type==='data');
    dataCells.forEach((cell,i)=>{cell.dark=bits[i%bits.length];});
  }
  render() {
    const {W,H,canvas}=this;
    canvas.width=W; canvas.height=H;
    const ctx=canvas.getContext('2d');
    ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H);
    for (const cell of this.cells) this._drawCell(ctx,cell);
    ctx.strokeStyle='#000'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(W/2,H/2,W/2-4,0,Math.PI*2); ctx.stroke();
  }
  _drawCell(ctx,cell) {
    const colors={anchor:'#000',timing:cell.dark?'#000':'#fff',format:cell.dark?'#222':'#eee',data:cell.dark?'#000':'#fff'};
    ctx.fillStyle=colors[cell.type];
    if (cell.ring===0){ctx.beginPath();ctx.arc(cell.cx,cell.cy,cell.r1,0,Math.PI*2);ctx.fill();return;}
    const {shapeCx,shapeCy,r0,r1,a0,a1}=cell;
    ctx.beginPath();
    ctx.arc(shapeCx,shapeCy,r1,a0,a1);
    ctx.arc(shapeCx,shapeCy,r0,a1,a0,true);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle='rgba(128,128,128,0.12)'; ctx.lineWidth=0.3; ctx.stroke();
  }
}

// ── SQUARE: regular grid of square cells ──
class SquareCode {
  constructor(text, canvasEl) {
    this.text=text; this.canvas=canvasEl; this.N=20; this.build();
  }
  build() {
    const N=this.N,S=480; this.W=S; this.H=S;
    const cs=S/N;
    this.cells=[];
    for (let r=0;r<N;r++)
      for (let c=0;c<N;c++)
        this.cells.push({r,c,x:c*cs,y:r*cs,cs,type:'data',dark:0});
    this._assignTypes(); this._encodeData();
  }
  _c(r,c){return this.cells[r*this.N+c];}
  _assignTypes() {
    const N=this.N;
    for (let dr=0;dr<5;dr++) for (let dc=0;dc<5;dc++) {
      [[dr,dc],[dr,N-5+dc],[N-5+dr,dc],[N-5+dr,N-5+dc]].forEach(([r,c])=>{
        const cell=this._c(r,c); cell.type='anchor';
        cell.dark=isAnchorDark(dr,dc)?1:0;
      });
    }
    for (let i=5;i<N-5;i++) {
      ['_c(5,i)','_c(N-6,i)','_c(i,5)','_c(i,N-6)'].forEach(expr=>{});
      [this._c(5,i),this._c(N-6,i),this._c(i,5),this._c(i,N-6)].forEach((cell,j)=>{
        if(cell.type!=='anchor'){cell.type='timing';cell.dark=i%2;}
      });
    }
  }
  _encodeData() {
    const bits=textToBits(this.text);
    const dc=this.cells.filter(c=>c.type==='data');
    dc.forEach((cell,i)=>{cell.dark=bits[i%bits.length];});
  }
  render() {
    const {W,H,canvas}=this;
    canvas.width=W; canvas.height=H;
    const ctx=canvas.getContext('2d');
    ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H);
    for (const cell of this.cells) {
      const colors={anchor:cell.dark?'#000':'#fff',timing:cell.dark?'#000':'#fff',format:cell.dark?'#1a1a1a':'#f0f0f0',data:cell.dark?'#000':'#fff'};
      ctx.fillStyle=colors[cell.type];
      ctx.fillRect(cell.x,cell.y,cell.cs,cell.cs);
      ctx.strokeStyle='rgba(128,128,128,0.15)'; ctx.lineWidth=0.3;
      ctx.strokeRect(cell.x,cell.y,cell.cs,cell.cs);
    }
    ctx.strokeStyle='#000'; ctx.lineWidth=3; ctx.strokeRect(2,2,W-4,H-4);
  }
}

// ══════════════════════════════════════════════════════════
// BEACON
// ══════════════════════════════════════════════════════════

function djb2(s){let h=5381;for(let i=0;i<s.length;i++)h=((h<<5)+h)^s.charCodeAt(i);return(h>>>0).toString(16).toUpperCase().padStart(8,'0');}

async function commitToLive() {
  const btn=document.getElementById('commit-btn');
  btn.textContent='▲ COMMITTING...';
  try {
    const r=await fetch('/soul/promote.php',{method:'POST'});
    const d=await r.json();
    if(d.ok){btn.textContent='✓ LIVE';btn.classList.add('done');setTimeout(()=>{window.location.href='shape-qr-beacon.html';},1200);}
    else{btn.textContent='✗ FAILED';btn.classList.add('fail');}
  } catch(e){btn.textContent='✗ ERROR';btn.classList.add('fail');}
}

let myCode=sessionStorage.getItem('sf_laptop_qr_code');
if(!myCode){myCode=djb2(Date.now()+navigator.userAgent+Math.random()).slice(0,3).toUpperCase();sessionStorage.setItem('sf_laptop_qr_code',myCode);}
document.getElementById('code-lbl').textContent='▲ '+myCode;
fetch('/soul/visual.php',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:myCode,ts:Date.now()})}).catch(()=>{});

function codeToShape(hex3){const n=parseInt(hex3,16),b=n.toString(2).padStart(12,'0');return{type:parseInt(b.slice(0,2),2),size:0.3+parseInt(b.slice(2,4),2)*0.18};}

const LINE_COUNTS=[3,1,4,2];
const LINE_COLORS=['#FF3333','#33FF66','#3399FF','#33FF66'];
const TYPE_NAMES=['TRIANGLE · 3 LINES','CIRCLE · 1 LINE','SQUARE · 4 LINES','COMPOUND · 2 LINES'];
function outlineColor(type){return LINE_COLORS[LINE_COUNTS[type]-1];}

let myShape=codeToShape(myCode);
let triCodeCanvas=null;
let gold=false,goldPulse=0;

function buildTriCode(code) {
  const offscreen=document.createElement('canvas');
  const text='SF:'+code.toUpperCase();
  const Cls=[TriangleCode,CircleCode,SquareCode,TriangleCode][myShape.type]||TriangleCode;
  new Cls(text,offscreen).render();
  // Invert: white bg→black, black cells→white, transparent stays transparent
  const oc=offscreen.getContext('2d');
  const imgData=oc.getImageData(0,0,offscreen.width,offscreen.height);
  const d=imgData.data;
  for(let i=0;i<d.length;i+=4){
    if(d[i+3]>0){d[i]=255-d[i];d[i+1]=255-d[i+1];d[i+2]=255-d[i+2];}
  }
  oc.putImageData(imgData,0,0);
  triCodeCanvas=offscreen;
}

function setShape(code) {
  myShape=codeToShape(code);
  const col=outlineColor(myShape.type);
  document.getElementById('type-lbl').textContent=TYPE_NAMES[myShape.type]+'  ·  '+code.toUpperCase();
  document.getElementById('type-lbl').style.color=col+'aa';
  buildTriCode(code);
}
setShape(myCode);

const canvas=document.getElementById('beacon-canvas');
const ctx=canvas.getContext('2d');
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
resize(); window.addEventListener('resize',resize);

function shapePath(cx,cy,r,type){
  ctx.beginPath();
  if(type===0){ctx.moveTo(cx,cy-r);ctx.lineTo(cx-r*0.866,cy+r*0.5);ctx.lineTo(cx+r*0.866,cy+r*0.5);ctx.closePath();}
  else if(type===1){ctx.arc(cx,cy,r,0,Math.PI*2);}
  else{const s=r*0.85;ctx.rect(cx-s,cy-s,s*2,s*2);}
}

function draw() {
  const W=canvas.width,H=canvas.height,S=Math.min(W,H);
  const r=S*Math.max(myShape.size,0.42)*0.45;
  const cx=W/2,cy=H/2;
  const col=gold?'#FFC72C':outlineColor(myShape.type);

  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);

  if(gold){
    goldPulse=(goldPulse+0.04)%(Math.PI*2);
    const g=0.5+0.5*Math.sin(goldPulse);
    const grad=ctx.createRadialGradient(cx,cy,0,cx,cy,S*0.55);
    grad.addColorStop(0,`rgba(255,199,44,${0.1*g})`);
    grad.addColorStop(1,'transparent');
    ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);
  }

  if(triCodeCanvas){
    const tc=triCodeCanvas;
    let dx,dy,dw,dh;
    if(myShape.type===0){ // triangle: scale to match beacon triangle dimensions
      const scale=(r*1.5)/tc.height;
      dw=tc.width*scale; dh=tc.height*scale;
      dx=cx-dw/2; dy=cy-r;
    } else { // circle / square: fill bounding box
      dw=dh=r*2; dx=cx-r; dy=cy-r;
    }
    ctx.drawImage(tc,dx,dy,dw,dh);
  }

  // Glowing outline in line-count colour
  ctx.save();
  shapePath(cx,cy,r,myShape.type);
  ctx.strokeStyle=col; ctx.lineWidth=gold?5:3;
  ctx.shadowColor=col; ctx.shadowBlur=gold?40:14;
  ctx.stroke();
  ctx.restore();

  requestAnimationFrame(draw);
}
draw();

let lastAt=0;
setInterval(async()=>{
  try{
    const res=await fetch('/soul/last_shape.php?_='+Date.now());
    if(!res.ok) return;
    const d=await res.json();
    if(!d.sc||d.at<=lastAt) return;
    lastAt=d.at; gold=true;
    setShape(d.sc);
    document.getElementById('status').textContent='▲ CONFIRMED · '+d.sc.toUpperCase();
    document.getElementById('code-lbl').textContent='▲ GENOME: '+d.sc.toUpperCase();
  }catch(_){}
},3000);
</script>
</body>
</html>
