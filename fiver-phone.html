<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>THE FIVER — SHORTFACTORY</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;min-height:100%;background:#000;font-family:'Courier New',monospace;}

/* ── DESKTOP: phone mockup ── */
.phone-wrap{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;min-height:100vh;padding:40px 20px;
}
.eyebrow{font-size:7px;letter-spacing:4px;color:#1c1c1c;text-transform:uppercase;margin-bottom:28px;text-align:center;}

.phone{
  width:340px;height:680px;
  background:#050505;
  border:2px solid #1a1a1a;
  border-radius:44px;
  position:relative;
  box-shadow:0 0 0 1px #0a0a0a, 0 40px 80px rgba(0,0,0,.9), inset 0 0 0 1px #111;
  flex-shrink:0;
}
.phone::before{
  content:'';position:absolute;top:14px;left:50%;transform:translateX(-50%);
  width:80px;height:6px;background:#0a0a0a;border-radius:3px;z-index:10;
}
.phone::after{
  content:'';position:absolute;right:-3px;top:110px;
  width:3px;height:52px;background:#111;border-radius:0 2px 2px 0;
  box-shadow:0 64px 0 #111;
}
.phone-screen{
  position:absolute;inset:10px;
  border-radius:36px;overflow:hidden;background:#000;
}
.phone-screen iframe{width:100%;height:100%;border:none;}

.footer-line{margin-top:28px;font-size:7px;color:#0f0f0f;letter-spacing:3px;text-align:center;}

/* ── MOBILE: fullscreen, no phone chrome ── */
@media (max-width: 500px) {
  .phone-wrap{padding:0;min-height:100vh;justify-content:flex-start;}
  .eyebrow,.footer-line{display:none;}
  .phone{
    width:100vw;height:100vh;
    border-radius:0;border:none;
    box-shadow:none;
  }
  .phone::before,.phone::after{display:none;}
  .phone-screen{inset:0;border-radius:0;}
}
</style>
</head>
<body>

<div class="phone-wrap">
  <div class="eyebrow">SHORTFACTORY · THE FIVER</div>

  <div class="phone">
    <div class="phone-screen">
      <iframe src="/fiver.html" title="The Fiver — ShortFactory" allow="fullscreen"></iframe>
    </div>
  </div>

  <div class="footer-line">MAN MACHINE GOD</div>
</div>

<script>
// On mobile, redirect straight into fiver.html for true fullscreen
if (window.innerWidth <= 500) {
  const params = location.search; // pass through ?vid= and ?ref= params
  location.replace('/fiver.html' + params);
}
</script>
</body>
</html>
