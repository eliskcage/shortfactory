<VirtualHost *:80>
    ServerName stinkindigger.info
    ServerAlias www.stinkindigger.info stinkindigger.com www.stinkindigger.com stinkindigger.store www.stinkindigger.store stinkindigger.co.uk www.stinkindigger.co.uk
    DocumentRoot /var/www/vhosts/stinkindigger.info/httpdocs

    <Directory /var/www/vhosts/stinkindigger.info/httpdocs>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # React SPA — send all routes to index.html
    <Directory /var/www/vhosts/stinkindigger.info/httpdocs>
        RewriteEngine On
        RewriteBase /
        RewriteRule ^index\.html$ - [L]
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule . /index.html [L]
    </Directory>

    ErrorLog /var/log/apache2/stinkindigger-error.log
    CustomLog /var/log/apache2/stinkindigger-access.log combined
</VirtualHost>
