<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShortFactory — Enter Room One</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #0a0500;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Press Start 2P', monospace;
  color: #f5c518;
  gap: 32px;
  padding: 24px;
}
.title {
  font-size: clamp(14px, 4vw, 22px);
  text-align: center;
  text-shadow: 0 0 30px #f5c518;
  letter-spacing: 3px;
  line-height: 2;
}
.sub {
  font-size: 9px;
  color: #8b6914;
  letter-spacing: 2px;
  text-align: center;
}
.big-btn {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(12px, 3vw, 18px);
  padding: 28px 48px;
  background: linear-gradient(135deg, #f5c518, #ffe066);
  border: 4px solid #3d1c02;
  color: #1a0a00;
  cursor: pointer;
  box-shadow: 6px 6px 0 #8b6914, 0 0 40px rgba(245,197,24,0.4);
  transition: all 0.15s;
  letter-spacing: 2px;
  text-align: center;
  max-width: 420px;
  width: 100%;
}
.big-btn:hover {
  transform: translate(-3px,-3px);
  box-shadow: 9px 9px 0 #8b6914, 0 0 60px rgba(245,197,24,0.6);
}
.or { font-size: 8px; color: #444; letter-spacing: 3px; }
.watch-btn {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(10px, 2.5vw, 14px);
  padding: 20px 36px;
  background: linear-gradient(135deg, #6b2fa0, #9b4fcc);
  border: 4px solid #3d1c02;
  color: #fff;
  cursor: pointer;
  box-shadow: 6px 6px 0 #3d1c02;
  transition: all 0.15s;
  letter-spacing: 2px;
  text-align: center;
  max-width: 420px;
  width: 100%;
}
.watch-btn:hover {
  transform: translate(-3px,-3px);
  box-shadow: 9px 9px 0 #3d1c02;
}
.note {
  font-size: 7px;
  color: #5a4020;
  text-align: center;
  line-height: 2.2;
  max-width: 340px;
}
</style>
</head>
<body>

<div class="title">🎩 ROOM ONE<br>THE CHOCOLATE RIVER</div>
<div class="sub">TRUMP v THE DEEP STATE</div>

<button class="big-btn" onclick="playMyself()">▶ I'LL PLAY IT MYSELF</button>

<div class="or">— OR —</div>

<button class="watch-btn" onclick="watchAI()">🤖 WATCH THE AI PLAY</button>

<div class="note">
  Clicking either button wipes your save<br>
  and starts fresh at 6% purity.<br>
  <br>
  AI mode: sit back and watch.<br>
  You can take control any time.
</div>

<script>
function go(auto) {
  try {
    localStorage.removeItem('trumpGameSave');
    if (auto) localStorage.setItem('ap_autostart','1');
    else      localStorage.removeItem('ap_autostart');
    localStorage.setItem('dnaHandoff', JSON.stringify({
      session: Date.now(),
      strand: [{ ms:0, e: auto ? 'FACTORY4_AI_START' : 'FACTORY4_HUMAN_START', d:null }]
    }));
  } catch(e) {}
  window.location.href = '/trump/game/index2.html?wipe=1&t=' + Date.now();
}
function playMyself() { go(false); }
function watchAI()    { go(true);  }
</script>

</body>
</html>
