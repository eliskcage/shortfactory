.task-row{display:flex;align-items:center;gap:14px;padding:11px 14px;border-bottom:1px solid rgba(255,255,255,0.03);cursor:pointer;transition:background 0.15s;border-radius:4px;user-select:none;}
.task-row:hover{background:rgba(255,255,255,0.025);}
.task-row.done{opacity:0.3;}

.tick{width:18px;height:18px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.15);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.task-row:hover .tick{border-color:rgba(255,255,255,0.3);}
.task-row.done .tick{background:#22c55e;border-color:#22c55e;}
.tick svg{display:none;width:10px;height:10px;}
.task-row.done .tick svg{display:block;}

.task-text{flex:1;font-size:12.5px;color:#cbd5e1;transition:color 0.2s;letter-spacing:.2px;}
.task-row.done .task-text{text-decoration:line-through;color:#475569;}

.task-tag{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:#475569;background:rgba(255,255,255,0.04);padding:2px 8px;border-radius:3px;white-space:nowrap;flex-shrink:0;border:1px solid rgba(255,255,255,0.05);}

const DIFF_META = [
  {label:'Easiest', color:'#22c55e'},
  {label:'Easy',    color:'#86efac'},
  {label:'Medium',  color:'#f59e0b'},
  {label:'Hard',    color:'#ef4444'},
  {label:'Hardest', color:'#7c3aed'},
];

const KEY = 'oiloftrop_done_v2';
const PRESET_DONE = ['ss1','ps3','ps2','ps1','ps4','ps7','d4d1','d4d2','d4d3'];
let _saved = localStorage.getItem(KEY);
let done = new Set(_saved !== null ? JSON.parse(_saved) : PRESET_DONE);

function save(){ localStorage.setItem(KEY, JSON.stringify([...done])); }

function updateBar(){
  const total = TASKS.length;
  const n = [...done].filter(id => TASKS.find(t=>t.id===id)).length;
  document.getElementById('bar-fill').style.width = (n / total * 100) + '%';
  document.getElementById('bar-count').textContent = n + ' / ' + total + ' done';
}

function render(){
  const list = document.getElementById('task-list');
  list.innerHTML = '';
  let curDiff = -1;

  TASKS.forEach(t => {
    if(t.diff !== curDiff){
      curDiff = t.diff;
      const m = DIFF_META[curDiff];
      const lbl = document.createElement('div');
      lbl.className = 'diff-label';
      lbl.style.color = m.color;
      lbl.textContent = m.label;
      list.appendChild(lbl);
    }

    const isDone = done.has(t.id);
    const row = document.createElement('div');
    row.className = 'task-row' + (isDone ? ' done' : '');
    row.innerHTML = `
      <div class="tick">
        <svg viewBox="0 0 10 10" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1.5,5 4,7.5 8.5,2.5"/>
        </svg>
      </div>
      <div class="task-text">${t.text}</div>
      <div class="task-tag">${t.tag}</div>
    `;
    row.addEventListener('click', () => {
      if(done.has(t.id)) done.delete(t.id);
      else done.add(t.id);
      save();
      row.classList.toggle('done');
      updateBar();
    });
    list.appendChild(row);
  });
}

render();
updateBar();
