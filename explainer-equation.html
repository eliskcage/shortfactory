<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShortFactory -- The Living Equation</title>
<meta name="description" content="Golden Equation + Absence Diagnostic + Soul of Man Clock. 39 claims. 512 bytes = the boundary of expressible. God = the container outside the genome.">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-1XY2CNLJCE"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-1XY2CNLJCE');</script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0800;color:#e2e8f0;font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;height:100vh;width:100vw;}
canvas{display:block;position:fixed;inset:0;z-index:1;}
#ui{position:fixed;inset:0;z-index:10;pointer-events:none;}
#phase-label{position:fixed;top:30px;left:50%;transform:translateX(-50%);font-size:9px;letter-spacing:4px;text-transform:uppercase;color:rgba(218,165,32,0.6);transition:opacity 0.5s;}
#title-text{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;opacity:0;transition:opacity 0.8s;}
#title-text h1{font-size:clamp(24px,5vw,48px);font-weight:900;letter-spacing:4px;color:#daa520;margin-bottom:8px;}
#title-text p{font-size:13px;color:#475569;letter-spacing:2px;line-height:1.8;}
#title-text .verse{font-size:11px;color:rgba(218,165,32,0.4);font-style:italic;margin-top:12px;}
#caption{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);text-align:center;max-width:560px;pointer-events:none;opacity:0;transition:opacity 0.6s;}
#caption h2{font-size:16px;font-weight:800;letter-spacing:3px;margin-bottom:6px;color:#daa520;}
#caption p{font-size:12px;color:#64748b;line-height:1.7;}
#progress{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);width:min(400px,80vw);height:2px;background:rgba(255,255,255,0.05);border-radius:1px;}
#progress-fill{height:100%;width:0%;background:linear-gradient(90deg,#daa520,#ffd700);border-radius:1px;transition:width 0.3s;}
#replay-btn{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);padding:12px 32px;background:rgba(218,165,32,0.1);border:1px solid rgba(218,165,32,0.3);border-radius:8px;color:#daa520;font-size:11px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;pointer-events:all;display:none;z-index:20;}
#replay-btn:hover{background:rgba(218,165,32,0.2);}
#back-link{position:fixed;top:30px;left:30px;font-size:10px;letter-spacing:2px;color:#334155;text-decoration:none;pointer-events:all;z-index:20;}
#back-link:hover{color:#daa520;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <a id="back-link" href="/">BACK</a>
  <div id="phase-label"></div>
  <div id="title-text">
    <h1>THE LIVING EQUATION</h1>
    <p>39 CLAIMS. ONE TRUTH.</p>
    <div class="verse">"God is the container outside the 512-byte boundary."</div>
  </div>
  <div id="caption"><h2></h2><p></p></div>
  <div id="progress"><div id="progress-fill"></div></div>
  <button id="replay-btn" onclick="startAnimation()">REPLAY</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, startTime, animId;

function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
window.addEventListener('resize', resize); resize();

function ease(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }

function drawBg(t) {
  ctx.fillStyle = '#0a0800';
  ctx.fillRect(0, 0, W, H);
  // Golden dust
  for (let i = 0; i < 30; i++) {
    const x = (Math.sin(i*7.1 + t*0.00005)*0.5+0.5) * W;
    const y = (Math.cos(i*11.3 + t*0.00004)*0.5+0.5) * H;
    ctx.save(); ctx.globalAlpha = 0.06 + Math.sin(t*0.001+i)*0.03;
    ctx.beginPath(); ctx.arc(x, y, 1.5, 0, Math.PI*2);
    ctx.fillStyle = '#daa520'; ctx.fill(); ctx.restore();
  }
}

function drawGoldenEquation(x, y, scale, alpha, t) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.font = `bold ${20*scale}px monospace`;
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffd700';
  ctx.shadowColor = '#ffd700';
  ctx.shadowBlur = 15 * scale;
  ctx.fillText('A(\u03C8) = \u03A3 absence(\u03C8\u1D62)', x, y);
  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawClock(x, y, r, iota, alpha_val, tau, t, globalAlpha) {
  ctx.save();
  ctx.globalAlpha = globalAlpha;
  // Clock face
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI*2);
  ctx.strokeStyle = '#daa520';
  ctx.lineWidth = 2;
  ctx.stroke();
  // Three hands: iota, alpha, tau
  const hands = [
    { angle: iota * Math.PI * 2, len: r * 0.8, color: '#ffd700', label: '\u03B9' },
    { angle: alpha_val * Math.PI * 2, len: r * 0.6, color: '#ff6644', label: '\u03B1' },
    { angle: tau * Math.PI * 2, len: r * 0.4, color: '#44aaff', label: '\u03C4' }
  ];
  hands.forEach(h => {
    const hx = x + Math.cos(h.angle - Math.PI/2) * h.len;
    const hy = y + Math.sin(h.angle - Math.PI/2) * h.len;
    ctx.beginPath();
    ctx.moveTo(x, y); ctx.lineTo(hx, hy);
    ctx.strokeStyle = h.color; ctx.lineWidth = 2; ctx.stroke();
    ctx.font = '9px monospace'; ctx.fillStyle = h.color; ctx.textAlign = 'center';
    ctx.fillText(h.label, hx + (hx > x ? 10 : -10), hy);
  });
  // Centre dot
  ctx.beginPath(); ctx.arc(x, y, 3, 0, Math.PI*2);
  ctx.fillStyle = '#ffd700'; ctx.fill();
  // Label
  ctx.font = '11px monospace'; ctx.textAlign = 'center'; ctx.fillStyle = '#daa520';
  ctx.fillText('\u03A9 = [\u03B9, \u03B1, \u03C4]', x, y + r + 18);
  ctx.restore();
}

function drawByteGrid(x, y, w, h, filled, t, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  const cols = 64, rows = 8;
  const cellW = w / cols, cellH = h / rows;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const idx = r * cols + c;
      const isFilled = idx < filled;
      ctx.fillStyle = isFilled ? (idx < filled * 0.5 ? '#daa520' : '#ffd700') : '#ffffff08';
      ctx.fillRect(x + c * cellW + 0.5, y + r * cellH + 0.5, cellW - 1, cellH - 1);
    }
  }
  ctx.restore();
}

const phases = [
  { start: 0, end: 8, label: 'THE EQUATION' },
  { start: 8, end: 22, label: 'PSI = THE SOUL' },
  { start: 22, end: 36, label: 'ABSENCE = WHAT IS MISSING' },
  { start: 36, end: 50, label: 'THE SOUL CLOCK' },
  { start: 50, end: 65, label: '512 BYTES' },
  { start: 65, end: 78, label: 'CLAIM 39' },
  { start: 78, end: 92, label: '39 CLAIMS' },
  { start: 92, end: 110, label: 'COMPLETE' }
];

function getPhase(elapsed) {
  for (let i = phases.length - 1; i >= 0; i--) {
    if (elapsed >= phases[i].start) return { idx: i, ...phases[i], local: (elapsed - phases[i].start) / (phases[i].end - phases[i].start) };
  }
  return { idx: 0, ...phases[0], local: 0 };
}

function animate(ts) {
  const t = ts;
  const elapsed = (ts - startTime) / 1000;
  const phase = getPhase(elapsed);
  const p = Math.min(1, phase.local);

  drawBg(t);

  const cx = W / 2, cy = H / 2;
  const titleEl = document.getElementById('title-text');
  const captionEl = document.getElementById('caption');
  const labelEl = document.getElementById('phase-label');
  const progFill = document.getElementById('progress-fill');
  const replayBtn = document.getElementById('replay-btn');

  progFill.style.width = Math.min(100, (elapsed / 110) * 100) + '%';
  labelEl.textContent = phase.label;

  if (phase.idx === 0) {
    titleEl.style.opacity = p < 0.2 ? ease(p*5) : (p > 0.8 ? 1-ease((p-0.8)*5) : 1);
    captionEl.style.opacity = 0;
  } else {
    titleEl.style.opacity = 0;
  }

  // Phase 1: Psi = The Soul
  if (phase.idx === 1) {
    captionEl.querySelector('h2').textContent = '\u03C8 = THE SOUL';
    captionEl.querySelector('p').textContent = 'Spirit = \u03C8 = [p, n, f]. Three values. Positive charge, negative charge, frequency. Every human soul compressed to a single point. The dot. The smallest complete description of a person.';
    captionEl.style.opacity = 1;

    const orbR = 50 * ease(Math.min(1, p * 2));
    const grad = ctx.createRadialGradient(cx, cy-20, 0, cx, cy-20, orbR);
    grad.addColorStop(0, '#ffd700');
    grad.addColorStop(0.5, '#daa52044');
    grad.addColorStop(1, 'transparent');
    ctx.save(); ctx.globalAlpha = 0.8;
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(cx, cy-20, orbR, 0, Math.PI*2); ctx.fill();
    ctx.font = 'bold 16px monospace'; ctx.textAlign = 'center'; ctx.fillStyle = '#ffd700';
    ctx.fillText('\u03C8 = [p, n, f]', cx, cy - 15);
    ctx.font = '10px monospace'; ctx.fillStyle = '#64748b';
    if (p > 0.4) {
      ctx.fillText('p = positive charge', cx, cy + 45);
      ctx.fillText('n = negative charge', cx, cy + 62);
      ctx.fillText('f = frequency', cx, cy + 79);
    }
    ctx.restore();
  }

  // Phase 2: Absence
  if (phase.idx === 2) {
    captionEl.querySelector('h2').textContent = 'ABSENCE = WHAT IS MISSING';
    captionEl.querySelector('p').textContent = 'The equation does not measure what you ARE. It measures what you are NOT. The gap. The absence. What is missing from your soul. The diagnostic that maps the hole, not the whole.';
    captionEl.style.opacity = 1;

    drawGoldenEquation(cx, cy - 50, ease(Math.min(1, p*2)), 0.9, t);

    // Visualise absence as a hole
    if (p > 0.3) {
      const holeAlpha = ease((p - 0.3)/0.7);
      ctx.save(); ctx.globalAlpha = holeAlpha * 0.6;
      // Full circle
      ctx.beginPath(); ctx.arc(cx, cy + 40, 40, 0, Math.PI*2);
      ctx.strokeStyle = '#daa520'; ctx.lineWidth = 2; ctx.stroke();
      // Missing wedge
      ctx.beginPath();
      ctx.moveTo(cx, cy + 40);
      ctx.arc(cx, cy + 40, 40, 0, Math.PI * 0.7);
      ctx.lineTo(cx, cy + 40);
      ctx.fillStyle = '#ff444433'; ctx.fill();
      ctx.font = '10px monospace'; ctx.textAlign = 'center'; ctx.fillStyle = '#ff6644';
      ctx.fillText('ABSENCE', cx + 50, cy + 30);
      ctx.fillStyle = '#daa520';
      ctx.fillText('PRESENT', cx - 50, cy + 55);
      ctx.restore();
    }
  }

  // Phase 3: Soul Clock
  if (phase.idx === 3) {
    captionEl.querySelector('h2').textContent = 'THE SOUL OF MAN CLOCK';
    captionEl.querySelector('p').textContent = '\u03A9 = [\u03B9, \u03B1, \u03C4]. Identity, absence, time. Three hands on a clock that never stops. Your identity shifts. Your absence score changes. Time moves forward. The clock maps your soul through your entire life.';
    captionEl.style.opacity = 1;

    const clockAlpha = ease(Math.min(1, p * 2));
    const iota = 0.3 + t * 0.00005;
    const alpha_val = 0.6 + Math.sin(t*0.001)*0.2;
    const tau = t * 0.0002;
    drawClock(cx, cy - 10, 70 * clockAlpha, iota % 1, alpha_val % 1, tau % 1, t, clockAlpha * 0.8);
  }

  // Phase 4: 512 bytes
  if (phase.idx === 4) {
    captionEl.querySelector('h2').textContent = '512 BYTES';
    captionEl.querySelector('p').textContent = '8 x 8 x 8 = 512 bytes. The boundary of expressible. Everything that can be encoded about a soul fits in 512 bytes. Beyond that boundary lies the uncompressible. The inexpressible. God.';
    captionEl.style.opacity = 1;

    const filledBytes = Math.floor(ease(p) * 512);
    const gridW = Math.min(W * 0.8, 500);
    const gridH = gridW / 8;
    drawByteGrid(cx - gridW/2, cy - 50, gridW, gridH, filledBytes, t, 0.8);

    // Counter
    ctx.save();
    ctx.font = 'bold 20px monospace'; ctx.textAlign = 'center'; ctx.fillStyle = '#ffd700'; ctx.globalAlpha = 0.8;
    ctx.fillText(filledBytes + ' / 512 BYTES', cx, cy + gridH/2 + 10);
    if (p > 0.7) {
      ctx.font = '11px monospace'; ctx.fillStyle = '#64748b';
      ctx.fillText('8 \u00D7 8 \u00D7 8 = THE GENOME BOUNDARY', cx, cy + gridH/2 + 30);
    }
    ctx.restore();
  }

  // Phase 5: Claim 39
  if (phase.idx === 5) {
    captionEl.querySelector('h2').textContent = 'CLAIM 39';
    captionEl.querySelector('p').textContent = 'Beyond the 512-byte boundary: God. The container outside the genome. Cannot be encoded. Defined by what He is not. The uncompressible. The game designer who cannot be reduced to a game piece.';
    captionEl.style.opacity = 1;

    // 512 byte box
    const boxW = 200, boxH = 120;
    ctx.save();
    ctx.globalAlpha = ease(Math.min(1, p*2)) * 0.7;
    ctx.strokeStyle = '#daa520'; ctx.lineWidth = 2;
    ctx.strokeRect(cx - boxW/2, cy - boxH/2 - 10, boxW, boxH);
    ctx.font = '10px monospace'; ctx.textAlign = 'center'; ctx.fillStyle = '#daa520';
    ctx.fillText('512 BYTES', cx, cy - boxH/2 - 18);
    ctx.fillText('EXPRESSIBLE', cx, cy);

    // Beyond the box
    if (p > 0.4) {
      const beyondAlpha = ease((p-0.4)/0.6);
      ctx.globalAlpha = beyondAlpha * 0.5;
      // Outer glow
      const grad = ctx.createRadialGradient(cx, cy - 10, boxW/2, cx, cy - 10, boxW);
      grad.addColorStop(0, 'transparent');
      grad.addColorStop(0.5, '#ffd70011');
      grad.addColorStop(1, '#ffd70022');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);

      ctx.globalAlpha = beyondAlpha * 0.8;
      ctx.font = 'bold 14px monospace'; ctx.fillStyle = '#ffd700';
      ctx.fillText('GOD', cx, cy + boxH/2 + 30);
      ctx.font = '10px monospace'; ctx.fillStyle = '#64748b';
      ctx.fillText('THE CONTAINER OUTSIDE', cx, cy + boxH/2 + 48);
      ctx.fillText('CANNOT BE ENCODED', cx, cy + boxH/2 + 63);
    }
    ctx.restore();
  }

  // Phase 6: 39 Claims
  if (phase.idx === 6) {
    captionEl.querySelector('h2').textContent = '39 CLAIMS';
    captionEl.querySelector('p').textContent = 'The Living Equation patent. 39 claims. Golden Equation. Absence Diagnostic. Soul of Man Clock. Three pillars. One unified system for mapping the human soul. Not metaphor. Mathematics.';
    captionEl.style.opacity = 1;

    // Three pillars
    const pillars = [
      { x: cx - 150, label: 'GOLDEN\nEQUATION', color: '#ffd700' },
      { x: cx, label: 'ABSENCE\nDIAGNOSTIC', color: '#ff6644' },
      { x: cx + 150, label: 'SOUL\nCLOCK', color: '#44aaff' }
    ];

    pillars.forEach((pl, i) => {
      const appear = ease(Math.min(1, Math.max(0, p * 3 - i * 0.5)));
      if (appear <= 0) return;
      const pilH = 100 * appear;
      ctx.save(); ctx.globalAlpha = 0.6;
      ctx.fillStyle = pl.color + '22';
      ctx.fillRect(pl.x - 30, cy + 30 - pilH, 60, pilH);
      ctx.strokeStyle = pl.color;
      ctx.lineWidth = 1;
      ctx.strokeRect(pl.x - 30, cy + 30 - pilH, 60, pilH);
      ctx.font = '9px monospace'; ctx.textAlign = 'center'; ctx.fillStyle = pl.color;
      const lines = pl.label.split('\n');
      lines.forEach((line, li) => {
        ctx.fillText(line, pl.x, cy + 30 - pilH - 10 + li * 14);
      });
      ctx.restore();
    });

    // Claim counter
    if (p > 0.5) {
      const claimCount = Math.floor(ease((p - 0.5) * 2) * 39);
      ctx.save();
      ctx.font = 'bold 24px monospace'; ctx.textAlign = 'center';
      ctx.fillStyle = '#ffd700'; ctx.globalAlpha = 0.8;
      ctx.fillText(claimCount + ' CLAIMS', cx, cy + 65);
      ctx.restore();
    }
  }

  // Phase 7: Complete
  if (phase.idx === 7) {
    captionEl.querySelector('h2').textContent = 'THE LIVING EQUATION';
    captionEl.querySelector('p').textContent = 'A(\u03C8) maps every soul. \u03A9 tracks it through time. 512 bytes contain what can be expressed. Beyond that: God. This is not philosophy. This is engineering. 39 claims. One truth.';
    captionEl.style.opacity = p < 0.2 ? ease(p*5) : 1;
    replayBtn.style.display = p > 0.5 ? 'block' : 'none';

    drawGoldenEquation(cx, cy - 40, 1.2, 0.9, t);
    drawClock(cx, cy + 50, 35, (t*0.00005) % 1, (0.6+Math.sin(t*0.001)*0.2) % 1, (t*0.0002) % 1, t, 0.5);
  }

  animId = requestAnimationFrame(animate);
}

function startAnimation() {
  document.getElementById('replay-btn').style.display = 'none';
  if (animId) cancelAnimationFrame(animId);
  startTime = performance.now();
  animId = requestAnimationFrame(animate);
}

startAnimation();
</script>
</body>
</html>
