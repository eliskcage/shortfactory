plugins {
    id 'com.android.application'
}

android {
    namespace 'shop.shortfactory.alive'
    compileSdk 34

    defaultConfig {
        applicationId "shop.shortfactory.alive"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }

    signingConfigs {
        release {
            storeFile file('../alive-release.keystore')
            storePassword 'shortfactory2026'
            keyAlias 'alive'
            keyPassword 'shortfactory2026'
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.release
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'androidx.browser:browser:1.8.0'
    implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
}
