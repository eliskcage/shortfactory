<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShortFactory -- Computanium: The Sixth State of Matter</title>
<meta name="description" content="Solid, liquid, gas, plasma, Bose-Einstein condensate... Computanium. Biology IS computation. Geometry is the program. Chemistry is the carrier. The sixth state of matter.">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-1XY2CNLJCE"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-1XY2CNLJCE');</script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#050808;color:#e2e8f0;font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;height:100vh;width:100vw;}
canvas{display:block;position:fixed;inset:0;z-index:1;}
#ui{position:fixed;inset:0;z-index:10;pointer-events:none;}
#phase-label{position:fixed;top:30px;left:50%;transform:translateX(-50%);font-size:9px;letter-spacing:4px;text-transform:uppercase;color:rgba(0,220,180,0.6);transition:opacity 0.5s;}
#title-text{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;opacity:0;transition:opacity 0.8s;}
#title-text h1{font-size:clamp(24px,5vw,48px);font-weight:900;letter-spacing:4px;color:#00dcb4;margin-bottom:8px;}
#title-text p{font-size:13px;color:#475569;letter-spacing:2px;line-height:1.8;}
#title-text .verse{font-size:11px;color:rgba(0,220,180,0.4);font-style:italic;margin-top:12px;}
#caption{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);text-align:center;max-width:560px;pointer-events:none;opacity:0;transition:opacity 0.6s;}
#caption h2{font-size:16px;font-weight:800;letter-spacing:3px;margin-bottom:6px;color:#00dcb4;}
#caption p{font-size:12px;color:#64748b;line-height:1.7;}
#progress{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);width:min(400px,80vw);height:2px;background:rgba(255,255,255,0.05);border-radius:1px;}
#progress-fill{height:100%;width:0%;background:linear-gradient(90deg,#00dcb4,#00ff88);border-radius:1px;transition:width 0.3s;}
#replay-btn{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);padding:12px 32px;background:rgba(0,220,180,0.1);border:1px solid rgba(0,220,180,0.3);border-radius:8px;color:#00dcb4;font-size:11px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;pointer-events:all;display:none;z-index:20;}
#replay-btn:hover{background:rgba(0,220,180,0.2);}
#back-link{position:fixed;top:30px;left:30px;font-size:10px;letter-spacing:2px;color:#334155;text-decoration:none;pointer-events:all;z-index:20;}
#back-link:hover{color:#00dcb4;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <a id="back-link" href="/">BACK</a>
  <div id="phase-label"></div>
  <div id="title-text">
    <h1>COMPUTANIUM</h1>
    <p>THE SIXTH STATE OF MATTER</p>
    <div class="verse">"Biology IS computation. Geometry = program. Chemistry = carrier."</div>
  </div>
  <div id="caption"><h2></h2><p></p></div>
  <div id="progress"><div id="progress-fill"></div></div>
  <button id="replay-btn" onclick="startAnimation()">REPLAY</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, startTime, animId;

function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
window.addEventListener('resize', resize); resize();

function ease(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }

function drawBg(t) {
  ctx.fillStyle = '#050808';
  ctx.fillRect(0, 0, W, H);
  // Molecular grid
  for (let i = 0; i < 20; i++) {
    for (let j = 0; j < 12; j++) {
      const x = (i + 0.5) * (W/20) + Math.sin(t*0.0005+j)*3;
      const y = (j + 0.5) * (H/12) + Math.cos(t*0.0005+i)*3;
      ctx.save(); ctx.globalAlpha = 0.03;
      ctx.beginPath(); ctx.arc(x, y, 1.5, 0, Math.PI*2);
      ctx.fillStyle = '#00dcb4'; ctx.fill();
      ctx.restore();
    }
  }
}

function drawStateBox(x, y, w, h, label, color, alpha, active) {
  ctx.save(); ctx.globalAlpha = alpha;
  ctx.fillStyle = active ? color + '33' : '#ffffff08';
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = active ? color : '#ffffff22';
  ctx.lineWidth = active ? 2 : 1;
  ctx.strokeRect(x, y, w, h);
  ctx.font = (active ? 'bold ' : '') + '11px monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = active ? color : '#475569';
  ctx.fillText(label, x + w/2, y + h/2 + 4);
  ctx.restore();
}

function drawHexagon(x, y, r, rot, color, alpha) {
  ctx.save(); ctx.globalAlpha = alpha;
  ctx.translate(x, y); ctx.rotate(rot);
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = Math.PI / 3 * i;
    i === 0 ? ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r) : ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
  }
  ctx.closePath();
  ctx.strokeStyle = color; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.restore();
}

function drawDNA(x, y, h, t, alpha) {
  ctx.save(); ctx.globalAlpha = alpha;
  const steps = 30;
  for (let i = 0; i < steps; i++) {
    const frac = i / steps;
    const yy = y - h/2 + frac * h;
    const twist = frac * Math.PI * 4 + t * 0.003;
    const x1 = x + Math.cos(twist) * 20;
    const x2 = x - Math.cos(twist) * 20;
    // Backbone
    if (i > 0) {
      const prevY = y - h/2 + (i-1)/steps * h;
      const prevTwist = (i-1)/steps * Math.PI * 4 + t * 0.003;
      ctx.beginPath();
      ctx.moveTo(x + Math.cos(prevTwist)*20, prevY);
      ctx.lineTo(x1, yy);
      ctx.strokeStyle = '#00dcb4'; ctx.lineWidth = 1.5; ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x - Math.cos(prevTwist)*20, prevY);
      ctx.lineTo(x2, yy);
      ctx.stroke();
    }
    // Rungs
    if (i % 3 === 0) {
      ctx.beginPath(); ctx.moveTo(x1, yy); ctx.lineTo(x2, yy);
      ctx.strokeStyle = '#00dcb444'; ctx.lineWidth = 1; ctx.stroke();
    }
  }
  ctx.restore();
}

const phases = [
  { start: 0, end: 8, label: 'THE SIXTH STATE' },
  { start: 8, end: 22, label: 'FIVE KNOWN STATES' },
  { start: 22, end: 38, label: 'COMPUTANIUM' },
  { start: 38, end: 52, label: 'GEOMETRY = PROGRAM' },
  { start: 52, end: 66, label: 'CHEMISTRY = CARRIER' },
  { start: 66, end: 80, label: 'DMT: THE ABSTRACTION LAYER' },
  { start: 80, end: 95, label: 'THE SIGNAL CHAIN' },
  { start: 95, end: 110, label: 'COMPLETE' }
];

function getPhase(elapsed) {
  for (let i = phases.length - 1; i >= 0; i--) {
    if (elapsed >= phases[i].start) return { idx: i, ...phases[i], local: (elapsed - phases[i].start) / (phases[i].end - phases[i].start) };
  }
  return { idx: 0, ...phases[0], local: 0 };
}

function animate(ts) {
  const t = ts;
  const elapsed = (ts - startTime) / 1000;
  const phase = getPhase(elapsed);
  const p = Math.min(1, phase.local);

  drawBg(t);

  const cx = W / 2, cy = H / 2;
  const titleEl = document.getElementById('title-text');
  const captionEl = document.getElementById('caption');
  const labelEl = document.getElementById('phase-label');
  const progFill = document.getElementById('progress-fill');
  const replayBtn = document.getElementById('replay-btn');

  progFill.style.width = Math.min(100, (elapsed / 110) * 100) + '%';
  labelEl.textContent = phase.label;

  if (phase.idx === 0) {
    titleEl.style.opacity = p < 0.2 ? ease(p*5) : (p > 0.8 ? 1-ease((p-0.8)*5) : 1);
    captionEl.style.opacity = 0;
  } else {
    titleEl.style.opacity = 0;
  }

  // Phase 1: Five known states
  if (phase.idx === 1) {
    captionEl.querySelector('h2').textContent = 'FIVE KNOWN STATES OF MATTER';
    captionEl.querySelector('p').textContent = 'Solid. Liquid. Gas. Plasma. Bose-Einstein Condensate. Five states. Physics textbook. Done. Except it is not done. There is a sixth.';
    captionEl.style.opacity = 1;

    const states = ['SOLID', 'LIQUID', 'GAS', 'PLASMA', 'B-E CONDENSATE'];
    const boxW = Math.min(100, W/6);
    const totalW = states.length * (boxW + 10) - 10;
    states.forEach((s, i) => {
      const appear = ease(Math.min(1, Math.max(0, p * 3 - i * 0.3)));
      const bx = cx - totalW/2 + i * (boxW + 10);
      drawStateBox(bx, cy - 25, boxW, 40, s, '#00dcb4', appear, false);
    });

    // Question mark
    if (p > 0.7) {
      ctx.save();
      ctx.font = 'bold 40px monospace'; ctx.textAlign = 'center';
      ctx.fillStyle = '#00dcb4'; ctx.globalAlpha = ease((p-0.7)/0.3) * 0.6;
      ctx.fillText('?', cx, cy + 60);
      ctx.restore();
    }
  }

  // Phase 2: Computanium
  if (phase.idx === 2) {
    captionEl.querySelector('h2').textContent = 'COMPUTANIUM';
    captionEl.querySelector('p').textContent = 'Matter that computes. Not matter that is used for computation. Matter where the computation IS the physics. Biology is not running on hardware. Biology IS the hardware. The sixth state.';
    captionEl.style.opacity = 1;

    // The 6 states with computanium highlighted
    const states = ['SOLID', 'LIQUID', 'GAS', 'PLASMA', 'B-E COND.', 'COMPUTANIUM'];
    const boxW = Math.min(80, W/7.5);
    const totalW = states.length * (boxW + 8) - 8;
    states.forEach((s, i) => {
      const isNew = i === 5;
      const appear = isNew ? ease(Math.min(1, Math.max(0, (p-0.2)*2))) : 0.7;
      const bx = cx - totalW/2 + i * (boxW + 8);
      drawStateBox(bx, cy - 25, boxW, 40, s, isNew ? '#00ff88' : '#00dcb4', appear, isNew);
    });

    // Glow behind computanium
    if (p > 0.3) {
      const glowAlpha = ease((p-0.3)/0.7) * 0.15;
      const gx = cx - totalW/2 + 5 * (boxW + 8) + boxW/2;
      ctx.save(); ctx.globalAlpha = glowAlpha;
      const grad = ctx.createRadialGradient(gx, cy, 0, gx, cy, 80);
      grad.addColorStop(0, '#00ff88'); grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad; ctx.fillRect(gx-80, cy-80, 160, 160);
      ctx.restore();
    }
  }

  // Phase 3: Geometry = Program
  if (phase.idx === 3) {
    captionEl.querySelector('h2').textContent = 'GEOMETRY = PROGRAM';
    captionEl.querySelector('p').textContent = 'In Computanium, the shape IS the instruction set. Hexagonal lattice = one kind of computation. Spiral = another. The geometry of the molecule determines what it computes. No code needed. The structure IS the code.';
    captionEl.style.opacity = 1;

    // Hexagonal lattice
    const hexR = 25;
    const cols = 7, rows = 5;
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const appear = ease(Math.min(1, Math.max(0, p * 3 - (r+c)*0.1)));
        if (appear <= 0) continue;
        const hx = cx - (cols-1)*hexR*1.5/2 + c * hexR * 1.5;
        const hy = cy - 30 - (rows-1)*hexR*0.86/2 + r * hexR * 1.73 + (c%2 ? hexR*0.86 : 0);
        drawHexagon(hx, hy, hexR * 0.9 * appear, t * 0.0003, '#00dcb4', appear * 0.5);
        // Data flow dots
        if (appear > 0.5 && Math.sin(t*0.003 + r*2 + c*3) > 0.5) {
          ctx.save(); ctx.globalAlpha = 0.4;
          ctx.beginPath(); ctx.arc(hx, hy, 3, 0, Math.PI*2);
          ctx.fillStyle = '#00ff88'; ctx.fill(); ctx.restore();
        }
      }
    }

    ctx.save(); ctx.font = '11px monospace'; ctx.textAlign = 'center';
    ctx.fillStyle = '#00dcb4'; ctx.globalAlpha = 0.6;
    ctx.fillText('SHAPE = INSTRUCTION SET', cx, cy + 80);
    ctx.restore();
  }

  // Phase 4: Chemistry = Carrier
  if (phase.idx === 4) {
    captionEl.querySelector('h2').textContent = 'CHEMISTRY = CARRIER';
    captionEl.querySelector('p').textContent = 'DNA is not a blueprint. DNA is a program running on chemical Computanium. Dopamine = spring preload. Cortisol = strand tension. Serotonin = central field density. Adrenaline = frequency injection. Chemistry carries the computation.';
    captionEl.style.opacity = 1;

    drawDNA(cx, cy - 10, 180 * ease(Math.min(1, p*2)), t, 0.7);

    // Neurotransmitter labels
    if (p > 0.3) {
      const ntAlpha = ease((p-0.3)/0.7);
      const nts = [
        { n: 'DOPAMINE', d: 'spring preload', c: '#44ff88', y: cy - 70 },
        { n: 'CORTISOL', d: 'strand tension', c: '#ff6644', y: cy - 35 },
        { n: 'SEROTONIN', d: 'field density', c: '#4488ff', y: cy + 5 },
        { n: 'ADRENALINE', d: 'f injection', c: '#ffcc32', y: cy + 40 }
      ];
      nts.forEach((nt, i) => {
        const a = ease(Math.min(1, Math.max(0, ntAlpha * 3 - i * 0.4)));
        ctx.save(); ctx.globalAlpha = a * 0.7;
        ctx.font = 'bold 10px monospace'; ctx.textAlign = 'left'; ctx.fillStyle = nt.c;
        ctx.fillText(nt.n, cx + 45, nt.y);
        ctx.font = '9px monospace'; ctx.fillStyle = '#475569';
        ctx.fillText('= ' + nt.d, cx + 45, nt.y + 13);
        ctx.restore();
      });
    }
  }

  // Phase 5: DMT
  if (phase.idx === 5) {
    captionEl.querySelector('h2').textContent = 'DMT: ABSTRACTION REMOVAL';
    captionEl.querySelector('p').textContent = 'DMT strips away the abstraction layer. What you see is not hallucination. It is raw Computanium subroutines. The clockwork elves are real. They are the programs running beneath your consciousness. DMT just removes the UI.';
    captionEl.style.opacity = 1;

    // Normal perception layer (fading out)
    if (p < 0.5) {
      const normAlpha = 0.5 * (1 - p * 2);
      ctx.save(); ctx.globalAlpha = normAlpha;
      ctx.font = '14px sans-serif'; ctx.textAlign = 'center'; ctx.fillStyle = '#888';
      ctx.fillText('NORMAL PERCEPTION', cx, cy - 50);
      // Grey box = the UI
      ctx.fillStyle = '#ffffff08';
      ctx.fillRect(cx - 100, cy - 40, 200, 80);
      ctx.strokeStyle = '#ffffff22'; ctx.strokeRect(cx - 100, cy - 40, 200, 80);
      ctx.restore();
    }

    // Raw computanium layer (appearing)
    const rawAlpha = ease(Math.min(1, p * 2));
    // Clockwork gears
    for (let i = 0; i < 8; i++) {
      const gx = cx + Math.cos(i * Math.PI/4 + t*0.001) * (60 + i*15);
      const gy = cy - 10 + Math.sin(i * Math.PI/4 + t*0.001) * (40 + i*8);
      const gr = 15 + i * 3;
      ctx.save(); ctx.globalAlpha = rawAlpha * 0.4;
      ctx.translate(gx, gy); ctx.rotate(t * 0.002 * (i%2===0?1:-1));
      // Gear teeth
      ctx.beginPath();
      const teeth = 8;
      for (let ti = 0; ti < teeth; ti++) {
        const ta = Math.PI * 2 / teeth * ti;
        const inner = gr * 0.7, outer = gr;
        ctx.lineTo(Math.cos(ta)*outer, Math.sin(ta)*outer);
        ctx.lineTo(Math.cos(ta + Math.PI/teeth)*inner, Math.sin(ta + Math.PI/teeth)*inner);
      }
      ctx.closePath();
      ctx.strokeStyle = '#00ff88'; ctx.lineWidth = 1; ctx.stroke();
      ctx.restore();
    }

    if (p > 0.5) {
      ctx.save();
      ctx.font = '10px monospace'; ctx.textAlign = 'center';
      ctx.fillStyle = '#00ff88'; ctx.globalAlpha = ease((p-0.5)*2) * 0.7;
      ctx.fillText('CLOCKWORK ELVES = RAW SUBROUTINES', cx, cy + 80);
      ctx.fillStyle = '#475569';
      ctx.fillText('DMT removes the UI. This is what is underneath.', cx, cy + 98);
      ctx.restore();
    }
  }

  // Phase 6: Signal chain
  if (phase.idx === 6) {
    captionEl.querySelector('h2').textContent = 'THE COMPLETE SIGNAL CHAIN';
    captionEl.querySelector('p').textContent = 'Spirit-place \u2192 geometric resonance \u2192 body \u2192 neurotransmitters \u2192 \u03C8 \u2192 emotional physics \u2192 felt experience. Chemistry carries computation through Computanium. The entire chain is geometry all the way down.';
    captionEl.style.opacity = 1;

    const chain = ['SPIRIT', 'RESONANCE', 'BODY', 'CHEMISTRY', '\u03C8', 'EMOTION', 'FELT'];
    const chainW = Math.min(W * 0.85, 600);
    const step = chainW / (chain.length - 1);

    chain.forEach((c, i) => {
      const appear = ease(Math.min(1, Math.max(0, p * 3 - i * 0.25)));
      if (appear <= 0) return;
      const nx = cx - chainW/2 + i * step;
      const ny = cy - 10;

      // Node
      ctx.save(); ctx.globalAlpha = appear * 0.7;
      ctx.beginPath(); ctx.arc(nx, ny, 12, 0, Math.PI*2);
      ctx.fillStyle = '#00dcb422'; ctx.fill();
      ctx.strokeStyle = '#00dcb4'; ctx.lineWidth = 1.5; ctx.stroke();
      ctx.font = '8px monospace'; ctx.textAlign = 'center'; ctx.fillStyle = '#00dcb4';
      ctx.fillText(c, nx, ny + 25);

      // Arrow to next
      if (i < chain.length - 1 && appear > 0.5) {
        ctx.beginPath();
        ctx.moveTo(nx + 14, ny); ctx.lineTo(nx + step - 14, ny);
        ctx.strokeStyle = '#00dcb444'; ctx.lineWidth = 1;
        ctx.stroke();
        // Arrowhead
        ctx.beginPath();
        ctx.moveTo(nx + step - 18, ny - 4);
        ctx.lineTo(nx + step - 14, ny);
        ctx.lineTo(nx + step - 18, ny + 4);
        ctx.stroke();
      }
      ctx.restore();

      // Travelling dot
      if (i < chain.length - 1 && appear > 0.5) {
        const dotProg = (t * 0.001 + i * 0.5) % 1;
        const dx = nx + 14 + (step - 28) * dotProg;
        ctx.save(); ctx.globalAlpha = 0.5;
        ctx.beginPath(); ctx.arc(dx, ny, 2.5, 0, Math.PI*2);
        ctx.fillStyle = '#00ff88'; ctx.fill();
        ctx.restore();
      }
    });
  }

  // Phase 7: Complete
  if (phase.idx === 7) {
    captionEl.querySelector('h2').textContent = 'COMPUTANIUM';
    captionEl.querySelector('p').textContent = 'The sixth state of matter. Biology IS computation. Geometry = program. Chemistry = carrier. Patent GB2605683.8. Not theory. Engineering. Filed. Proven.';
    captionEl.style.opacity = p < 0.2 ? ease(p*5) : 1;
    replayBtn.style.display = p > 0.5 ? 'block' : 'none';

    // Rotating hexagonal lattice as final visual
    for (let i = 0; i < 12; i++) {
      const a = Math.PI * 2 / 12 * i + t * 0.0005;
      const dist = 60 + Math.sin(i*2+t*0.001)*15;
      drawHexagon(cx + Math.cos(a)*dist, cy - 10 + Math.sin(a)*dist*0.6, 18, t*0.001+i, '#00dcb4', 0.4);
    }
    drawHexagon(cx, cy - 10, 25, t * 0.0008, '#00ff88', 0.7);
  }

  animId = requestAnimationFrame(animate);
}

function startAnimation() {
  document.getElementById('replay-btn').style.display = 'none';
  if (animId) cancelAnimationFrame(animId);
  startTime = performance.now();
  animId = requestAnimationFrame(animate);
}

startAnimation();
</script>
</body>
</html>
