<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CORTEX — Architecture Snapshot</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #06060e;
  color: #aaa;
  font-family: 'Courier New', monospace;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
canvas { display: block; }

#status-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 8px 20px;
  background: rgba(0,0,0,0.6);
  border-top: 1px solid #1a1a2a;
  font-size: 11px;
  color: #555;
  display: flex;
  gap: 20px;
  align-items: center;
}
#status-bar .tag { color: #333; }
#status-bar .val { color: #666; }
#status-bar .val.on { color: #44ff88; }
#status-bar .val.warn { color: #ffaa33; }

#last-msg {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  padding: 8px 20px;
  background: rgba(0,0,0,0.5);
  border-bottom: 1px solid #1a1a2a;
  font-size: 11px;
  color: #444;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
#last-msg .label { color: #333; margin-right: 8px; }
#last-msg .msg { color: #556; }
#last-msg .reply { color: #445; }
</style>
</head>
<body>

<div id="last-msg">
  <span class="label">IN</span><span id="txt-msg" class="msg">—</span>
  <span class="label" style="margin-left:16px">OUT</span><span id="txt-reply" class="reply">—</span>
</div>

<canvas id="c"></canvas>

<div id="status-bar">
  <span><span class="tag">CORTEX </span><span id="sb-online" class="val">OFFLINE</span></span>
  <span><span class="tag">HEMI </span><span id="sb-hemi" class="val">—</span></span>
  <span><span class="tag">CONF </span><span id="sb-conf" class="val">—</span></span>
  <span><span class="tag">HEDONIC </span><span id="sb-hed" class="val">—</span></span>
  <span><span class="tag">NODES </span><span id="sb-nodes" class="val">—</span></span>
  <span><span class="tag">RAMBLE </span><span id="sb-ramble" class="val">OFF</span></span>
  <span style="margin-left:auto; font-size:10px; color:#2a2a3a" id="sb-time">—</span>
</div>

<script>
'use strict';

// ─── Config ────────────────────────────────────────────────────────────────

const API = '/alive/studio/api/architecture-snapshot';
const POLL_MS = 2000;

// ─── Organ definitions ─────────────────────────────────────────────────────

const ORGANS = [
  { key: 'eyes',      emoji: '👁',  color: '#00ccff', label: 'VISION'    },
  { key: 'ears',      emoji: '👂',  color: '#4488ff', label: 'INPUT'     },
  { key: 'nose',      emoji: '👃',  color: '#ff88cc', label: 'SENTIMENT' },
  { key: 'mouth',     emoji: '👄',  color: '#ffcc00', label: 'OUTPUT'    },
  { key: 'brain',     emoji: '🧠',  color: '#cc44ff', label: 'COGNITION' },
  { key: 'robot',     emoji: '🤖',  color: '#44ff88', label: 'CODE'      },
  { key: 'emotion',   emoji: '🎡',  color: '#ff88ff', label: 'EMOTION'   },
  { key: 'serotonin', emoji: '💙',  color: '#4466ff', label: 'SEROTONIN' },
  { key: 'dopamine',  emoji: '💛',  color: '#ffee00', label: 'DOPAMINE'  },
  { key: 'cortisol',  emoji: '🔴',  color: '#ff3333', label: 'CORTISOL'  },
  { key: 'neural',    emoji: '🕸',  color: '#00ddff', label: 'NEURAL'    },
  { key: 'heart',     emoji: '❤',  color: '#ff2244', label: 'HEDONIC'   },
  { key: 'lungs',     emoji: '🫁',  color: '#44ffcc', label: 'RHYTHM'    },
];

// ─── MemeQ node definitions ─────────────────────────────────────────────────

const MEMEQ = [
  { key: 'STARGATE',       icon: '🔺', label: 'STARGATE'     },
  { key: 'COOKIE_MONSTER', icon: '🍪', label: 'COOKIE'       },
  { key: 'WINDOW',         icon: '🪟', label: 'WINDOW'       },
  { key: 'INTERSTELLAR',   icon: '⭐', label: 'INTERSTELLAR' },
  { key: 'TOTAL_RECALL',   icon: '🔄', label: 'TOTAL RECALL' },
  { key: 'RED_DWARF',      icon: '🌌', label: 'RED DWARF'    },
  { key: 'EGO_DISCOVERY',  icon: '🌀', label: 'EGO'          },
  { key: 'GOLLUM',         icon: '💍', label: 'GOLLUM'       },
  { key: 'VADER',          icon: '⚔️', label: 'VADER'        },
  { key: 'RETARD_RULE',    icon: '⚠️', label: 'RETARD RULE'  },
];

// ─── Logic gate nodes (spring physics) ─────────────────────────────────────

const GATES = [
  { key: 'AND', symbol: '△', color: '#ffffff', angle: 0,              vel: 0 },
  { key: 'OR',  symbol: '○', color: '#aaffbb', angle: 2*Math.PI/3,   vel: 0 },
  { key: 'NOT', symbol: '—', color: '#ffaaaa', angle: 4*Math.PI/3,   vel: 0 },
];

// ─── Canvas setup ───────────────────────────────────────────────────────────

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H, CX, CY;

function resize() {
  const s = Math.min(window.innerWidth, window.innerHeight - 60);
  W = H = s;
  canvas.width  = W;
  canvas.height = H;
  CX = W / 2;
  CY = H / 2;
}
window.addEventListener('resize', resize);
resize();

// Radii scale with canvas size
function R(fraction) { return W * fraction; }

// ─── State ──────────────────────────────────────────────────────────────────

let state = null;          // last snapshot from API
let frame = 0;
let online = false;
let lastPoll = 0;
let pulseT = {};           // per-organ pulse timers

// Smoothed organ levels (lerp toward target)
const smoothLevels = {};
ORGANS.forEach(o => smoothLevels[o.key] = 0);

// ─── API polling ────────────────────────────────────────────────────────────

async function poll() {
  try {
    const r = await fetch(API, { method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: '{}', signal: AbortSignal.timeout(3000) });
    if (r.ok) {
      state  = await r.json();
      online = true;
      updateStatusBar();
    }
  } catch(e) {
    online = false;
    document.getElementById('sb-online').textContent = 'OFFLINE';
    document.getElementById('sb-online').className   = 'val';
  }
}

function updateStatusBar() {
  if (!state) return;
  const sb = (id, txt, cls) => {
    const el = document.getElementById(id);
    el.textContent = txt;
    el.className = 'val' + (cls ? ' ' + cls : '');
  };
  sb('sb-online', 'ONLINE', 'on');
  sb('sb-hemi',   (state.hemisphere || '—').toUpperCase());
  sb('sb-conf',   state.confidence != null ? (state.confidence * 100).toFixed(0) + '%' : '—');
  const net = state.hedonic?.net ?? 0;
  sb('sb-hed',    (net >= 0 ? '+' : '') + net.toFixed(2), net > 0.2 ? 'on' : net < -0.2 ? 'warn' : '');
  const n = state.nodes || {};
  sb('sb-nodes',  ((n.left||0) + (n.right||0) + (n.cortex||0)).toLocaleString());
  sb('sb-ramble', state.ramble_active ? 'ON' : 'OFF', state.ramble_active ? 'on' : '');
  document.getElementById('sb-time').textContent = new Date().toLocaleTimeString();
  document.getElementById('txt-msg').textContent   = state.last_msg   || '—';
  document.getElementById('txt-reply').textContent = state.last_reply || '—';
}

// ─── Physics ─────────────────────────────────────────────────────────────────

function getPriorityAngle() {
  const key = state?.priority_organ || 'brain';
  const idx = ORGANS.findIndex(o => o.key === key);
  return organAngle(idx < 0 ? 4 : idx);
}

function organAngle(idx) {
  return (idx / ORGANS.length) * 2 * Math.PI - Math.PI / 2;
}

function updateGatePhysics() {
  const target = getPriorityAngle();
  const k = 0.025;
  const damp = 0.88;
  const spread = 0.35;  // angular spread between gates when clustered

  GATES.forEach((g, i) => {
    const offset = (i - 1) * spread;  // -spread, 0, +spread
    let desired = target + offset;
    let da = desired - g.angle;
    // Normalise to [-π, π]
    while (da >  Math.PI) da -= 2 * Math.PI;
    while (da < -Math.PI) da += 2 * Math.PI;
    g.vel  = g.vel * damp + da * k;
    g.angle += g.vel;
  });
}

function updateSmoothLevels() {
  ORGANS.forEach(o => {
    const target = state?.organs?.[o.key]?.level ?? 0;
    smoothLevels[o.key] += (target - smoothLevels[o.key]) * 0.12;
  });
}

// ─── Draw helpers ────────────────────────────────────────────────────────────

function hexAlpha(hex, a) {
  // Convert #rrggbb to rgba
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function drawRingGuide(r, color) {
  ctx.beginPath();
  ctx.arc(CX, CY, r, 0, 2*Math.PI);
  ctx.strokeStyle = color;
  ctx.lineWidth = 0.5;
  ctx.setLineDash([4, 8]);
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawOrgan(idx) {
  const organ  = ORGANS[idx];
  const angle  = organAngle(idx);
  const r_ring = R(0.17);
  const x = CX + r_ring * Math.cos(angle);
  const y = CY + r_ring * Math.sin(angle);
  const level  = smoothLevels[organ.key];
  const oState = state?.organs?.[organ.key];
  const active = oState?.active || false;

  const baseR = R(0.036);
  const pulse = active ? Math.sin(frame * 0.04 + idx * 0.5) * 0.12 + 0.88 : 1.0;
  const rr    = baseR * (1 + level * 0.25) * pulse;

  // Glow
  if (active && level > 0.2) {
    ctx.save();
    ctx.shadowBlur  = 18 * level;
    ctx.shadowColor = organ.color;
    ctx.beginPath();
    ctx.arc(x, y, rr, 0, 2*Math.PI);
    ctx.fillStyle = hexAlpha(organ.color, 0.05);
    ctx.fill();
    ctx.restore();
  }

  // Background fill
  ctx.beginPath();
  ctx.arc(x, y, rr, 0, 2*Math.PI);
  ctx.fillStyle = active ? hexAlpha(organ.color, 0.12 + level * 0.15) : 'rgba(15,15,25,0.9)';
  ctx.fill();

  // Border
  ctx.strokeStyle = active ? hexAlpha(organ.color, 0.5 + level * 0.5) : '#222';
  ctx.lineWidth   = active ? 1.2 : 0.4;
  ctx.stroke();

  // Level arc
  if (active && level > 0.05) {
    ctx.beginPath();
    ctx.arc(x, y, rr + 3, -Math.PI/2, -Math.PI/2 + level * 2*Math.PI);
    ctx.strokeStyle = hexAlpha(organ.color, 0.6);
    ctx.lineWidth   = 1.5;
    ctx.stroke();
  }

  // Emoji
  const fs = Math.round(rr * 1.0);
  ctx.font = `${fs}px serif`;
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  ctx.globalAlpha  = active ? 0.9 + level * 0.1 : 0.18;
  ctx.fillText(organ.emoji, x, y);
  ctx.globalAlpha  = 1;

  // Label (tiny, below circle)
  const labelY = y + rr + 9;
  ctx.font      = `${Math.max(8, R(0.012))}px 'Courier New', monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillStyle = active ? hexAlpha(organ.color, 0.5 + level * 0.3) : '#252535';
  ctx.fillText(organ.label, x, labelY);
}

function drawGate(idx) {
  const gate  = GATES[idx];
  const r_ring = R(0.31);
  const x = CX + r_ring * Math.cos(gate.angle);
  const y = CY + r_ring * Math.sin(gate.angle);
  const rr = R(0.028);
  const online_flag = state?.online || false;

  // Draw connection line to priority organ
  if (online_flag && idx === 0) {
    const pKey = state?.priority_organ || 'brain';
    const pIdx = ORGANS.findIndex(o => o.key === pKey);
    const pa   = organAngle(pIdx >= 0 ? pIdx : 4);
    const r_in = R(0.17);
    const px   = CX + r_in * Math.cos(pa);
    const py   = CY + r_in * Math.sin(pa);
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(px, py);
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    ctx.lineWidth   = 0.5;
    ctx.setLineDash([3, 6]);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Glow when online
  if (online_flag) {
    ctx.save();
    ctx.shadowBlur  = 8;
    ctx.shadowColor = gate.color;
    ctx.restore();
  }

  // Background
  ctx.beginPath();
  ctx.arc(x, y, rr, 0, 2*Math.PI);
  ctx.fillStyle = online_flag ? 'rgba(20,20,35,0.9)' : 'rgba(10,10,18,0.8)';
  ctx.fill();
  ctx.strokeStyle = online_flag ? hexAlpha(gate.color, 0.5) : '#1a1a2a';
  ctx.lineWidth = 0.8;
  ctx.stroke();

  // Symbol
  const fs = Math.round(rr * 1.2);
  ctx.font = `bold ${fs}px 'Courier New', monospace`;
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle    = online_flag ? gate.color : '#2a2a3a';
  ctx.globalAlpha  = online_flag ? 0.9 : 0.4;
  ctx.fillText(gate.symbol, x, y);
  ctx.globalAlpha  = 1;

  // Key label
  ctx.font = `${Math.max(7, R(0.011))}px 'Courier New', monospace`;
  ctx.fillStyle = online_flag ? hexAlpha(gate.color, 0.35) : '#1a1a28';
  ctx.fillText(gate.key, x, y + rr + 8);
}

function drawMemeQ(idx) {
  const node   = MEMEQ[idx];
  const r_ring = R(0.475);
  const angle  = (idx / MEMEQ.length) * 2*Math.PI - Math.PI/2;
  const x = CX + r_ring * Math.cos(angle);
  const y = CY + r_ring * Math.sin(angle);
  const active = state?.active_memeq?.includes(node.key) || false;
  const rr = R(0.028);

  if (active) {
    ctx.save();
    ctx.shadowBlur  = 16;
    ctx.shadowColor = '#ffcc44';
    ctx.beginPath();
    ctx.arc(x, y, rr, 0, 2*Math.PI);
    ctx.fillStyle = 'rgba(255,204,68,0.15)';
    ctx.fill();
    ctx.restore();
  }

  ctx.beginPath();
  ctx.arc(x, y, rr, 0, 2*Math.PI);
  ctx.fillStyle   = active ? 'rgba(255,204,68,0.12)' : 'rgba(12,12,20,0.8)';
  ctx.fill();
  ctx.strokeStyle = active ? 'rgba(255,204,68,0.7)' : '#1a1a28';
  ctx.lineWidth   = active ? 1.2 : 0.4;
  ctx.stroke();

  // Icon
  const fs = Math.round(rr * 0.9);
  ctx.font = `${fs}px serif`;
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  ctx.globalAlpha  = active ? 1.0 : 0.2;
  ctx.fillText(node.icon, x, y);
  ctx.globalAlpha  = 1;

  // Label
  const lx = CX + (r_ring + rr + 10) * Math.cos(angle);
  const ly = CY + (r_ring + rr + 10) * Math.sin(angle);
  ctx.font      = `${Math.max(7, R(0.011))}px 'Courier New', monospace`;
  ctx.textAlign = Math.cos(angle) > 0.2 ? 'left' : Math.cos(angle) < -0.2 ? 'right' : 'center';
  ctx.textBaseline = Math.sin(angle) > 0 ? 'top' : 'bottom';
  ctx.fillStyle = active ? 'rgba(255,204,68,0.6)' : '#1e1e2a';
  ctx.fillText(node.label, lx, ly);
}

function drawCenter() {
  const online_flag = state?.online || false;
  const hemi  = state?.hemisphere || '';
  const rr    = R(0.04);

  // Center ring
  ctx.beginPath();
  ctx.arc(CX, CY, rr, 0, 2*Math.PI);
  const hemiColors = {
    left: '#ff2244', right: '#ff6633', synthesis: '#cc44ff',
    identity: '#cc44ff', identity_fast: '#cc44ff',
    memeq: '#ff88ff', memeq_routing: '#ff88ff',
  };
  const hc = hemiColors[hemi] || '#334';
  ctx.fillStyle   = online_flag ? hexAlpha(hc, 0.12) : 'rgba(15,15,22,0.9)';
  ctx.fill();
  ctx.strokeStyle = online_flag ? hexAlpha(hc, 0.5) : '#1a1a2a';
  ctx.lineWidth   = 1;
  ctx.stroke();

  // LENS text
  ctx.font      = `bold ${Math.max(10, R(0.018))}px 'Courier New', monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = online_flag ? hexAlpha(hc, 0.8) : '#252535';
  ctx.fillText('LENS', CX, CY - rr * 0.2);

  ctx.font      = `${Math.max(7, R(0.011))}px 'Courier New', monospace`;
  ctx.fillStyle = online_flag ? hexAlpha(hc, 0.4) : '#1a1a2a';
  ctx.fillText(hemi.toUpperCase() || 'OFFLINE', CX, CY + rr * 0.55);
}

function drawBackground() {
  ctx.fillStyle = '#06060e';
  ctx.fillRect(0, 0, W, H);

  // Faint radial gradient
  const grad = ctx.createRadialGradient(CX, CY, 0, CX, CY, W*0.6);
  grad.addColorStop(0, 'rgba(100,50,200,0.03)');
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

// ─── Main render loop ────────────────────────────────────────────────────────

function render() {
  frame++;
  drawBackground();

  // Ring guides
  drawRingGuide(R(0.17),  '#111120');
  drawRingGuide(R(0.31),  '#0e0e1c');
  drawRingGuide(R(0.475), '#0c0c18');

  updateSmoothLevels();
  updateGatePhysics();

  // Draw priority beam from center to priority organ
  if (state?.online) {
    const pKey = state.priority_organ || 'brain';
    const pIdx = ORGANS.findIndex(o => o.key === pKey);
    if (pIdx >= 0) {
      const pa = organAngle(pIdx);
      const r_in = R(0.17);
      const px = CX + r_in * Math.cos(pa);
      const py = CY + r_in * Math.sin(pa);
      const beam = ctx.createLinearGradient(CX, CY, px, py);
      beam.addColorStop(0,   'rgba(255,255,255,0.0)');
      beam.addColorStop(0.5, hexAlpha(ORGANS[pIdx].color, 0.04));
      beam.addColorStop(1,   hexAlpha(ORGANS[pIdx].color, 0.0));
      ctx.beginPath();
      ctx.moveTo(CX, CY);
      ctx.lineTo(px, py);
      ctx.strokeStyle = beam;
      ctx.lineWidth   = 12;
      ctx.stroke();
    }
  }

  // Outer MemeQ ring
  MEMEQ.forEach((_, i) => drawMemeQ(i));

  // Middle gate ring
  GATES.forEach((_, i) => drawGate(i));

  // Inner organ ring
  ORGANS.forEach((_, i) => drawOrgan(i));

  // Center
  drawCenter();

  requestAnimationFrame(render);
}

// ─── Boot ────────────────────────────────────────────────────────────────────

setInterval(poll, POLL_MS);
poll();
render();
</script>
</body>
</html>
