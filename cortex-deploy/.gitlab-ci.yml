stages:
  - deploy

deploy-brain:
  stage: deploy
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - apk add --no-cache curl
    - curl -L https://fly.io/install.sh | sh
    - export PATH="$HOME/.fly/bin:$PATH"
  script:
    - fly auth token --token "$FLY_API_TOKEN"
    - fly deploy --remote-only
  only:
    - main
  environment:
    name: production
    url: https://cortex-brain-sf.fly.dev
