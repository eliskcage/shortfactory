# fly.toml — Cortex Brain deployment
app = "cortex-brain-sf"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8643"
  PYTHONUNBUFFERED = "1"

[http_service]
  internal_port = 8643
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 50
    hard_limit = 100

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

# Persistent volume for brain data (left/right/cortex hemispheres)
[[mounts]]
  source = "cortex_brain_data"
  destination = "/app/data"
  initial_size = "3gb"
