<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000a14">
<link rel="manifest" href="../manifest.json">
<link rel="apple-touch-icon" href="../icon-192.svg">
<title>ALIVE</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;height:100%;
  background:#000a14;color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  overflow:hidden;
  touch-action:manipulation;
  -webkit-user-select:none;user-select:none;
}

/* ═══ TOP BAR ═══ */
.top-bar{
  position:fixed;top:0;left:0;right:0;z-index:20;
  padding:env(safe-area-inset-top,8px) 16px 8px;
  display:flex;align-items:center;gap:12px;
  background:linear-gradient(to bottom,rgba(0,10,20,0.9),transparent);
}
.blood-track{
  flex:1;height:6px;border-radius:3px;
  background:rgba(255,255,255,0.08);overflow:hidden;
}
.blood-fill{
  height:100%;border-radius:3px;
  background:linear-gradient(90deg,#0088cc,#00ccff);
  transition:width 0.5s;
}
.blood-fill.panic{
  background:linear-gradient(90deg,#ff4400,#ff6600);
  animation:bpulse 0.6s infinite;
}
@keyframes bpulse{50%{opacity:0.5}}
.blood-text{
  font-size:11px;color:#00ccff;font-weight:600;
  min-width:42px;text-align:right;
  font-variant-numeric:tabular-nums;
}
.hearts{font-size:13px;letter-spacing:2px;color:#00ccff;text-shadow:0 0 6px rgba(0,200,255,0.6)}
.hearts.flash{animation:heartFlash 0.8s ease}
@keyframes heartFlash{0%{transform:scale(1.8);filter:brightness(2)}100%{transform:scale(1);filter:brightness(1)}}
.mood-badge{
  font-size:10px;letter-spacing:1px;
  color:rgba(255,255,255,0.4);text-transform:uppercase;
}
.age-badge{
  font-size:10px;color:#00ccff80;letter-spacing:1px;
}

/* ═══ GIRL PAIR BUTTON (screen/monitor shape) ═══ */
.pair-btn{
  position:fixed;top:50px;right:16px;z-index:20;
  width:36px;height:28px;border-radius:3px;
  border:2px solid rgba(255,20,147,0.25);
  background:rgba(255,20,147,0.04);
  cursor:pointer;
  transition:border-color 0.3s,box-shadow 0.3s;
  display:block;
}
.pair-btn::after{
  content:'';position:absolute;
  bottom:-7px;left:50%;transform:translateX(-50%);
  width:12px;height:5px;border-bottom:2px solid rgba(255,20,147,0.2);
  border-left:1px solid rgba(255,20,147,0.15);
  border-right:1px solid rgba(255,20,147,0.15);
}
/* Red error shake */
@keyframes pairReject{
  0%,100%{transform:translateX(0);border-color:rgba(255,20,147,0.25)}
  10%{transform:translateX(-6px);border-color:#ff0040}
  20%{transform:translateX(5px);border-color:#ff0040}
  30%{transform:translateX(-4px);border-color:#ff2020}
  40%{transform:translateX(4px);border-color:#ff2020}
  50%{transform:translateX(-2px);border-color:#ff4040}
  60%{transform:translateX(2px)}
  70%{transform:translateX(0)}
}
.pair-btn.rejected{
  animation:pairReject 0.7s ease;
  box-shadow:0 0 20px rgba(255,0,40,0.5);
}
/* Pair signal sent glow */
.pair-btn.sent{
  border-color:#ff1493;
  box-shadow:0 0 12px rgba(255,20,147,0.4);
}
/* Incoming pair ping */
@keyframes pairPing{
  0%,100%{box-shadow:0 0 8px rgba(255,20,147,0.2)}
  50%{box-shadow:0 0 24px rgba(255,20,147,0.6)}
}
.pair-btn.paired{
  border-color:#ff69b4;
  animation:pairPing 1.5s ease-in-out infinite;
}

/* ═══ CANVAS ═══ */
#galaxy{
  position:fixed;inset:0;width:100%;height:100%;
  z-index:0;display:block;
}

/* ═══ SHAPE INDICATOR (shows what shape the soul is becoming) ═══ */
.shape-name{
  position:fixed;top:50px;left:0;right:0;z-index:10;
  text-align:center;pointer-events:none;
  font-size:40px;opacity:0;
  transition:opacity 0.4s;
  text-shadow:0 0 30px rgba(0,200,255,0.4);
}
.shape-name.show{opacity:0.6}

/* ═══ STATUS ═══ */
.status-area{
  position:fixed;top:100px;left:0;right:0;z-index:10;
  text-align:center;pointer-events:none;
}
.status-text{
  font-size:13px;color:rgba(255,255,255,0.25);
  letter-spacing:1px;
}

/* ═══ FEEDBACK ═══ */
.feedback-row{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:25;display:none;gap:32px;
}
.fb-btn{
  width:72px;height:72px;border-radius:50%;border:none;
  font-size:32px;cursor:pointer;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
  transition:transform 0.2s,background 0.2s;
}
.fb-btn:active{transform:scale(0.9);background:rgba(255,255,255,0.15)}

/* ═══ BOTTOM CONTROLS ═══ */
.controls{
  position:fixed;bottom:0;left:0;right:0;z-index:20;
  padding:12px 8px calc(env(safe-area-inset-bottom,12px) + 8px);
  display:flex;flex-direction:column;align-items:center;gap:10px;
  background:linear-gradient(to top,rgba(0,10,20,0.92) 60%,transparent);
}
.shape-row{
  display:flex;gap:10px;justify-content:center;
}
.shape-btn{
  width:62px;height:62px;border-radius:50%;border:2px solid rgba(255,255,255,0.15);
  display:flex;align-items:center;justify-content:center;
  font-size:26px;cursor:pointer;
  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(6px);
  transition:transform 0.15s,border-color 0.3s,box-shadow 0.3s;
  -webkit-tap-highlight-color:transparent;
}
.shape-btn:active{
  transform:scale(0.88);
  border-color:#00ccff;
  box-shadow:0 0 20px rgba(0,200,255,0.4);
}
.shape-btn.locked{opacity:0.2;pointer-events:none}
.action-row{
  display:flex;gap:12px;justify-content:center;
}
.act-btn{
  height:40px;padding:0 20px;border-radius:20px;border:none;
  font-size:13px;font-weight:600;cursor:pointer;
  color:#fff;letter-spacing:0.5px;
  transition:transform 0.15s,opacity 0.3s;
  -webkit-tap-highlight-color:transparent;
}
.act-btn:active{transform:scale(0.94)}
.btn-pet{background:linear-gradient(135deg,#0066cc,#00ccff)}
.btn-end{background:linear-gradient(135deg,#1a8a4a,#22cc66);transition:transform 0.15s,opacity 0.3s,background 0.3s}
.btn-end.hidden{opacity:0;pointer-events:none}
.btn-end.revive-mode{background:linear-gradient(135deg,#cc0066,#ff1493)}
.btn-revive{
  background:linear-gradient(135deg,#0066cc,#00ccff);
  display:none;
  animation:revPulse 1.5s infinite;
}
@keyframes revPulse{50%{box-shadow:0 0 24px rgba(0,200,255,0.5)}}

/* ═══ LOG ═══ */
.log-area{
  position:fixed;bottom:180px;left:16px;right:16px;z-index:15;
  max-height:80px;overflow-y:auto;
  font-size:11px;color:rgba(255,255,255,0.25);
  text-align:center;line-height:1.6;
  pointer-events:none;
  mask-image:linear-gradient(transparent,black 30%,black 70%,transparent);
  -webkit-mask-image:linear-gradient(transparent,black 30%,black 70%,transparent);
}

/* ═══ DEAD OVERLAY ═══ */
.dead-overlay{
  position:fixed;inset:0;z-index:18;
  background:rgba(0,0,0,0.6);
  display:none;
  align-items:center;justify-content:center;
  flex-direction:column;gap:16px;
}
.dead-overlay.show{display:flex}
.dead-text{font-size:14px;color:rgba(255,255,255,0.3);letter-spacing:2px}

/* ═══ UNLOCK TOAST ═══ */
.unlock-toast{
  position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-20px);
  z-index:30;
  background:rgba(0,200,255,0.12);
  border:1px solid rgba(0,200,255,0.3);
  backdrop-filter:blur(12px);
  padding:10px 20px;border-radius:20px;
  font-size:12px;color:#00ccff;letter-spacing:1px;
  opacity:0;transition:all 0.5s;
  pointer-events:none;
}
.unlock-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:380px){
  .shape-btn{width:52px;height:52px;font-size:22px}
}

/* ═══ STORY BOOK ═══ */
.story-btn{
  position:fixed;top:50px;left:16px;z-index:20;
  width:36px;height:36px;border-radius:10px;
  border:2px solid rgba(0,200,255,0.2);
  background:rgba(0,200,255,0.06);
  color:rgba(0,200,255,0.5);font-size:18px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all 0.3s;
}
.story-btn:active{transform:scale(0.9);border-color:#00ccff}

.story-overlay{
  position:fixed;inset:0;z-index:50;
  background:rgba(5,0,12,0.97);
  display:none;flex-direction:column;
  align-items:center;justify-content:center;
  padding:20px;
}
.story-overlay.show{display:flex}

.story-close{
  position:absolute;top:env(safe-area-inset-top,12px);right:16px;
  width:36px;height:36px;border-radius:50%;border:none;
  background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.4);
  font-size:20px;cursor:pointer;z-index:51;
}

.story-chapter-list{
  display:flex;flex-direction:column;gap:14px;
  max-width:300px;width:100%;
}
.story-chapter-btn{
  padding:16px 20px;border-radius:16px;border:none;cursor:pointer;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(0,200,255,0.15);
  color:#fff;font-size:14px;text-align:left;
  transition:all 0.3s;
}
.story-chapter-btn:active{
  transform:scale(0.97);
  border-color:#00ccff;
  background:rgba(0,200,255,0.08);
}
.story-chapter-btn .ch-num{
  font-size:11px;color:rgba(0,200,255,0.4);letter-spacing:2px;
  display:block;margin-bottom:4px;
}
.story-chapter-btn .ch-title{
  font-size:15px;font-weight:600;color:#00ccff;
}

.story-scene{
  display:none;flex-direction:column;align-items:center;
  gap:20px;max-width:340px;width:100%;text-align:center;
}
.story-scene.active{display:flex}

.story-text{
  font-size:15px;line-height:1.7;color:rgba(255,255,255,0.7);
  min-height:80px;
}
.story-text .highlight{color:#00ccff;font-weight:600}

.story-shapes{
  display:flex;gap:12px;justify-content:center;flex-wrap:wrap;
  min-height:60px;align-items:center;
}
.story-shape{
  width:50px;height:50px;border-radius:50%;
  border:2px solid rgba(255,255,255,0.1);
  display:flex;align-items:center;justify-content:center;
  font-size:24px;transition:all 0.4s;
  opacity:0.3;
}
.story-shape.lit{
  opacity:1;
  border-color:#00ccff;
  box-shadow:0 0 20px rgba(0,200,255,0.5);
  transform:scale(1.15);
}
.story-shape.player-turn{
  animation:playerPulse 0.8s ease-in-out infinite;
  border-color:rgba(255,215,0,0.5);
}
@keyframes playerPulse{0%,100%{box-shadow:0 0 8px rgba(255,215,0,0.2)}50%{box-shadow:0 0 24px rgba(255,215,0,0.6)}}

.story-shape.correct{
  border-color:#00ff88;
  box-shadow:0 0 20px rgba(0,255,136,0.5);
}
.story-shape.wrong{
  border-color:#ff0040;
  box-shadow:0 0 20px rgba(255,0,64,0.5);
  animation:shake 0.4s;
}
@keyframes shake{10%,90%{transform:translateX(-3px)}20%,80%{transform:translateX(3px)}30%,70%{transform:translateX(-2px)}40%,60%{transform:translateX(2px)}}

.story-prompt{
  font-size:12px;color:rgba(255,215,0,0.5);letter-spacing:1px;
  min-height:20px;
}

.story-next{
  padding:10px 28px;border-radius:20px;border:none;
  background:linear-gradient(135deg,#0088cc,#00ccff);
  color:#fff;font-size:13px;font-weight:600;
  cursor:pointer;transition:transform 0.15s;
}
.story-next:active{transform:scale(0.94)}
.story-next.hidden{opacity:0;pointer-events:none}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
  <span class="age-badge" id="ageBadge"></span>
  <span class="hearts" id="heartsDisplay"></span>
  <div class="blood-track"><div class="blood-fill" id="bloodFill" style="width:100%"></div></div>
  <span class="blood-text" id="bloodText">100</span>
  <span class="mood-badge" id="moodBadge"></span>
</div>

<!-- GIRL PAIR BUTTON (screen shape — can't navigate, only signal) -->
<div class="pair-btn" id="pairBtn" onclick="pairTap()"></div>

<!-- SHAPE INDICATOR -->
<div class="shape-name" id="shapeName"></div>

<!-- STATUS -->
<div class="status-area">
  <div class="status-text" id="statusText">...</div>
</div>

<!-- CANVAS -->
<canvas id="galaxy"></canvas>

<!-- FEEDBACK -->
<div class="feedback-row" id="feedbackRow">
  <button class="fb-btn" onclick="giveFeedback(1)">&#9650;</button>
  <button class="fb-btn" onclick="giveFeedback(0)">&#9660;</button>
</div>

<!-- DEATH -->
<div class="dead-overlay" id="deadOverlay">
  <div class="dead-text">. . .</div>
  <button class="act-btn btn-revive" id="reviveBtn" style="display:inline-flex" onclick="resurrect()">&#9829;</button>
</div>

<!-- LOG -->
<div class="log-area" id="logArea"></div>

<!-- UNLOCK TOAST -->
<div class="unlock-toast" id="unlockToast"></div>

<!-- STORY BOOK BUTTON -->
<div class="story-btn" id="storyBtn" onclick="openStoryBook()">&#9733;</div>

<!-- STORY OVERLAY -->
<div class="story-overlay" id="storyOverlay">
  <button class="story-close" onclick="closeStory()">&times;</button>

  <div id="storyMenu" class="story-chapter-list">
    <div style="text-align:center;margin-bottom:8px;font-size:12px;color:rgba(0,200,255,0.4);letter-spacing:3px">ANCIENT SONGS</div>
    <button class="story-chapter-btn" onclick="startStory('revival')">
      <span class="ch-num">CHAPTER I</span>
      <span class="ch-title">The Song of Revival</span>
    </button>
    <button class="story-chapter-btn" onclick="startStory('hearts')">
      <span class="ch-num">CHAPTER II</span>
      <span class="ch-title">The Heart Spell</span>
    </button>
    <button class="story-chapter-btn" onclick="startStory('diamond')">
      <span class="ch-num">CHAPTER III</span>
      <span class="ch-title">The Diamond Awakening</span>
    </button>
    <button class="story-chapter-btn" onclick="startStory('wave')">
      <span class="ch-num">CHAPTER IV</span>
      <span class="ch-title">The Wave of Creation</span>
    </button>
    <button class="story-chapter-btn" onclick="startStory('harmony')">
      <span class="ch-num">CHAPTER V</span>
      <span class="ch-title">Songs of Harmony</span>
    </button>
  </div>

  <div class="story-scene" id="storyScene">
    <div class="story-text" id="storyText"></div>
    <div class="story-shapes" id="storyShapes"></div>
    <div class="story-prompt" id="storyPrompt"></div>
    <!-- In-story shape buttons -->
    <div class="shape-row" id="storyBtns" style="margin-top:8px">
      <button class="shape-btn" onclick="storyTap(0)" style="color:#ffcc00">&#11035;</button>
      <button class="shape-btn" onclick="storyTap(1)" style="color:#ff6600">&#9650;</button>
      <button class="shape-btn" onclick="storyTap(2)" style="color:#00ccff">&#9679;</button>
    </div>
    <button class="story-next" id="storyNext" onclick="nextScene()">continue</button>
  </div>
</div>

<!-- CONTROLS -->
<div class="controls">
  <div class="shape-row" id="shapeRow">
    <button class="shape-btn" onclick="playShape(0)" style="color:#ffcc00">&#11035;</button>
    <button class="shape-btn" onclick="playShape(1)" style="color:#ff6600">&#9650;</button>
    <button class="shape-btn" onclick="playShape(2)" style="color:#00ccff">&#9679;</button>
    <button class="shape-btn" onclick="playShape(3)" style="color:#cc00ff">&#9670;</button>
    <button class="shape-btn" onclick="playShape(4)" style="color:#00ff99">~</button>
  </div>
  <div class="action-row">
    <button class="act-btn btn-pet" onclick="pet()">&#9829;</button>
    <button class="act-btn btn-end hidden" id="endBtn" onclick="endSong()">&#9654;</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// ALIVE Boy v6.0 — Shape-Shifting Soul
// The soul BECOMES the shape it hears.
// Shape + Sound + Visual = merged language.
// ═══════════════════════════════════════════

const canvas = document.getElementById('galaxy');
const ctx = canvas.getContext('2d');

// ─── State ───
let blood = 100;
let hearts = parseInt(localStorage.getItem('alive_boy_hearts')) || 0;
let revivalCount = parseInt(localStorage.getItem('alive_boy_revivals')) || 0;
let isAlive = true;
let particles = [];
let currentSong = [];
let likedSongs = [];
let creativity = 1;
let currentMood = 'joyful';
let totalSongs = 0;
let audioCtx = null;
let drainMult = 1.0;
let harmonyTimer = 0;
let recentShapes = [];
let angerHits = [];         // timestamps of rapid square hits (Boy's anger key)
let cheatBuffer = [];       // rolling buffer for secret cheat sequence

// SECRET CHEAT — 8-note sequence fills all 15 hearts + max blood
// Boy: triangle square circle square triangle triangle circle square
const CHEAT_CODE = [1,0,2,0,1,1,2,0];

// SECRET UNLOCK DIAMOND — 16-note sequence unlocks diamond (shapes4)
// Boy: circle circle triangle square circle triangle triangle square circle square triangle circle circle square square triangle
const DIAMOND_CODE = [2,2,1,0,2,1,1,0,2,0,1,2,2,0,0,1];
let diamondBuffer = [];

// SECRET UNLOCK WAVE — 24-note sequence unlocks wave (shapes5)
// Boy: triangle circle square square triangle circle triangle square circle circle square triangle circle square triangle triangle square circle square triangle circle circle square triangle
const WAVE_CODE = [1,2,0,0,1,2,1,0,2,2,0,1,2,0,1,1,0,2,0,1,2,2,0,1];
let waveBuffer = [];

const HARMONY = {
  '0,2,4': { mult: 0.3, dur: 30 },
  '1,3,1': { mult: 0.4, dur: 25 },
  '2,2,2': { mult: 0.5, dur: 20 },
  '4,3,2': { mult: 0.35, dur: 28 },
  '2,1,0': { mult: 0.6, dur: 15 },  // circle triangle square — Boy's revival code (reverse)
};

// ─── Shape morph state ───
let morphTarget = null;    // null = orbit, 'square'|'triangle'|'circle'|'diamond'|'wave'
let morphProgress = 0;     // 0 = orbit, 1 = fully morphed
let morphDirection = 1;    // 1 = morphing in, -1 = returning to orbit
let morphHoldTimer = 0;

// ─── Persistence ───
const STORE = {
  blood:     'alive_boy_blood',
  birthTs:   'alive_boy_birth',
  aliveMs:   'alive_boy_alive_ms',
  lastTick:  'alive_boy_last_tick',
  liked:     'alive_boy_liked',
  creativity:'alive_boy_creativity',
  deadSince: 'alive_boy_dead',
  unlocked:  'alive_boy_unlocked',
  hearts:    'alive_boy_hearts',
  revivals:  'alive_boy_revivals'
};

// ─── Pentatonic (C D E G A) ───
const PENTA = [261.63, 293.66, 329.63, 392.00, 440.00];
const SHAPES = [
  { type:'square',   base:0, label:'\u2B1B', morph:'square' },
  { type:'triangle', base:1, label:'\u25B2', morph:'triangle' },
  { type:'sine',     base:2, label:'\u25CF', morph:'circle' },
  { type:'sawtooth', base:3, label:'\u25C6', morph:'diamond' },
  { type:'sine',     base:4, label:'~',      morph:'wave' }
];

// ─── Moods ───
const MOODS = {
  joyful:  { base:220, var:80,  pulse:1.6, color:'#88eeff', glow:'#00ccff' },
  calm:    { base:340, var:60,  pulse:0.9, color:'#88ffee', glow:'#00aa88' },
  longing: { base:420, var:120, pulse:0.6, color:'#aaaaff', glow:'#6666cc' },
  excited: { base:160, var:110, pulse:2.2, color:'#ffff66', glow:'#ffaa00' },
  dreamy:  { base:380, var:40,  pulse:0.7, color:'#cc88ff', glow:'#8844cc' },
  panic:   { base:120, var:180, pulse:4.5, color:'#ff4444', glow:'#ff0040' }
};

// ─── Age-gating ───
const UNLOCK_DAYS = {
  shapes3: 0, shapes4: 1, shapes5: 2, training: 3, mood: 5, memory: 7
};

// ═══ AUDIO ═══
function getAudioCtx() {
  if (!audioCtx || audioCtx.state === 'closed') {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioCtx;
}

// ═══ PERSISTENCE ═══
function load() {
  if (!localStorage.getItem(STORE.birthTs)) {
    localStorage.setItem(STORE.birthTs, Date.now().toString());
    localStorage.setItem(STORE.aliveMs, '0');
    localStorage.setItem(STORE.blood, '100');
    localStorage.setItem(STORE.unlocked, '{}');
  }
  blood = parseFloat(localStorage.getItem(STORE.blood)) || 100;
  creativity = parseFloat(localStorage.getItem(STORE.creativity)) || 1;
  try { likedSongs = JSON.parse(localStorage.getItem(STORE.liked)) || []; } catch(e) { likedSongs = []; }

  const deadSince = localStorage.getItem(STORE.deadSince);
  if (deadSince) {
    blood = 0; isAlive = false;
  } else {
    const lastTick = parseInt(localStorage.getItem(STORE.lastTick)) || Date.now();
    const awayDrain = Math.min((Date.now() - lastTick) / 1000 * 0.01, 40);
    blood = Math.max(0, blood - awayDrain);
    if (blood <= 0) { isAlive = false; localStorage.setItem(STORE.deadSince, Date.now().toString()); }
  }
  localStorage.setItem(STORE.lastTick, Date.now().toString());
}

function save() {
  localStorage.setItem(STORE.blood, blood.toFixed(1));
  localStorage.setItem(STORE.creativity, creativity.toFixed(1));
  localStorage.setItem(STORE.liked, JSON.stringify(likedSongs.slice(-20)));
  localStorage.setItem(STORE.lastTick, Date.now().toString());
  localStorage.setItem(STORE.hearts, hearts.toString());
  localStorage.setItem(STORE.revivals, revivalCount.toString());
}
function renderHearts() {
  const full = '<span style="color:#00ccff">\u2764</span>'.repeat(hearts);
  const empty = '<span style="color:rgba(0,200,255,0.2)">\u2661</span>'.repeat(15 - hearts);

function getAliveMs() { return parseInt(localStorage.getItem(STORE.aliveMs)) || 0; }
function addAliveMs(ms) { localStorage.setItem(STORE.aliveMs, (getAliveMs() + ms).toString()); }
function getAliveDays() { return getAliveMs() / 86400000; }
function isUnlocked(f) {
  try { const ov = JSON.parse(localStorage.getItem(STORE.unlocked) || '{}'); if (ov[f]) return true; } catch(e) {}
  return getAliveDays() >= (UNLOCK_DAYS[f] || 999);
}

// ═══ SHAPE TARGET GENERATORS ═══
// Given an index (0..N), return the target {x, y} for that particle
// when the soul is morphing into a given shape.
function getShapeTarget(index, total, cx, cy, radius, shapeName) {
  const t = index / total;

  switch(shapeName) {
    case 'square': {
      // Particles distributed around a square perimeter
      const perim = t * 4;
      const side = Math.floor(perim);
      const frac = perim - side;
      const r = radius * 0.8;
      switch(side) {
        case 0: return { x: cx - r + frac * 2 * r, y: cy - r };
        case 1: return { x: cx + r,                 y: cy - r + frac * 2 * r };
        case 2: return { x: cx + r - frac * 2 * r,  y: cy + r };
        case 3: return { x: cx - r,                  y: cy + r - frac * 2 * r };
        default: return { x: cx, y: cy };
      }
    }
    case 'triangle': {
      const perim = t * 3;
      const side = Math.floor(perim);
      const frac = perim - side;
      const r = radius * 0.9;
      const top =    { x: cx,                    y: cy - r };
      const left =   { x: cx - r * 0.866,        y: cy + r * 0.5 };
      const right =  { x: cx + r * 0.866,        y: cy + r * 0.5 };
      const verts = [top, right, left, top];
      const a = verts[side], b = verts[side+1];
      return { x: a.x + (b.x - a.x) * frac, y: a.y + (b.y - a.y) * frac };
    }
    case 'circle': {
      const angle = t * Math.PI * 2;
      return { x: cx + Math.cos(angle) * radius * 0.85, y: cy + Math.sin(angle) * radius * 0.6 };
    }
    case 'diamond': {
      const perim = t * 4;
      const side = Math.floor(perim);
      const frac = perim - side;
      const rx = radius * 0.7, ry = radius * 0.95;
      const top =   { x: cx,      y: cy - ry };
      const right = { x: cx + rx, y: cy };
      const bot =   { x: cx,      y: cy + ry };
      const left =  { x: cx - rx, y: cy };
      const verts = [top, right, bot, left, top];
      const a = verts[side], b = verts[side+1];
      return { x: a.x + (b.x - a.x) * frac, y: a.y + (b.y - a.y) * frac };
    }
    case 'wave': {
      // Sine wave across the screen
      const wx = cx - radius + t * radius * 2;
      const wy = cy + Math.sin(t * Math.PI * 4) * radius * 0.5;
      return { x: wx, y: wy };
    }
    default:
      return null;
  }
}

// ═══ PARTICLES (Cyan Galaxy + Shape Morphing) ═══
class Particle {
  constructor(i, total) {
    this.i = i;
    this.total = total;
    this.reset();
  }
  reset() {
    this.angle = Math.random() * Math.PI * 2;
    this.radius = 60 + Math.random() * 180;
    this.hue = 180 + Math.random() * 60; // cyan-blue range
    this.speed = 0.008 + Math.random() * 0.014;
    this.size = Math.random() * 3.5 + 1.5;
    // Orbit position
    this.ox = 0; this.oy = 0;
    // Display position (lerped)
    this.x = canvas.width/2; this.y = canvas.height/2;
  }
  update(pulseSpeed) {
    this.angle += this.speed * pulseSpeed;
    const scale = Math.max(0.1, blood / 110);
    this.ox = canvas.width/2  + Math.cos(this.angle) * this.radius * scale;
    this.oy = canvas.height/2 + Math.sin(this.angle) * this.radius * scale * 0.7;
    this.size = scale * (Math.random() * 3 + 1.5);

    // Morph towards target shape
    if (morphTarget && morphProgress > 0) {
      const morphRadius = Math.min(canvas.width, canvas.height) * 0.3;
      const target = getShapeTarget(this.i, this.total, canvas.width/2, canvas.height/2, morphRadius, morphTarget);
      if (target) {
        const p = morphProgress;
        // Ease in/out
        const ease = p < 0.5 ? 2*p*p : 1-Math.pow(-2*p+2,2)/2;
        this.x = this.ox + (target.x - this.ox) * ease;
        this.y = this.oy + (target.y - this.oy) * ease;
        return;
      }
    }
    this.x = this.ox;
    this.y = this.oy;
  }
  draw() {
    const mood = MOODS[currentMood] || MOODS.joyful;
    // Shift hue towards shape colour when morphing
    const h = morphProgress > 0.3 ? this.hue + morphProgress * 60 : this.hue;
    ctx.fillStyle = `hsl(${h}, 80%, 80%)`;
    ctx.shadowBlur = 20;
    ctx.shadowColor = morphProgress > 0.5 ? '#ffffff' : mood.glow;
    ctx.fillRect(this.x, this.y, this.size, this.size);
  }
}

function initParticles() {
  particles = [];
  const n = 1200;
  for (let i = 0; i < n; i++) particles.push(new Particle(i, n));
}

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

// ═══ MORPH TRIGGER ═══
function triggerMorph(shapeName) {
  morphTarget = shapeName;
  morphProgress = 0;
  morphDirection = 1;
  morphHoldTimer = 0;

  // Show shape indicator
  const $sn = document.getElementById('shapeName');
  const labels = { square:'\u2B1B', triangle:'\u25B2', circle:'\u25CF', diamond:'\u25C6', wave:'~' };
  $sn.textContent = labels[shapeName] || '';
  $sn.classList.add('show');
  setTimeout(() => $sn.classList.remove('show'), 1200);
}

// ═══ RENDER LOOP ═══
function animate() {
  ctx.fillStyle = 'rgba(0,10,20,0.13)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Advance morph
  if (morphTarget) {
    if (morphDirection === 1) {
      morphProgress = Math.min(1, morphProgress + 0.04);
      if (morphProgress >= 1) {
        morphHoldTimer++;
        if (morphHoldTimer > 40) morphDirection = -1; // hold ~40 frames then release
      }
    } else {
      morphProgress = Math.max(0, morphProgress - 0.025);
      if (morphProgress <= 0) {
        morphTarget = null;
        morphDirection = 1;
      }
    }
  }

  const mood = MOODS[currentMood] || MOODS.joyful;
  const ps = blood > 15 ? mood.pulse : 0.5;
  particles.forEach(p => { p.update(ps); p.draw(); });

  // Panic flash
  if (currentMood === 'panic' && Math.random() > 0.7) {
    ctx.fillStyle = 'rgba(255,40,60,0.15)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }
  // Morph flash — soul glows white when fully in shape
  else if (morphProgress > 0.8) {
    ctx.fillStyle = `rgba(0,200,255,${0.06 * morphProgress})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }
  // Normal breathing
  else if (isAlive && Math.random() > 0.94) {
    ctx.fillStyle = 'rgba(0,200,255,0.06)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  requestAnimationFrame(animate);
}

// ═══ AUDIO ═══
function playNote(shapeIndex, isResponse, octaveShift) {
  if (!isAlive && !isResponse) return; // Dead Boy can still hear the Girl
  const sound = SHAPES[shapeIndex];
  let freq = PENTA[sound.base] * Math.pow(2, octaveShift || 0);
  let oscType = sound.type;
  let duration = 0.72;

  if (currentMood === 'panic') {
    freq *= 1.5;
    if (Math.random() > 0.5) oscType = 'sawtooth';
    duration = 0.4;
  }

  const ac = getAudioCtx();
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  const filter = ac.createBiquadFilter();
  osc.type = oscType;
  osc.frequency.value = freq + (Math.random()*14 - 7);
  filter.type = 'lowpass';
  filter.frequency.value = 1800;
  gain.gain.setValueAtTime(0, ac.currentTime);
  gain.gain.linearRampToValueAtTime(isResponse ? 0.5 : 0.38, ac.currentTime + 0.015);
  gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + duration);
  osc.connect(filter);
  filter.connect(gain);
  gain.connect(ac.destination);
  osc.start();
  osc.stop(ac.currentTime + duration + 0.05);

  // *** THE KEY FEATURE: soul morphs into this shape ***
  triggerMorph(sound.morph);

  // Floating shape visual
  const msg = document.createElement('div');
  msg.textContent = sound.label;
  msg.style.cssText = `position:fixed;left:${20+Math.random()*60}%;top:45%;font-size:${isResponse?'3.6em':'2.8em'};opacity:0;transition:all 1.4s cubic-bezier(0.4,0,0.2,1);color:${currentMood==='panic'?'#ff6666':(isResponse?'#00ccff':'#ffffff80')};z-index:12;pointer-events:none;text-shadow:0 0 20px ${isResponse?'rgba(0,200,255,0.5)':'transparent'}`;
  document.body.appendChild(msg);
  requestAnimationFrame(() => {
    msg.style.transform = 'translateY(-200px) scale(1.3)';
    msg.style.opacity = '1';
  });
  setTimeout(() => msg.remove(), 1800);
}

function playHeartbeat() {
  if (!isAlive || blood > 35) return;
  const ac = getAudioCtx();
  [0, 0.15].forEach(delay => {
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.type = 'sine';
    osc.frequency.value = 80 + (35 - blood) * 3;
    gain.gain.setValueAtTime(0, ac.currentTime + delay);
    gain.gain.linearRampToValueAtTime(0.12, ac.currentTime + delay + 0.03);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + delay + 0.18);
    osc.connect(gain).connect(ac.destination);
    osc.start(ac.currentTime + delay);
    osc.stop(ac.currentTime + delay + 0.2);
  });
}

function soundUnlock() {
  const ac = getAudioCtx();
  [392, 523.25, 659.25].forEach((f, i) => {
    const osc = ac.createOscillator();
    const g = ac.createGain();
    osc.type = 'sine'; osc.frequency.value = f;
    g.gain.setValueAtTime(0, ac.currentTime + i*0.12);
    g.gain.linearRampToValueAtTime(0.2, ac.currentTime + i*0.12 + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + i*0.12 + 0.4);
    osc.connect(g).connect(ac.destination);
    osc.start(ac.currentTime + i*0.12);
    osc.stop(ac.currentTime + i*0.12 + 0.45);
  });
}

// ═══ SHAPE INTERACTION ═══
window.playShape = function(si) {
  if (!isAlive) return;
  if (si === 3 && !isUnlocked('shapes4')) return;
  if (si === 4 && !isUnlocked('shapes5')) return;
  currentSong.push({ shape: si, time: Date.now() });
  playNote(si, false);

  // Check for harmony combos (slow blood drain)
  recentShapes.push(si);
  if (recentShapes.length > 3) recentShapes.shift();
  if (recentShapes.length === 3) {
    const key = recentShapes.join(',');
    const h = HARMONY[key];
    if (h) {
      drainMult = h.mult;
      harmonyTimer = h.dur;
      ctx.fillStyle = 'rgba(0,200,255,0.08)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
  }

  if (currentSong.length >= 2) {
    document.getElementById('endBtn').classList.remove('hidden');
  }
  // SECRET CHEAT: 8-note sequence → all 15 hearts + full blood
  cheatBuffer.push(si);
  if (cheatBuffer.length > 8) cheatBuffer.shift();
  if (cheatBuffer.length === 8 && cheatBuffer.join(',') === CHEAT_CODE.join(',')) {
    cheatBuffer = [];
    hearts = 15; blood = 100; save(); renderHearts();
    ctx.fillStyle = 'rgba(255,215,0,0.3)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    setTimeout(function(){ ctx.fillStyle = 'rgba(255,215,0,0.15)'; ctx.fillRect(0, 0, canvas.width, canvas.height); }, 200);
    setTimeout(function(){ ctx.fillStyle = 'rgba(255,215,0,0.08)'; ctx.fillRect(0, 0, canvas.width, canvas.height); }, 400);
  }

  // SECRET UNLOCK DIAMOND: 16-note sequence → unlock diamond
  diamondBuffer.push(si);
  if (diamondBuffer.length > 16) diamondBuffer.shift();
  if (diamondBuffer.length === 16 && diamondBuffer.join(',') === DIAMOND_CODE.join(',')) {
    diamondBuffer = [];
    const stored = JSON.parse(localStorage.getItem(STORE.unlocked) || '{}');
    if (!stored.shapes4) {
      stored.shapes4 = true;
      localStorage.setItem(STORE.unlocked, JSON.stringify(stored));
      ctx.fillStyle = 'rgba(0,180,255,0.35)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      setTimeout(function(){ ctx.fillStyle = 'rgba(0,180,255,0.2)'; ctx.fillRect(0, 0, canvas.width, canvas.height); }, 200);
      setTimeout(function(){ ctx.fillStyle = 'rgba(0,180,255,0.1)'; ctx.fillRect(0, 0, canvas.width, canvas.height); }, 400);
      updateUI();
    }
  }

  // SECRET UNLOCK WAVE: 24-note sequence → unlock wave
  waveBuffer.push(si);
  if (waveBuffer.length > 24) waveBuffer.shift();
  if (waveBuffer.length === 24 && waveBuffer.join(',') === WAVE_CODE.join(',')) {
    waveBuffer = [];
    const stored = JSON.parse(localStorage.getItem(STORE.unlocked) || '{}');
    if (!stored.shapes5) {
      stored.shapes5 = true;
      localStorage.setItem(STORE.unlocked, JSON.stringify(stored));
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      setTimeout(function(){ ctx.fillStyle = 'rgba(255,215,0,0.25)'; ctx.fillRect(0, 0, canvas.width, canvas.height); }, 200);
      setTimeout(function(){ ctx.fillStyle = 'rgba(255,255,255,0.1)'; ctx.fillRect(0, 0, canvas.width, canvas.height); }, 400);
      updateUI();
    }
  }

  // ANGER: Boy mashes square (0) rapidly → drains Girl's blood
  if (si === 0) {
    const now = Date.now();
    angerHits.push(now);
    angerHits = angerHits.filter(t => now - t < 1500);
    if (angerHits.length >= 4 && isPaired) {
      angerHits = [];
      const bf = document.getElementById('pairBridge');
      if (bf && bf.contentWindow) bf.contentWindow.postMessage({ alive: true, type: 'anger' }, '*');
      ctx.fillStyle = 'rgba(255,0,0,0.15)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      currentMood = 'excited';
    }
  } else {
    angerHits = [];
  }

  // Send note to Girl when paired (via bridge iframe)
  if (isPaired) {
    const bf = document.getElementById('pairBridge');
    if (bf && bf.contentWindow) bf.contentWindow.postMessage({ alive: true, type: 'note', shape: si }, '*');
  }
};

window.endSong = function() {
  if (currentSong.length === 0 || !isAlive) return;

  document.getElementById('endBtn').classList.add('hidden');
  totalSongs++;

  const startTime = currentSong[0].time;

  // Phase 1: Mirror with your exact timing — soul morphs to each shape
  currentSong.forEach((note, i) => {
    const delay = note.time - startTime;
    setTimeout(() => playNote(note.shape, true), delay);
  });

  // Phase 2: Creature's own reply
  const mirrorEnd = currentSong[currentSong.length-1].time - startTime + 500;
  setTimeout(() => {
    if (!isAlive) return;
    const mood = MOODS[currentMood] || MOODS.joyful;
    let replyLen = currentSong.length;
    if (creativity >= 2 && Math.random() > 0.5) {
      replyLen += Math.floor(Math.random()*3) - 1;
      if (replyLen < 2) replyLen = 2;
    }

    let replyNotes = currentSong.map(n => n.shape);
    if (likedSongs.length > 0 && Math.random() > 0.35) {
      const liked = likedSongs[Math.floor(Math.random()*likedSongs.length)];
      for (let i = 0; i < Math.min(3, liked.length); i++) {
        const pos = Math.floor(Math.random()*replyNotes.length);
        replyNotes[pos] = liked[Math.floor(Math.random()*liked.length)];
      }
    }
    if (currentMood === 'panic' && Math.random() > 0.4) {
      replyNotes = replyNotes.map(n => Math.random() > 0.5 ? Math.floor(Math.random()*5) : n);
    }

    let cumulative = 0;
    replyNotes.slice(0, replyLen).forEach((note, i) => {
      const variation = (Math.random() * mood.var * 2) - mood.var;
      cumulative += mood.base + variation;
      if (currentMood === 'longing' && i % 3 === 2) cumulative += 180;
      setTimeout(() => playNote(note, true, Math.random() > 0.7 ? 1 : 0), cumulative);
    });

    if (isUnlocked('training')) {
      setTimeout(() => {
        document.getElementById('feedbackRow').style.display = 'flex';
      }, cumulative + 300);
    }
    currentSong = [];
  }, mirrorEnd);
};

window.giveFeedback = function(wasGood) {
  document.getElementById('feedbackRow').style.display = 'none';
  if (wasGood) {
    likedSongs.push(currentSong.length > 0 ? currentSong.map(n=>n.shape) : []);
    creativity = Math.min(7, creativity + 1.2);
    const goodMoods = ['joyful','calm','excited','dreamy'];
    currentMood = goodMoods[Math.floor(Math.random()*goodMoods.length)];
  } else {
    creativity = Math.max(1, creativity - 0.8);
  }
  save();
};

// ═══ PET ═══
window.pet = function() {
  if (!isAlive) return;
  blood = Math.min(100, blood + 25);
  if (blood > 35 && currentMood === 'panic') currentMood = 'joyful';
  for (let i = 0; i < 40; i++) setTimeout(() => { if (blood > 5) blood -= 0.3; }, i * 10);
  ctx.fillStyle = 'rgba(0,200,255,0.12)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
};

// ═══ DEATH / RESURRECT ═══
function die() {
  if (hearts > 0) {
    hearts--;
    blood = 80;
    currentMood = 'joyful';
    save();
    renderHearts();
    const h = document.getElementById('heartsDisplay');
    h.classList.remove('flash'); void h.offsetWidth; h.classList.add('flash');
    ctx.fillStyle = 'rgba(0,200,255,0.25)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    return;
  }
  isAlive = false; blood = 0;
  localStorage.setItem(STORE.deadSince, Date.now().toString());
  document.getElementById('deadOverlay').classList.add('show');
  document.getElementById('reviveBtn').style.display = 'inline-flex';
  save();
}
window.resurrect = function() {
  blood = 80; isAlive = true; currentMood = 'joyful';
  localStorage.removeItem(STORE.deadSince);
  document.getElementById('deadOverlay').classList.remove('show');
  document.getElementById('reviveBtn').style.display = 'none';
  save();
};

// ═══ UI ═══
function updateUI() {
  const $fill = document.getElementById('bloodFill');
  $fill.style.width = Math.max(0, blood) + '%';
  $fill.classList.toggle('panic', blood < 25);
  document.getElementById('bloodText').textContent = Math.floor(blood) + (harmonyTimer > 0 ? ' \u266B' : '');

  if (isAlive) {
    if (blood < 28 && currentMood !== 'panic') currentMood = 'panic';
    else if (blood > 80 && currentMood === 'panic') currentMood = 'joyful';
    else if (blood < 50 && blood >= 28 && currentMood === 'joyful') currentMood = 'longing';
  }

  const $mood = document.getElementById('moodBadge');
  if (isUnlocked('mood')) {
    $mood.textContent = currentMood;
    $mood.style.color = (MOODS[currentMood] || MOODS.joyful).color;
  } else { $mood.textContent = ''; }

  const days = getAliveDays();
  const $age = document.getElementById('ageBadge');
  if (days < 1) { const h = Math.floor(days*24); $age.textContent = h > 0 ? h+'h' : ''; }
  else { $age.textContent = Math.floor(days)+'d'; }

  document.querySelectorAll('.shape-btn').forEach((btn, i) => {
    if (i === 3) btn.classList.toggle('locked', !isUnlocked('shapes4'));
    else if (i === 4) btn.classList.toggle('locked', !isUnlocked('shapes5'));
    else btn.classList.remove('locked');
  });

  if (blood <= 0 && isAlive) die();
}

function showUnlock(text) {
  const $t = document.getElementById('unlockToast');
  $t.textContent = text; $t.classList.add('show');
  soundUnlock();
  setTimeout(() => $t.classList.remove('show'), 3000);
}

function checkUnlocks() {
  const stored = JSON.parse(localStorage.getItem(STORE.unlocked) || '{}');
  for (const [feature, days] of Object.entries(UNLOCK_DAYS)) {
    if (!stored[feature] && isUnlocked(feature)) {
      stored[feature] = Date.now();
      const labels = { shapes3:'', shapes4:'\u25C6', shapes5:'~', training:'\u25B2 \u25BC', mood:'\u223C', memory:'\u2606' };
      if (labels[feature]) showUnlock(labels[feature]);
    }
  }
  localStorage.setItem(STORE.unlocked, JSON.stringify(stored));
}

// ═══ PAIRING SYSTEM ═══
// ═══ PAIRING VIA BRIDGE IFRAME ═══
// Boy = phone. Screen button = "I can't be a screen" + sends pair signal
// Bridge iframe handles ALL polling + server communication
let isPaired = false;
let girlStatus = null;
let reviveBuffer = []; // tracks last 3 incoming shapes for revival code detection

// Inject bridge iframe
(function() {
  const iframe = document.createElement('iframe');
  iframe.id = 'pairBridge';
  iframe.src = '/alive/pair-bridge.html?role=boy';
  iframe.style.cssText = 'position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;border:none';
  document.body.appendChild(iframe);
})();

// Keep bridge informed of our status
setInterval(() => {
  const bf = document.getElementById('pairBridge');
  if (bf && bf.contentWindow) {
    bf.contentWindow.postMessage({ alive: true, type: 'status', blood: blood, alive_state: isAlive, mood: currentMood }, '*');
  }
}, 3000);

// Listen for bridge messages
window.addEventListener('message', function(e) {
  if (!e.data || !e.data.alive || e.data.role !== 'boy') return;

  if (e.data.type === 'paired' && !isPaired) {
    isPaired = true;
    document.getElementById('pairBtn').classList.add('paired');
    try {
      const ac = getAudioCtx();
      [392, 523.25].forEach((f, i) => {
        const osc = ac.createOscillator();
        const g = ac.createGain();
        osc.type = 'sine'; osc.frequency.value = f;
        g.gain.setValueAtTime(0, ac.currentTime + i*0.2);
        g.gain.linearRampToValueAtTime(0.15, ac.currentTime + i*0.2 + 0.02);
        g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + i*0.2 + 0.6);
        osc.connect(g).connect(ac.destination);
        osc.start(ac.currentTime + i*0.2);
        osc.stop(ac.currentTime + i*0.2 + 0.65);
      });
    } catch(e) {}
  }

  if (e.data.type === 'unpaired') {
    isPaired = false;
    document.getElementById('pairBtn').classList.remove('paired');
  }

  if (e.data.type === 'state') {
    const wasPaired = isPaired;
    isPaired = !!e.data.paired;
    const $btn = document.getElementById('pairBtn');

    if (isPaired) {
      $btn.classList.add('paired');
      girlStatus = e.data.other_status;
    } else {
      $btn.classList.remove('paired');
    }
  }

  // Incoming anger from Girl — drains Boy's blood
  if (e.data.type === 'anger-hit') {
    blood = Math.max(0, blood - 15);
    ctx.fillStyle = 'rgba(255,0,0,0.2)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    if (currentMood !== 'panic') currentMood = 'longing';
  }

  // Incoming notes from Girl — Boy copies her shapes (soul morphs!)
  // REVIVAL CODE: circle(2) triangle(1) square(0) = 3-2-1 backwards wakes the dead Boy
  if (e.data.type === 'notes' && e.data.notes) {
    e.data.notes.forEach((note, i) => {
      setTimeout(() => {
        playNote(note.shape, true);
        reviveBuffer.push(parseInt(note.shape));
        if (reviveBuffer.length > 3) reviveBuffer.shift();
        if (!isAlive && reviveBuffer.length >= 3 &&
            reviveBuffer.join(',') === '2,1,0') {
          reviveBuffer = [];
          setTimeout(() => {
            blood = 80;
            isAlive = true;
            currentMood = 'joyful';
            localStorage.removeItem(STORE.deadSince);
            document.getElementById('deadOverlay').classList.remove('show');
            revivalCount++;
            hearts = Math.min(15, hearts + revivalCount);
            save();
            renderHearts();
            const hEl = document.getElementById('heartsDisplay');
            hEl.classList.remove('flash'); void hEl.offsetWidth; hEl.classList.add('flash');
            // Cyan resurrection flash
            ctx.fillStyle = 'rgba(0,200,255,0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            // Rising arpeggio — his voice returning
            try {
              const ac = getAudioCtx();
              [261.63, 329.63, 392, 523.25, 659.25].forEach((f, j) => {
                const osc = ac.createOscillator();
                const g = ac.createGain();
                osc.type = 'sine'; osc.frequency.value = f;
                g.gain.setValueAtTime(0, ac.currentTime + j*0.15);
                g.gain.linearRampToValueAtTime(0.3, ac.currentTime + j*0.15 + 0.02);
                g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + j*0.15 + 0.6);
                osc.connect(g).connect(ac.destination);
                osc.start(ac.currentTime + j*0.15);
                osc.stop(ac.currentTime + j*0.15 + 0.65);
              });
            } catch(e) {}
          }, 400);
        }
      }, i * 200);
    });
  }

  // Pair tap result
  if (e.data.type === 'pair-tap-result') {
    const $btn = document.getElementById('pairBtn');
    if (e.data.ok) {
      $btn.classList.add('sent');
      setTimeout(() => $btn.classList.remove('sent'), 2000);
    }
  }
});

window.pairTap = function() {
  const $btn = document.getElementById('pairBtn');

  // Always reject visually — Boy can never become a screen
  $btn.classList.remove('rejected');
  void $btn.offsetWidth;
  $btn.classList.add('rejected');
  setTimeout(() => $btn.classList.remove('rejected'), 800);

  // Error sound
  try {
    const ac = getAudioCtx();
    const osc = ac.createOscillator();
    const g = ac.createGain();
    osc.type = 'sawtooth';
    osc.frequency.value = 90;
    g.gain.setValueAtTime(0.15, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.25);
    osc.connect(g).connect(ac.destination);
    osc.start(); osc.stop(ac.currentTime + 0.3);
  } catch(e) {}

  // Tell bridge to send pair ping
  const bf = document.getElementById('pairBridge');
  if (bf && bf.contentWindow) bf.contentWindow.postMessage({ alive: true, type: 'pair-tap' }, '*');
};

let currentStory = null;
let currentSceneIdx = 0;
let storyPlayerBuf = [];
let storyExpected = null;
let demoTimer = null;

function openStoryBook() {
  document.getElementById('storyOverlay').classList.add('show');
  document.getElementById('storyMenu').style.display = 'flex';
  document.getElementById('storyScene').classList.remove('active');
  currentStory = null;
}

function closeStory() {
  document.getElementById('storyOverlay').classList.remove('show');
  if (demoTimer) { clearTimeout(demoTimer); demoTimer = null; }
  currentStory = null;
  storyExpected = null;
}

function startStory(key) {
  currentStory = STORIES[key];
  currentSceneIdx = 0;
  document.getElementById('storyMenu').style.display = 'none';
  document.getElementById('storyScene').classList.add('active');
  showScene();
}

function showScene() {
  if (!currentStory || currentSceneIdx >= currentStory.scenes.length) {
    document.getElementById('storyScene').classList.remove('active');
    document.getElementById('storyMenu').style.display = 'flex';
    currentStory = null;
    return;
  }

  const scene = currentStory.scenes[currentSceneIdx];
  const $text = document.getElementById('storyText');
  const $shapes = document.getElementById('storyShapes');
  const $prompt = document.getElementById('storyPrompt');
  const $next = document.getElementById('storyNext');

  $text.style.opacity = '0';
  setTimeout(function() {
    $text.innerHTML = scene.text;
    $text.style.transition = 'opacity 0.6s';
    $text.style.opacity = '1';
  }, 200);

  $shapes.innerHTML = '';
  $prompt.textContent = '';
  storyExpected = null;
  storyPlayerBuf = [];

  if (scene.demo) {
    $next.classList.add('hidden');
    var demoShapes = scene.demo;
    demoShapes.forEach(function(si) {
      var el = document.createElement('div');
      el.className = 'story-shape';
      el.innerHTML = SHAPE_ICONS[si].icon;
      el.style.color = SHAPE_ICONS[si].color;
      $shapes.appendChild(el);
    });
    if (scene.demoLabel) $prompt.textContent = scene.demoLabel;

    var delay = scene.demoSlow ? 600 : 400;
    setTimeout(function() {
      var els = $shapes.querySelectorAll('.story-shape');
      demoShapes.forEach(function(si, idx) {
        setTimeout(function() {
          els[idx].classList.add('lit');
          try { playNote(si, false); } catch(e) {}
          setTimeout(function() { els[idx].classList.remove('lit'); }, delay * 0.7);
          if (idx === demoShapes.length - 1) {
            setTimeout(function() { $next.classList.remove('hidden'); }, delay);
          }
        }, idx * delay);
      });
    }, 800);
    return;
  }

  if (scene.practice) {
    $next.classList.add('hidden');
    storyExpected = scene.practice.slice();
    storyPlayerBuf = [];
    if (scene.prompt) $prompt.textContent = scene.prompt;

    storyExpected.forEach(function(si, idx) {
      var el = document.createElement('div');
      el.className = 'story-shape player-turn';
      el.innerHTML = '?';
      el.style.color = 'rgba(255,215,0,0.4)';
      el.style.fontSize = '20px';
      el.dataset.idx = idx;
      el.dataset.shape = si;
      $shapes.appendChild(el);
    });
    return;
  }

  $next.classList.remove('hidden');
}

function nextScene() {
  currentSceneIdx++;
  showScene();
}

function storyTap(si) {
  if (!storyExpected || storyPlayerBuf.length >= storyExpected.length) {
    try { playNote(si, false); } catch(e) {}
    return;
  }

  var idx = storyPlayerBuf.length;
  var expected = storyExpected[idx];
  var el = document.querySelectorAll('#storyShapes .story-shape')[idx];

  try { playNote(si, false); } catch(e) {}

  if (si === expected) {
    storyPlayerBuf.push(si);
    el.innerHTML = SHAPE_ICONS[si].icon;
    el.style.color = SHAPE_ICONS[si].color;
    el.className = 'story-shape correct';

    if (storyPlayerBuf.length === storyExpected.length) {
      document.getElementById('storyPrompt').textContent = 'Perfect!';
      setTimeout(function() {
        document.getElementById('storyNext').classList.remove('hidden');
      }, 600);
    }
  } else {
    el.className = 'story-shape wrong';
    document.getElementById('storyPrompt').textContent = 'Wrong note \u2014 try again from the start';
    setTimeout(function() {
      storyPlayerBuf = [];
      var els = document.querySelectorAll('#storyShapes .story-shape');
      els.forEach(function(e) {
        e.className = 'story-shape player-turn';
        e.innerHTML = '?';
        e.style.color = 'rgba(255,215,0,0.4)';
        e.style.fontSize = '20px';
      });
      var scene = currentStory.scenes[currentSceneIdx];
      if (scene.prompt) document.getElementById('storyPrompt').textContent = scene.prompt;
    }, 800);
  }
}
