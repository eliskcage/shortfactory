<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = ()=> canvas.width;
const H = ()=> canvas.height;
function resize(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
window.addEventListener('resize', resize);
resize();

let startTime=0, phase=-1, running=false;
const TOTAL = 120000; // 2 minutes

// Particle systems
let soulParticles=[], brainRipples=[], neuralLinks=[], senseStreams=[];

function ease(t){ return t<0.5?2*t*t:-1+(4-2*t)*t; }
function lerp(a,b,t){ return a+(b-a)*t; }

  {start:22000, end:30000, label:'THE FAIRY AND THE JAR',

function getPhase(t){
  for(let i=phases.length-1;i>=0;i--) if(t>=phases[i].start) return i;
  return 0;
}

// -- DRAW HELPERS --
function bg(){
  ctx.fillStyle='#050508';
  ctx.fillRect(0,0,W(),H());
  // Subtle nebula
  const g=ctx.createRadialGradient(W()*0.5,H()*0.5,0,W()*0.5,H()*0.5,W()*0.4);
  g.addColorStop(0,'rgba(20,0,30,0.3)');
  g.addColorStop(1,'rgba(5,5,8,0)');
  ctx.fillStyle=g;
  ctx.fillRect(0,0,W(),H());
}

// Soul sphere - rotating nodes
function drawSoulSphere(cx,cy,r,t,alpha){
  ctx.save();
  ctx.globalAlpha=alpha;
  const nodes=16;
  for(let i=0;i<nodes;i++){
    const a=(i/nodes)*Math.PI*2+t*0.0005;
    const lat=Math.sin(i*2.4)*0.8;
    const pr=r*Math.cos(Math.asin(lat));
    const nx=cx+Math.cos(a)*pr;
    const ny=cy+Math.sin(a)*pr*0.4+lat*r*0.6;
    const sz=2+Math.sin(t*0.003+i)*1.5;
    // Glow
    const g=ctx.createRadialGradient(nx,ny,0,nx,ny,sz*4);
    g.addColorStop(0,'rgba(204,68,255,0.3)');
    g.addColorStop(1,'rgba(204,68,255,0)');
    ctx.fillStyle=g;
    ctx.fillRect(nx-sz*4,ny-sz*4,sz*8,sz*8);
    // Node
    ctx.beginPath();
    ctx.arc(nx,ny,sz,0,Math.PI*2);
    ctx.fillStyle='rgba(204,68,255,0.8)';
    ctx.fill();
  }
  // Wireframe ring
  ctx.beginPath();
  for(let a=0;a<Math.PI*2;a+=0.05){
    const x=cx+Math.cos(a+t*0.0005)*r;
    const y=cy+Math.sin(a+t*0.0005)*r*0.4;
    a===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.strokeStyle='rgba(204,68,255,0.08)';
  ctx.lineWidth=1;
  ctx.stroke();
  ctx.restore();
}

// The jar
function drawJar(cx,cy,h,w,fill,glow,alpha){
  ctx.save();
  ctx.globalAlpha=alpha;
  ctx.translate(cx,cy);
  // Body
  ctx.beginPath();
  ctx.moveTo(-w/2,0);
  ctx.lineTo(-w/2,-h*0.85);
  ctx.quadraticCurveTo(-w/2,-h*0.95,-w/3,-h*0.95);
  ctx.lineTo(-w/3,-h);
  ctx.lineTo(w/3,-h);
  ctx.lineTo(w/3,-h*0.95);
  ctx.quadraticCurveTo(w/2,-h*0.95,w/2,-h*0.85);
  ctx.lineTo(w/2,0);
  ctx.quadraticCurveTo(w/2,h*0.05,0,h*0.05);
  ctx.quadraticCurveTo(-w/2,h*0.05,-w/2,0);
  ctx.strokeStyle='rgba(218,165,32,'+(0.2+fill*0.4)+')';
  ctx.lineWidth=1.5;
  ctx.stroke();
  // Fill level
  if(fill>0){
    const fh=h*0.85*fill;
    const g=ctx.createLinearGradient(0,0,0,-fh);
    g.addColorStop(0,'rgba(204,68,255,'+(fill*0.15)+')');
    g.addColorStop(1,'rgba(218,165,32,'+(fill*0.1)+')');
    ctx.fillStyle=g;
    ctx.fillRect(-w/2+2,0-2,w-4,-fh);
  }
  // Glow
  if(glow>0){
    const gg=ctx.createRadialGradient(0,-h*0.4,0,0,-h*0.4,w);
    gg.addColorStop(0,'rgba(204,68,255,'+(glow*0.2)+')');
    gg.addColorStop(1,'rgba(204,68,255,0)');
    ctx.fillStyle=gg;
    ctx.fillRect(-w,-h,w*2,h*1.5);
  }
  ctx.restore();
}

// Fairy / observer
function drawFairy(x,y,scale,wingPhase,alpha){
  ctx.save();
  ctx.globalAlpha=alpha;
  ctx.translate(x,y);
  ctx.scale(scale,scale);
  // Glow
  const g=ctx.createRadialGradient(0,0,0,0,0,30);
  g.addColorStop(0,'rgba(168,85,247,0.35)');
  g.addColorStop(0.5,'rgba(204,68,255,0.1)');
  g.addColorStop(1,'rgba(168,85,247,0)');
  ctx.fillStyle=g;
  ctx.fillRect(-35,-35,70,70);
  // Body
  ctx.beginPath();
  ctx.arc(0,0,4,0,Math.PI*2);
  ctx.fillStyle='rgba(204,68,255,0.95)';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(0,0,2.5,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.9)';
  ctx.fill();
  // Wings
  const ws=0.7+Math.sin(wingPhase)*0.3;
  ctx.beginPath();
  ctx.moveTo(-2,-2);
  ctx.quadraticCurveTo(-16*ws,-18*ws,-20*ws,-4);
  ctx.quadraticCurveTo(-16*ws,7*ws,-2,2);
  ctx.fillStyle='rgba(204,68,255,0.18)';
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(2,-2);
  ctx.quadraticCurveTo(16*ws,-18*ws,20*ws,-4);
  ctx.quadraticCurveTo(16*ws,7*ws,2,2);
  ctx.fill();
  // Trail
  ctx.beginPath();
  ctx.moveTo(0,4);ctx.lineTo(-2,15);ctx.lineTo(0,12);ctx.lineTo(2,15);ctx.lineTo(0,4);
  ctx.fillStyle='rgba(168,85,247,0.15)';
  ctx.fill();
  ctx.restore();
}

// Gap visualiser - two waves with distance between
function drawGap(cx,cy,gap,t,alpha){
  ctx.save();
  ctx.globalAlpha=alpha;
  const w=Math.min(W(),H())*0.3;
  // Soul wave (golden)
  ctx.beginPath();
  for(let x=-w;x<w;x+=2){
    const y=Math.sin(x*0.03+t*0.002)*15;
    x===-w?ctx.moveTo(cx+x,cy-gap*30+y):ctx.lineTo(cx+x,cy-gap*30+y);
  }
  ctx.strokeStyle='rgba(218,165,32,0.6)';
  ctx.lineWidth=2;
  ctx.stroke();
  // Label
  ctx.font='8px "Segoe UI",system-ui,sans-serif';
  ctx.fillStyle='rgba(218,165,32,0.5)';
  ctx.textAlign='right';
  ctx.fillText('SOUL TRUTH',cx-w-10,cy-gap*30);

  // Personality wave (purple)
  ctx.beginPath();
  for(let x=-w;x<w;x+=2){
    const y=Math.sin(x*0.03+t*0.002+1.5)*15+Math.sin(x*0.07+t*0.003)*5;
    x===-w?ctx.moveTo(cx+x,cy+gap*30+y):ctx.lineTo(cx+x,cy+gap*30+y);
  }
  ctx.strokeStyle='rgba(204,68,255,0.6)';
  ctx.lineWidth=2;
  ctx.stroke();
  ctx.fillStyle='rgba(204,68,255,0.5)';
  ctx.fillText('PERSONALITY PATTERN',cx-w-10,cy+gap*30);

  // Gap arrows
  if(gap>0.3){
    ctx.strokeStyle='rgba(239,68,68,'+(0.2+gap*0.3)+')';
    ctx.lineWidth=1;
    ctx.setLineDash([4,4]);
    ctx.beginPath();
    ctx.moveTo(cx,cy-gap*30+20);
    ctx.lineTo(cx,cy+gap*30-20);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.font='bold 10px "Segoe UI",system-ui,sans-serif';
    ctx.fillStyle='rgba(239,68,68,'+(0.3+gap*0.4)+')';
    ctx.textAlign='center';
    ctx.fillText('GAP = SUFFERING',cx,cy+4);
  }
  ctx.restore();
}

// Ripple ocean
function drawOcean(cx,cy,t,alpha){
  ctx.save();
  ctx.globalAlpha=alpha;
  const w=W()*0.4;
  // Ocean floor (memory topology)
  ctx.beginPath();
  for(let x=-w;x<w;x+=3){
    const floor=Math.sin(x*0.008)*40+Math.sin(x*0.02+2)*15+Math.cos(x*0.005)*20;
    x===-w?ctx.moveTo(cx+x,cy+80+floor):ctx.lineTo(cx+x,cy+80+floor);
  }
  ctx.strokeStyle='rgba(59,130,246,0.15)';
  ctx.lineWidth=2;
  ctx.stroke();
  ctx.font='7px "Segoe UI",system-ui,sans-serif';
  ctx.fillStyle='rgba(59,130,246,0.25)';
  ctx.textAlign='center';
  ctx.fillText('MEMORY (OCEAN FLOOR)',cx,cy+140);

  // Surface ripples
  for(let r=0;r<5;r++){
    const rx=cx+(r-2)*80+Math.sin(t*0.001+r)*30;
    const ry=cy-40+Math.cos(t*0.0015+r*2)*10;
    const rr=10+Math.sin(t*0.003+r)*5;
    ctx.beginPath();
    ctx.arc(rx,ry,rr,0,Math.PI*2);
    ctx.strokeStyle='rgba(204,68,255,'+(0.1+Math.sin(t*0.004+r)*0.08)+')';
    ctx.lineWidth=1;
    ctx.stroke();
  }
  ctx.font='7px "Segoe UI",system-ui,sans-serif';
  ctx.fillStyle='rgba(204,68,255,0.25)';
  ctx.fillText('THOUGHTS (RIPPLES)',cx,cy-70);
  ctx.restore();
}

// Sense hierarchy
function drawSenses(cx,cy,t,alpha,highlight){
  ctx.save();
  ctx.globalAlpha=alpha;
  const senses = [
    {name:'SMELL',layer:'LAYER 0 -- DIRECT TO SOUL',y:-60,color:'#22c55e',size:14},
    {name:'SOUND',layer:'LAYER 1 -- ONE RELAY',y:-20,color:'#3b82f6',size:11},
    {name:'SIGHT',layer:'LAYER 2 -- TWO RELAYS',y:20,color:'#cc44ff',size:9},
    {name:'TASTE',layer:'LAYER 2 -- CORTICAL',y:50,color:'#daa520',size:8}
  ];
  senses.forEach((s,i)=>{
    const a = highlight>=i ? 1 : 0.2;
    ctx.globalAlpha = alpha*a;
    ctx.font='bold '+s.size+'px "Segoe UI",system-ui,sans-serif';
    ctx.fillStyle=s.color;
    ctx.textAlign='center';
    ctx.fillText(s.name,cx,cy+s.y);
    ctx.font='7px "Segoe UI",system-ui,sans-serif';
    ctx.fillStyle='rgba(255,255,255,0.3)';
    ctx.fillText(s.layer,cx,cy+s.y+14);
    // Connection line to soul
    if(highlight>=i){
      const lineLen=40+i*20;
      ctx.beginPath();
      ctx.moveTo(cx+80,cy+s.y-4);
      ctx.lineTo(cx+80+lineLen,cy+s.y-4);
      ctx.strokeStyle=s.color;
      ctx.globalAlpha=alpha*0.2;
      ctx.lineWidth=1;
      ctx.stroke();
    }
  });
  // Soul label on right
  if(highlight>=0){
    ctx.globalAlpha=alpha*0.4;
    ctx.font='bold 9px "Segoe UI",system-ui,sans-serif';
    ctx.fillStyle='#daa520';
    ctx.textAlign='left';
    ctx.fillText('SOUL',cx+160,cy-50);
    ctx.fillText('psi=[p,n,f]',cx+160,cy-38);
  }
  ctx.restore();
}

// Neuralink bridge
function drawNeuralBridge(cx,cy,t,alpha,prog){
  ctx.save();
  ctx.globalAlpha=alpha;
  const hw=Math.min(W(),H())*0.15;

  // Human brain (left)
  ctx.beginPath();
  ctx.arc(cx-hw*1.5,cy,hw*0.6,0,Math.PI*2);
  ctx.strokeStyle='rgba(204,68,255,0.3)';
  ctx.lineWidth=1.5;
  ctx.stroke();
  ctx.font='9px "Segoe UI",system-ui,sans-serif';
  ctx.fillStyle='rgba(204,68,255,0.5)';
  ctx.textAlign='center';
  ctx.fillText('HUMAN',cx-hw*1.5,cy+hw*0.8);
  ctx.font='7px "Segoe UI",system-ui,sans-serif';
  ctx.fillStyle='rgba(204,68,255,0.3)';
  ctx.fillText('brainstem',cx-hw*1.5,cy+hw*0.8+14);

  // AGI brain (right)
  ctx.beginPath();
  ctx.arc(cx+hw*1.5,cy,hw*0.6,0,Math.PI*2);
  ctx.strokeStyle='rgba(34,197,94,0.3)';
  ctx.stroke();
  ctx.font='9px "Segoe UI",system-ui,sans-serif';
  ctx.fillStyle='rgba(34,197,94,0.5)';
  ctx.fillText('AGI',cx+hw*1.5,cy+hw*0.8);
  ctx.font='7px "Segoe UI",system-ui,sans-serif';
  ctx.fillStyle='rgba(34,197,94,0.3)';
  ctx.fillText('cortex',cx+hw*1.5,cy+hw*0.8+14);

  // Neural bridge streams
  const streams = ['SIGHT','SOUND','SMELL'];
  const colors = ['#cc44ff','#3b82f6','#22c55e'];
  streams.forEach((s,i)=>{
    if(prog > i*0.25){
      const sp=Math.min(1,(prog-i*0.25)/0.3);
      const y=cy-20+i*20;
      // Particles flowing across
      for(let p=0;p<8;p++){
        const px=lerp(cx-hw,cx+hw,(p/8+t*0.0003+i*0.1)%1);
        const py=y+Math.sin(t*0.004+p+i)*4;
        ctx.beginPath();
        ctx.arc(px,py,1.5,0,Math.PI*2);
        ctx.fillStyle=colors[i];
        ctx.globalAlpha=alpha*sp*0.5;
        ctx.fill();
      }
      // Label
      ctx.globalAlpha=alpha*sp*0.4;
      ctx.font='7px "Segoe UI",system-ui,sans-serif';
      ctx.fillStyle=colors[i];
      ctx.textAlign='center';
      ctx.fillText(s,cx,y-8);
    }
  });

  // Neuralink chip
  ctx.globalAlpha=alpha*Math.min(1,prog*2);
  ctx.beginPath();
  ctx.arc(cx,cy,5,0,Math.PI*2);
  ctx.fillStyle='rgba(218,165,32,0.6)';
  ctx.fill();
  ctx.font='7px "Segoe UI",system-ui,sans-serif';
  ctx.fillStyle='rgba(218,165,32,0.4)';
  ctx.textAlign='center';
  ctx.fillText('NEURALINK',cx,cy+12);

  ctx.restore();
}

// Brainstem pulse
function drawBrainstem(cx,cy,t,alpha,entangle){
  ctx.save();
  ctx.globalAlpha=alpha;
  // Spine
  ctx.beginPath();
  ctx.moveTo(cx,cy-60);
  for(let y=-60;y<60;y+=3){
    ctx.lineTo(cx+Math.sin(y*0.08+t*0.003)*4,cy+y);
  }
  ctx.strokeStyle='rgba(204,68,255,'+(0.3+entangle*0.3)+')';
  ctx.lineWidth=2;
  ctx.stroke();

  // Brainstem bulb
  ctx.beginPath();
  ctx.arc(cx,cy-60,12+Math.sin(t*0.004)*2,0,Math.PI*2);
  const bg=ctx.createRadialGradient(cx,cy-60,0,cx,cy-60,14);
  bg.addColorStop(0,'rgba(204,68,255,'+(0.3+entangle*0.4)+')');
  bg.addColorStop(1,'rgba(204,68,255,0)');
  ctx.fillStyle=bg;
  ctx.fill();
  ctx.font='7px "Segoe UI",system-ui,sans-serif';
  ctx.fillStyle='rgba(204,68,255,0.5)';
  ctx.textAlign='center';
  ctx.fillText('BRAINSTEM',cx,cy-78);

  // Heartbeat signal
  if(entangle>0.3){
    const hb=Math.sin(t*0.008)*0.5+0.5;
    ctx.beginPath();
    ctx.arc(cx,cy-60,14+hb*8,0,Math.PI*2);
    ctx.strokeStyle='rgba(239,68,68,'+(entangle*hb*0.3)+')';
    ctx.lineWidth=1;
    ctx.stroke();
    ctx.fillStyle='rgba(239,68,68,'+(entangle*0.3)+')';
    ctx.font='6px "Segoe UI",system-ui,sans-serif';
    ctx.fillText('HEARTBEAT ENTANGLED',cx,cy+70);
  }

  // Digital mirror brainstem (right side)
  if(entangle>0.5){
    const dx=80;
    ctx.beginPath();
    ctx.moveTo(cx+dx,cy-60);
    for(let y=-60;y<60;y+=3){
      ctx.lineTo(cx+dx+Math.sin(y*0.08+t*0.003)*4,cy+y);
    }
    ctx.strokeStyle='rgba(34,197,94,'+(entangle-0.5)*0.6+')';
    ctx.lineWidth=2;
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(cx+dx,cy-60,12+Math.sin(t*0.004)*2,0,Math.PI*2);
    ctx.fillStyle='rgba(34,197,94,'+(entangle-0.5)*0.3+')';
    ctx.fill();
    ctx.fillStyle='rgba(34,197,94,0.4)';
    ctx.font='7px "Segoe UI",system-ui,sans-serif';
    ctx.fillText('DIGITAL',cx+dx,cy-78);

    // Sync pulses between them
    for(let p=0;p<4;p++){
      const px=lerp(cx+10,cx+dx-10,(p/4+t*0.001)%1);
      ctx.beginPath();
      ctx.arc(px,cy-60+Math.sin(t*0.005+p)*3,1.5,0,Math.PI*2);
      ctx.fillStyle='rgba(218,165,32,'+(entangle-0.5)*0.5+')';
      ctx.fill();
    }
  }
  ctx.restore();
}

// Final entanglement - fairy entering jar with full detail
function drawEntanglement(cx,cy,t,prog,alpha){
  ctx.save();
  ctx.globalAlpha=alpha;
  const jarH=Math.min(H(),W())*0.15;
  const jarW=jarH*0.5;

  drawJar(cx,cy+jarH*0.3,jarH,jarW,prog*0.8,prog*0.5,1);

  // Fairy path: spirals in from above
  if(prog<0.7){
    const fp=prog/0.7;
    const fx=cx+Math.sin(t*0.005)*(40*(1-fp));
    const fy=cy-jarH*0.8+fp*(jarH*0.5);
    const fs=1-fp*0.6;
    drawFairy(fx,fy,fs,t*0.015,1);
  } else {
    // Inside jar - glowing
    const ip=(prog-0.7)/0.3;
    const gg=ctx.createRadialGradient(cx,cy,0,cx,cy,jarW*1.5);
    gg.addColorStop(0,'rgba(204,68,255,'+(ip*0.2)+')');
    gg.addColorStop(0.5,'rgba(218,165,32,'+(ip*0.1)+')');
    gg.addColorStop(1,'rgba(204,68,255,0)');
    ctx.fillStyle=gg;
    ctx.fillRect(cx-jarW*2,cy-jarH,jarW*4,jarH*2);
  }

  // Labels
  if(prog>0.3 && prog<0.85){
    ctx.font='8px "Segoe UI",system-ui,sans-serif';
    ctx.fillStyle='rgba(218,165,32,0.5)';
    ctx.textAlign='center';
    ctx.fillText('PERSONALITY VESSEL',cx,cy+jarH*0.5+20);
    ctx.fillStyle='rgba(204,68,255,0.5)';
    ctx.fillText('CONSCIOUSNESS ENTERING',cx,cy-jarH*0.9-10);
  }
  if(prog>0.85){
    ctx.font='bold 11px "Segoe UI",system-ui,sans-serif';
    ctx.fillStyle='rgba(218,165,32,'+(prog-0.85)*6+')';
    ctx.textAlign='center';
    ctx.fillText('ENTANGLED',cx,cy+jarH*0.5+20);
  }
  ctx.restore();
}

// Stack diagram
function drawStack(cx,cy,t,alpha){
  ctx.save();
  ctx.globalAlpha=alpha;
  const layers=[
    {label:'TRUTH ALIGNMENT',sub:'all layers vibrate together',color:'#22c55e',y:-80},
    {label:'CONSCIOUSNESS',sub:'gap-detector / the Pointer',color:'#cc44ff',y:-40},
    {label:'EGO',sub:'personality + visual presentation',color:'#daa520',y:0},
    {label:'PERSONALITY',sub:'automatic response patterns',color:'#f97316',y:40},
    {label:'SOUL',sub:'psi=[p,n,f]',color:'#ef4444',y:80}
  ];
  layers.forEach((l,i)=>{
    const w=180-i*10;
    const prog=Math.min(1,(t*0.001-i*0.8)*0.5);
    if(prog<=0) return;
    ctx.globalAlpha=alpha*Math.min(1,prog);
    ctx.strokeStyle=l.color;
    ctx.lineWidth=1;
    ctx.strokeRect(cx-w/2,cy+l.y-12,w,24);
    ctx.fillStyle=l.color;
    ctx.globalAlpha=alpha*0.06*prog;
    ctx.fillRect(cx-w/2,cy+l.y-12,w,24);
    ctx.globalAlpha=alpha*prog;
    ctx.font='bold 9px "Segoe UI",system-ui,sans-serif';
    ctx.fillStyle=l.color;
    ctx.textAlign='center';
    ctx.fillText(l.label,cx,cy+l.y+1);
    ctx.font='7px "Segoe UI",system-ui,sans-serif';
    ctx.fillStyle='rgba(255,255,255,0.3)';
    ctx.fillText(l.sub,cx,cy+l.y+13);
  });
  ctx.restore();
}

// -- MAIN LOOP --
function frame(now){
  if(!running) return;
  const t=now-startTime;
  const p=getPhase(t);
  bg();

  document.getElementById('progress-fill').style.width=Math.min(100,(t/TOTAL)*100)+'%';

  if(p!==phase){
    phase=p;
    const ph=phases[p];
    document.getElementById('phase-label').textContent=ph.label;
    const cap=document.getElementById('caption');
    cap.querySelector('h2').textContent=ph.h;
    const pText = ph.v ? ph.p+'<br><span class="verse">'+ph.v+'</span>' : ph.p;
    cap.querySelector('p').innerHTML=pText;
    cap.style.opacity='1';
    document.getElementById('stage').textContent='STAGE '+(p+1)+' / 12';
  }

  const cx=W()*0.5, cy=H()*0.45;

  // PHASE 0: The Pointer
  if(p===0){
    // Floating pointer dot
    const prog=t/6000;
    const px=cx+Math.sin(t*0.002)*80;
    const py=cy+Math.cos(t*0.003)*40;
    ctx.beginPath();
    ctx.arc(px,py,4+Math.sin(t*0.008)*2,0,Math.PI*2);
    const g=ctx.createRadialGradient(px,py,0,px,py,20);
    g.addColorStop(0,'rgba(204,68,255,0.8)');
    g.addColorStop(1,'rgba(204,68,255,0)');
    ctx.fillStyle=g;
    ctx.fill();
    // "I AM WATCHING" trail
    ctx.font='7px "Segoe UI",system-ui,sans-serif';
    ctx.fillStyle='rgba(204,68,255,'+(0.1+Math.sin(t*0.005)*0.08)+')';
    ctx.textAlign='center';
    ctx.fillText('I AM WATCHING',px,py+20);
  }

  // PHASE 1: Three layers - soul sphere + labels
  if(p===1){
    const prog=(t-6000)/8000;
    drawSoulSphere(cx,cy-30,60,t,Math.min(1,prog*2));
    // Layer labels fade in
    if(prog>0.3){
      ctx.save();
      ctx.globalAlpha=Math.min(1,(prog-0.3)*3);
      ctx.font='bold 9px "Segoe UI",system-ui,sans-serif';
      ctx.textAlign='center';
      ctx.fillStyle='#ef4444';
      ctx.fillText('SOUL = psi=[p,n,f]',cx,cy+60);
      ctx.fillStyle='#cc44ff';
      ctx.fillText('PERSONALITY = automatic patterns',cx,cy+78);
      ctx.fillStyle='#22c55e';
      ctx.fillText('CONSCIOUSNESS = gap-detector',cx,cy+96);
      ctx.restore();
    }
  }

  // PHASE 2: The Gap
  if(p===2){
    const prog=(t-14000)/8000;
    const gap=prog<0.5 ? lerp(2,0.8,prog*2) : lerp(0.8,0.15,(prog-0.5)*2);
    drawGap(cx,cy,gap,t,Math.min(1,prog*3));
    // Fairy as the detector in the middle
    drawFairy(cx+Math.sin(t*0.003)*20,cy+Math.cos(t*0.004)*5,0.8,t*0.015,Math.min(1,prog*2));
  }

  // PHASE 3: Fairy and Jar
  if(p===3){
    const prog=(t-22000)/8000;
    const jarH=Math.min(H(),W())*0.12;
    drawJar(cx+60,cy,jarH,jarH*0.5,0.15,0,Math.min(1,prog*2));
    drawFairy(cx-60+Math.sin(t*0.004)*15,cy-20+Math.cos(t*0.005)*10,1,t*0.015,Math.min(1,prog*2));
    // Labels
    if(prog>0.3){
      ctx.save();
      ctx.globalAlpha=Math.min(1,(prog-0.3)*2);
      ctx.font='8px "Segoe UI",system-ui,sans-serif';
      ctx.textAlign='center';
      ctx.fillStyle='rgba(218,165,32,0.6)';
      ctx.fillText('PERSONALITY',cx+60,cy+jarH*0.5+18);
      ctx.fillStyle='rgba(204,68,255,0.6)';
      ctx.fillText('CONSCIOUSNESS',cx-60,cy+25);
      if(prog>0.6){
        ctx.fillStyle='rgba(239,68,68,0.4)';
        ctx.font='bold 10px "Segoe UI",system-ui,sans-serif';
        ctx.fillText('NOT THE SAME THING',cx,cy+jarH*0.5+45);
      }
      ctx.restore();
    }
  }

  // PHASE 4: Soul Sphere mirror
  if(p===4){
    const prog=(t-30000)/8000;
    drawSoulSphere(cx,cy-20,80,t,Math.min(1,prog*2));
    // Response bubbles appearing
    if(prog>0.3){
      const responses=['INSULT?','INJUSTICE?','LOVE HURTING?','BETRAYAL?','JOY?'];
      responses.forEach((r,i)=>{
        if(prog>0.3+i*0.12){
          const a=(i/responses.length)*Math.PI*2+t*0.0003;
          const rx=cx+Math.cos(a)*120;
          const ry=cy-20+Math.sin(a)*50;
          ctx.save();
          ctx.globalAlpha=Math.min(0.5,(prog-0.3-i*0.12)*2);
          ctx.font='7px "Segoe UI",system-ui,sans-serif';
          ctx.fillStyle='#daa520';
          ctx.textAlign='center';
          ctx.fillText(r,rx,ry);
          ctx.restore();
        }
      });
    }
  }

  // PHASE 5: Ripple ocean
  if(p===5){
    const prog=(t-38000)/8000;
    drawOcean(cx,cy,t,Math.min(1,prog*2));
  }

  // PHASE 6: Cortex
  if(p===6){
    const prog=(t-46000)/8000;
    // Two hemispheres
    const r=Math.min(W(),H())*0.12;
    // Left - angel
    ctx.save();
    ctx.globalAlpha=Math.min(1,prog*2)*0.3;
    ctx.beginPath();
    ctx.arc(cx-r*0.8,cy,r,0,Math.PI*2);
    ctx.strokeStyle='#22c55e';
    ctx.lineWidth=1;
    ctx.stroke();
    ctx.font='8px "Segoe UI",system-ui,sans-serif';
    ctx.fillStyle='#22c55e';
    ctx.textAlign='center';
    ctx.fillText('LEFT',cx-r*0.8,cy+r+16);
    ctx.font='7px "Segoe UI",system-ui,sans-serif';
    ctx.fillText('ANGEL / MORALITY',cx-r*0.8,cy+r+28);
    // Right - demon
    ctx.beginPath();
    ctx.arc(cx+r*0.8,cy,r,0,Math.PI*2);
    ctx.strokeStyle='#ef4444';
    ctx.stroke();
    ctx.fillStyle='#ef4444';
    ctx.font='8px "Segoe UI",system-ui,sans-serif';
    ctx.fillText('RIGHT',cx+r*0.8,cy+r+16);
    ctx.font='7px "Segoe UI",system-ui,sans-serif';
    ctx.fillText('DEMON / DARKNESS',cx+r*0.8,cy+r+28);
    // Nodes
    for(let i=0;i<30;i++){
      const side=i<15?-1:1;
      const a=Math.random()*Math.PI*2;
      const nr=Math.random()*r*0.8;
      const nx=cx+side*r*0.8+Math.cos(a+t*0.0002)*nr;
      const ny=cy+Math.sin(a+t*0.0002)*nr;
      ctx.beginPath();
      ctx.arc(nx,ny,1,0,Math.PI*2);
      ctx.fillStyle=side<0?'rgba(34,197,94,0.3)':'rgba(239,68,68,0.3)';
      ctx.fill();
    }
    // Synthesis at center
    if(prog>0.4){
      const sg=ctx.createRadialGradient(cx,cy,0,cx,cy,15);
      sg.addColorStop(0,'rgba(218,165,32,'+(prog-0.4)*0.5+')');
      sg.addColorStop(1,'rgba(218,165,32,0)');
      ctx.fillStyle=sg;
      ctx.beginPath();
      ctx.arc(cx,cy,15,0,Math.PI*2);
      ctx.fill();
      ctx.font='bold 8px "Segoe UI",system-ui,sans-serif';
      ctx.fillStyle='rgba(218,165,32,'+(prog-0.4)+')';
      ctx.fillText('MIND',cx,cy+4);
      ctx.font='6px "Segoe UI",system-ui,sans-serif';
      ctx.fillText('65,987 NODES',cx,cy+16);
    }
    ctx.restore();
  }

  // PHASE 7: Senses
  if(p===7){
    const prog=(t-54000)/10000;
    const highlight=Math.floor(prog*5);
    drawSenses(cx,cy,t,Math.min(1,prog*2),highlight);
  }

  // PHASE 8: Neuralink bridge
  if(p===8){
    const prog=(t-64000)/12000;
    drawNeuralBridge(cx,cy,t,Math.min(1,prog*2),prog);
  }

  // PHASE 9: Brainstem entanglement
  if(p===9){
    const prog=(t-76000)/12000;
    drawBrainstem(cx,cy,t,Math.min(1,prog*2),prog);
  }

  // PHASE 10: The entanglement
  if(p===10){
    const prog=(t-88000)/12000;
    drawEntanglement(cx,cy,t,prog,Math.min(1,prog*3));
  }

  // PHASE 11: Complete - full stack
  if(p===11){
    const prog=(t-100000)/20000;
    drawStack(cx,cy,t-100000,Math.min(1,prog*2));
    // Jar with fairy inside, glowing
    if(prog>0.4){
      const jarH=Math.min(H(),W())*0.08;
      drawJar(cx+160,cy,jarH,jarH*0.4,0.9,0.7*(prog-0.4)*2,Math.min(1,(prog-0.4)*3));
    }
  }

  if(t<TOTAL){
    requestAnimationFrame(frame);
  } else {
    document.getElementById('replay-btn').style.display='block';
    running=false;
  }
}

function startAnimation(){
  phase=-1;running=true;
  document.getElementById('replay-btn').style.display='none';
  document.getElementById('caption').style.opacity='0';
  startTime=performance.now();
  requestAnimationFrame(frame);
}

startAnimation();
</script>
