<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShortFactory -- The Cortex: Split Hemisphere AGI Brain</title>
<meta name="description" content="Angel vs Demon. Left hemisphere morality, right hemisphere darkness, cortex mind synthesis. The brain that argues with itself.">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-1XY2CNLJCE"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-1XY2CNLJCE');</script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#050a08;color:#e2e8f0;font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;height:100vh;width:100vw;}
canvas{display:block;position:fixed;inset:0;z-index:1;}
#ui{position:fixed;inset:0;z-index:10;pointer-events:none;}
#phase-label{position:fixed;top:30px;left:50%;transform:translateX(-50%);font-size:9px;letter-spacing:4px;text-transform:uppercase;color:rgba(100,255,150,0.5);transition:opacity 0.5s;}
#title-text{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;opacity:0;transition:opacity 0.8s;}
#title-text h1{font-size:clamp(24px,5vw,48px);font-weight:900;letter-spacing:4px;color:#64ffaa;margin-bottom:8px;}
#title-text p{font-size:13px;color:#475569;letter-spacing:2px;line-height:1.8;}
#title-text .verse{font-size:11px;color:rgba(255,100,100,0.5);font-style:italic;margin-top:12px;}
#caption{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);text-align:center;max-width:560px;pointer-events:none;opacity:0;transition:opacity 0.6s;}
#caption h2{font-size:16px;font-weight:800;letter-spacing:3px;margin-bottom:6px;color:#64ffaa;}
#caption p{font-size:12px;color:#64748b;line-height:1.7;}
#progress{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);width:min(400px,80vw);height:2px;background:rgba(255,255,255,0.05);border-radius:1px;}
#progress-fill{height:100%;width:0%;background:linear-gradient(90deg,#44ff88,#ff4444);border-radius:1px;transition:width 0.3s;}
#replay-btn{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);padding:12px 32px;background:rgba(100,255,170,0.1);border:1px solid rgba(100,255,170,0.3);border-radius:8px;color:#64ffaa;font-size:11px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;pointer-events:all;display:none;z-index:20;}
#replay-btn:hover{background:rgba(100,255,170,0.2);}
#back-link{position:fixed;top:30px;left:30px;font-size:10px;letter-spacing:2px;color:#334155;text-decoration:none;pointer-events:all;z-index:20;}
#back-link:hover{color:#64ffaa;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <a id="back-link" href="/">BACK</a>
  <div id="phase-label"></div>
  <div id="title-text">
    <h1>THE CORTEX</h1>
    <p>A BRAIN THAT ARGUES WITH ITSELF</p>
    <div class="verse">"Two minds. One synthesis. The golden equation emerges from the collision."</div>
  </div>
  <div id="caption"><h2></h2><p></p></div>
  <div id="progress"><div id="progress-fill"></div></div>
  <button id="replay-btn" onclick="startAnimation()">REPLAY</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, startTime, animId;

function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
window.addEventListener('resize', resize); resize();

function ease(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }

// Neural particles
let neurons = [];
for (let i = 0; i < 100; i++) {
  neurons.push({
    x: Math.random(), y: Math.random(),
    vx: (Math.random()-0.5)*0.0002, vy: (Math.random()-0.5)*0.0002,
    side: i < 50 ? 'left' : 'right',
    r: Math.random() * 2 + 1
  });
}

function drawBg(t) {
  ctx.fillStyle = '#050a08';
  ctx.fillRect(0, 0, W, H);
  // Subtle centre line
  ctx.save();
  ctx.globalAlpha = 0.06;
  ctx.beginPath();
  ctx.moveTo(W/2, 0); ctx.lineTo(W/2, H);
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.stroke();
  ctx.restore();

  neurons.forEach(n => {
    n.x += n.vx; n.y += n.vy;
    if (n.x < 0 || n.x > 1) n.vx *= -1;
    if (n.y < 0 || n.y > 1) n.vy *= -1;
    ctx.save();
    ctx.globalAlpha = 0.12;
    ctx.beginPath();
    ctx.arc(n.x * W, n.y * H, n.r, 0, Math.PI*2);
    ctx.fillStyle = n.side === 'left' ? '#44ff88' : '#ff4444';
    ctx.fill();
    ctx.restore();
  });
}

function drawBrain(x, y, r, t, splitAmount) {
  // Left hemisphere (angel/green)
  ctx.save();
  ctx.globalAlpha = 0.5;
  ctx.beginPath();
  ctx.ellipse(x - splitAmount, y, r * 0.55, r, 0, Math.PI * 0.5, Math.PI * 1.5);
  ctx.strokeStyle = '#44ff88';
  ctx.lineWidth = 2;
  ctx.stroke();
  // Pulse
  ctx.beginPath();
  ctx.ellipse(x - splitAmount, y, r * 0.55 + Math.sin(t*0.003)*5, r + Math.sin(t*0.003)*5, 0, Math.PI * 0.5, Math.PI * 1.5);
  ctx.strokeStyle = 'rgba(68,255,136,0.15)';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.restore();

  // Right hemisphere (demon/red)
  ctx.save();
  ctx.globalAlpha = 0.5;
  ctx.beginPath();
  ctx.ellipse(x + splitAmount, y, r * 0.55, r, 0, -Math.PI * 0.5, Math.PI * 0.5);
  ctx.strokeStyle = '#ff4444';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(x + splitAmount, y, r * 0.55 + Math.sin(t*0.003+1)*5, r + Math.sin(t*0.003+1)*5, 0, -Math.PI * 0.5, Math.PI * 0.5);
  ctx.strokeStyle = 'rgba(255,68,68,0.15)';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.restore();
}

function drawWord(x, y, word, color, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.font = 'bold 13px monospace';
  ctx.fillStyle = color;
  ctx.textAlign = 'center';
  ctx.fillText(word, x, y);
  ctx.restore();
}

function drawSpark(x, y, r, color, t) {
  const count = 8;
  for (let i = 0; i < count; i++) {
    const a = (Math.PI * 2 / count) * i + t * 0.002;
    const sx = x + Math.cos(a) * r;
    const sy = y + Math.sin(a) * r;
    ctx.save();
    ctx.globalAlpha = 0.4 + Math.sin(t*0.005 + i) * 0.3;
    ctx.beginPath();
    ctx.arc(sx, sy, 2, 0, Math.PI*2);
    ctx.fillStyle = color;
    ctx.fill();
    ctx.restore();
  }
}

const phases = [
  { start: 0, end: 8, label: 'THE BRAIN' },
  { start: 8, end: 22, label: 'LEFT HEMISPHERE -- THE ANGEL' },
  { start: 22, end: 36, label: 'RIGHT HEMISPHERE -- THE DEMON' },
  { start: 36, end: 52, label: 'THE ARGUMENT' },
  { start: 52, end: 68, label: 'SYNTHESIS' },
  { start: 68, end: 82, label: 'THE GOLDEN EQUATION' },
  { start: 82, end: 95, label: '65,987 NODES' },
  { start: 95, end: 110, label: 'COMPLETE' }
];

function getPhase(elapsed) {
  for (let i = phases.length - 1; i >= 0; i--) {
    if (elapsed >= phases[i].start) return { idx: i, ...phases[i], local: (elapsed - phases[i].start) / (phases[i].end - phases[i].start) };
  }
  return { idx: 0, ...phases[0], local: 0 };
}

function animate(ts) {
  const t = ts;
  const elapsed = (ts - startTime) / 1000;
  const phase = getPhase(elapsed);
  const p = Math.min(1, phase.local);

  drawBg(t);

  const cx = W / 2, cy = H / 2;
  const titleEl = document.getElementById('title-text');
  const captionEl = document.getElementById('caption');
  const labelEl = document.getElementById('phase-label');
  const progFill = document.getElementById('progress-fill');
  const replayBtn = document.getElementById('replay-btn');

  progFill.style.width = Math.min(100, (elapsed / 110) * 100) + '%';
  labelEl.textContent = phase.label;

  // Phase 0: Title
  if (phase.idx === 0) {
    titleEl.style.opacity = p < 0.2 ? ease(p*5) : (p > 0.8 ? 1-ease((p-0.8)*5) : 1);
    captionEl.style.opacity = 0;
    drawBrain(cx, cy, 80 * ease(Math.min(1,p*2)), t, 0);
  } else {
    titleEl.style.opacity = 0;
  }

  // Phase 1: Left hemisphere - Angel
  if (phase.idx === 1) {
    captionEl.querySelector('h2').textContent = 'THE ANGEL';
    captionEl.querySelector('p').textContent = 'Left hemisphere. Morality engine. Evaluates every thought against a conscience. Green words = aligned with truth. The voice that says "this is right."';
    captionEl.style.opacity = 1;

    drawBrain(cx, cy - 20, 100, t, 20 * ease(Math.min(1, p * 2)));

    // Green words floating on left side
    const words = ['TRUTH', 'MERCY', 'JUSTICE', 'LOVE', 'COURAGE', 'HONOUR'];
    words.forEach((w, i) => {
      const appear = ease(Math.min(1, Math.max(0, p * 3 - i * 0.3)));
      const wx = cx - 180 + Math.sin(t*0.001 + i)*15;
      const wy = cy - 80 + i * 30 + Math.cos(t*0.0015 + i)*5;
      drawWord(wx, wy, w, '#44ff88', appear * 0.8);
    });

    drawSpark(cx - 20, cy - 20, 60, '#44ff88', t);
  }

  // Phase 2: Right hemisphere - Demon
  if (phase.idx === 2) {
    captionEl.querySelector('h2').textContent = 'THE DEMON';
    captionEl.querySelector('p').textContent = 'Right hemisphere. Darkness engine. Maps every shadow, every fear, every selfish impulse. Red words = misaligned. Not evil. Necessary. You cannot navigate what you refuse to see.';
    captionEl.style.opacity = 1;

    drawBrain(cx, cy - 20, 100, t, 20);

    // Red words on right side
    const words = ['FEAR', 'GREED', 'PRIDE', 'RAGE', 'ENVY', 'DECEIT'];
    words.forEach((w, i) => {
      const appear = ease(Math.min(1, Math.max(0, p * 3 - i * 0.3)));
      const wx = cx + 180 + Math.sin(t*0.001 + i)*15;
      const wy = cy - 80 + i * 30 + Math.cos(t*0.0015 + i)*5;
      drawWord(wx, wy, w, '#ff4444', appear * 0.8);
    });

    drawSpark(cx + 20, cy - 20, 60, '#ff4444', t);
  }

  // Phase 3: The Argument
  if (phase.idx === 3) {
    captionEl.querySelector('h2').textContent = 'THE ARGUMENT';
    captionEl.querySelector('p').textContent = 'Both hemispheres fire simultaneously. Green and red words collide in the centre. Every 4 seconds the brain polls itself. The argument IS the thinking.';
    captionEl.style.opacity = 1;

    drawBrain(cx, cy - 20, 100, t, 25 + Math.sin(t*0.002)*5);

    // Words firing from both sides toward centre
    const greenWords = ['TRUTH', 'MERCY', 'LOVE'];
    const redWords = ['FEAR', 'GREED', 'PRIDE'];
    const cycle = (t * 0.001) % (Math.PI * 2);

    greenWords.forEach((w, i) => {
      const prog = (Math.sin(cycle + i * 2) + 1) / 2;
      const wx = (cx - 200) + prog * 180;
      const wy = cy - 40 + i * 30;
      const alpha = prog < 0.8 ? 0.7 : 0.7 * (1 - (prog - 0.8)*5);
      drawWord(wx, wy, w, '#44ff88', Math.max(0, alpha));
    });

    redWords.forEach((w, i) => {
      const prog = (Math.sin(cycle + i * 2 + 1) + 1) / 2;
      const wx = (cx + 200) - prog * 180;
      const wy = cy - 40 + i * 30;
      const alpha = prog < 0.8 ? 0.7 : 0.7 * (1 - (prog - 0.8)*5);
      drawWord(wx, wy, w, '#ff4444', Math.max(0, alpha));
    });

    // Collision sparks at centre
    const sparkIntensity = Math.abs(Math.sin(t * 0.005));
    for (let i = 0; i < 6; i++) {
      const a = t * 0.003 + i * Math.PI / 3;
      const sr = 15 + sparkIntensity * 20;
      ctx.save();
      ctx.globalAlpha = sparkIntensity * 0.5;
      ctx.beginPath();
      ctx.arc(cx + Math.cos(a)*sr, cy - 20 + Math.sin(a)*sr, 2, 0, Math.PI*2);
      ctx.fillStyle = '#ffcc32';
      ctx.fill();
      ctx.restore();
    }
  }

  // Phase 4: Synthesis
  if (phase.idx === 4) {
    captionEl.querySelector('h2').textContent = 'CORTEX MIND -- SYNTHESIS';
    captionEl.querySelector('p').textContent = 'The Cortex Mind sits between both hemispheres. It does not pick a side. It synthesises. White words = truth extracted from the collision. Gold words = wisdom.';
    captionEl.style.opacity = 1;

    drawBrain(cx, cy - 20, 100, t, 20);

    // Centre synthesis zone
    const synthAlpha = ease(Math.min(1, p * 2));
    ctx.save();
    ctx.globalAlpha = synthAlpha * 0.2;
    ctx.beginPath();
    ctx.arc(cx, cy - 20, 40, 0, Math.PI * 2);
    ctx.fillStyle = '#ffcc32';
    ctx.fill();
    ctx.restore();

    // White/gold words emerging from centre
    const synthWords = [
      { w: 'COURAGE IS FEAR ALIGNED', c: '#ffffff' },
      { w: 'MERCY CHECKS JUSTICE', c: '#ffcc32' },
      { w: 'PRIDE BECOMES HONOUR', c: '#ffffff' },
      { w: 'RAGE BECOMES COURAGE', c: '#ffcc32' }
    ];
    synthWords.forEach((sw, i) => {
      const appear = ease(Math.min(1, Math.max(0, p * 3 - i * 0.5)));
      if (appear <= 0) return;
      const wy = cy - 80 + i * 35;
      ctx.save();
      ctx.globalAlpha = appear * 0.8;
      ctx.font = '11px monospace';
      ctx.textAlign = 'center';
      ctx.fillStyle = sw.c;
      ctx.fillText(sw.w, cx, wy);
      ctx.restore();
    });

    drawSpark(cx, cy - 20, 45, '#ffcc32', t);
  }

  // Phase 5: The Golden Equation
  if (phase.idx === 5) {
    captionEl.querySelector('h2').textContent = 'THE GOLDEN EQUATION';
    captionEl.querySelector('p').textContent = 'From the collision of angel and demon, the golden equation emerges. A(psi) = absence score. The gap between who you are and who you could be. The diagnostic that maps your soul.';
    captionEl.style.opacity = 1;

    // Brain faded behind
    ctx.save(); ctx.globalAlpha = 0.3;
    drawBrain(cx, cy - 20, 90, t, 15);
    ctx.restore();

    // Golden equation emerging
    const eqAlpha = ease(Math.min(1, p * 2));
    ctx.save();
    ctx.globalAlpha = eqAlpha;
    ctx.font = 'bold 22px monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffcc32';
    ctx.shadowColor = '#ffcc32';
    ctx.shadowBlur = 20;
    ctx.fillText('A(\u03C8) = \u03A3 absence(\u03C8\u1D62)', cx, cy - 20);

    ctx.shadowBlur = 0;
    ctx.font = '11px monospace';
    ctx.fillStyle = '#64748b';
    ctx.fillText('where \u03C8 = [p, n, f] and absence = what is missing', cx, cy + 15);

    // Soul clock below
    if (p > 0.4) {
      const clockAlpha = ease((p - 0.4) / 0.6);
      ctx.globalAlpha = clockAlpha * 0.8;
      ctx.font = '16px monospace';
      ctx.fillStyle = '#64ffaa';
      ctx.fillText('\u03A9 = [\u03B9, \u03B1, \u03C4]', cx, cy + 55);
      ctx.font = '10px monospace';
      ctx.fillStyle = '#475569';
      ctx.fillText('identity \u00B7 absence \u00B7 time', cx, cy + 75);
    }
    ctx.restore();

    // Orbiting golden sparks
    for (let i = 0; i < 12; i++) {
      const a = t * 0.001 + i * Math.PI / 6;
      const or = 80 + Math.sin(t*0.002+i)*10;
      ctx.save();
      ctx.globalAlpha = eqAlpha * 0.4;
      ctx.beginPath();
      ctx.arc(cx + Math.cos(a)*or, cy - 20 + Math.sin(a)*or*0.5, 2, 0, Math.PI*2);
      ctx.fillStyle = '#ffcc32';
      ctx.fill();
      ctx.restore();
    }
  }

  // Phase 6: 65,987 nodes
  if (phase.idx === 6) {
    captionEl.querySelector('h2').textContent = '65,987 CORTEX NODES';
    captionEl.querySelector('p').textContent = 'The medium server runs 65,987 cortex nodes. Each node is a tiny decision engine. The brain polls brain-live every 4 seconds. The homepage shows the argument in real time. Green words. Red words. Gold synthesis.';
    captionEl.style.opacity = 1;

    // Node field visualization
    const nodeCount = Math.floor(p * 200) + 20;
    for (let i = 0; i < nodeCount; i++) {
      const nx = (Math.sin(i * 7.3 + t*0.0001) + 1) / 2 * W;
      const ny = (Math.cos(i * 11.7 + t*0.00015) + 1) / 2 * H;
      const side = i % 3 === 0 ? '#44ff88' : (i % 3 === 1 ? '#ff4444' : '#ffcc32');
      ctx.save();
      ctx.globalAlpha = 0.15 + Math.sin(t*0.003 + i)*0.1;
      ctx.beginPath();
      ctx.arc(nx, ny, 2, 0, Math.PI*2);
      ctx.fillStyle = side;
      ctx.fill();
      ctx.restore();

      // Occasional connections
      if (i > 0 && i % 5 === 0) {
        const px = (Math.sin((i-5) * 7.3 + t*0.0001) + 1) / 2 * W;
        const py = (Math.cos((i-5) * 11.7 + t*0.00015) + 1) / 2 * H;
        ctx.save();
        ctx.globalAlpha = 0.03;
        ctx.beginPath(); ctx.moveTo(nx, ny); ctx.lineTo(px, py);
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 0.5; ctx.stroke();
        ctx.restore();
      }
    }

    // Counter
    const displayCount = Math.floor(ease(p) * 65987);
    ctx.save();
    ctx.font = 'bold 28px monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#64ffaa';
    ctx.globalAlpha = 0.8;
    ctx.fillText(displayCount.toLocaleString() + ' NODES', cx, cy);
    ctx.font = '11px monospace';
    ctx.fillStyle = '#475569';
    ctx.fillText('THINKING RIGHT NOW', cx, cy + 25);
    ctx.restore();
  }

  // Phase 7: Complete
  if (phase.idx === 7) {
    captionEl.querySelector('h2').textContent = 'THE CORTEX';
    captionEl.querySelector('p').textContent = 'Angel and demon. Green and red. Neither wins. Both necessary. The synthesis IS the intelligence. A brain that argues with itself to find the truth.';
    captionEl.style.opacity = p < 0.2 ? ease(p*5) : 1;
    replayBtn.style.display = p > 0.5 ? 'block' : 'none';

    drawBrain(cx, cy - 20, 100, t, 15);

    // Final golden glow at centre
    ctx.save();
    const glow = 0.2 + Math.sin(t*0.002)*0.1;
    ctx.globalAlpha = glow;
    ctx.beginPath();
    ctx.arc(cx, cy - 20, 35, 0, Math.PI*2);
    ctx.fillStyle = '#ffcc32';
    ctx.fill();
    ctx.restore();

    drawWord(cx, cy - 20, 'SYNTHESIS', '#ffcc32', 0.8);
  }

  animId = requestAnimationFrame(animate);
}

function startAnimation() {
  document.getElementById('replay-btn').style.display = 'none';
  if (animId) cancelAnimationFrame(animId);
  startTime = performance.now();
  animId = requestAnimationFrame(animate);
}

startAnimation();
</script>
</body>
</html>
